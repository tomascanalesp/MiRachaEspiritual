/* ════════════════════════ NUBE DE PALABRAS ════════════════════════ */
const wordHash=w=>{let h=0;for(const c of w)h=(h*31+c.charCodeAt(0))|0;return Math.abs(h);};

function WordCloudActivity({wordcloud,myId,users,isAdmin,SID,onClose,question}){
  const[tab,setTab]=useState('escribir'); // 'escribir' | 'nube'
  const[input,setInput]=useState('');
  const[sending,setSending]=useState(false);
  const[justSent,setJustSent]=useState(false);
  const inputRef=useRef(null);

  if(!wordcloud?.active) return null;

  const rawWords=wordcloud.words?Object.values(wordcloud.words):[];
  const myWords=rawWords.filter(w=>w.uid===myId);
  const myCount=myWords.length;
  const MAX=5;
  const canSend=myCount<MAX&&!sending;

  // Colores MRNT (M-R-N-T) — la nube usa estos al azar por palabra,
  // no el color del avatar de cada usuario.
  const MRNT_COLORS=['#3b82f6','#eab308','#fb923c','#7c3aed'];
  const colorFor=key=>MRNT_COLORS[wordHash(key)%MRNT_COLORS.length];

  // Frecuencias
  const freq={};
  rawWords.forEach(w=>{
    const key=w.word.toLowerCase().trim();
    if(!freq[key]) freq[key]={display:w.word,count:0};
    freq[key].count++;
  });
  const sorted=Object.entries(freq).sort((a,b)=>b[1].count-a[1].count);
  const maxCount=sorted[0]?.[1].count||1;
  const getFontSize=count=>Math.round(18+(maxCount===1?14:(count-1)/(maxCount-1))*60);
  // Rotaciones más amplias y jitter vertical para romper la grilla y dar formato nube
  const getRotation=key=>{const h=wordHash(key);return((h%51)-25);};
  const getJitterY =key=>{const h=wordHash('y'+key);return((h%31)-15);};
  const getJitterX =key=>{const h=wordHash('x'+key);return((h%21)-10);};

  const handleSend=async()=>{
    const w=input.trim();
    if(!w||!canSend) return;
    setSending(true);
    const clean=w.replace(/\s+/g,' ').split(' ').slice(0,3).join(' ');
    await db.ref(`sessions/${SID}/wordcloud/words`).push({
      word:clean,uid:myId,color:users[myId]?.color||'#3b82f6',ts:Date.now(),
    });
    setInput('');setSending(false);setJustSent(true);
    setTimeout(()=>setJustSent(false),1500);
    setTimeout(()=>inputRef.current?.focus(),60);
  };

  const handleClear=()=>db.ref(`sessions/${SID}/wordcloud/words`).remove();
  const handleStop=async()=>{
    await db.ref(`sessions/${SID}/wordcloud`).update({active:false});
    onClose&&onClose();
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:180,display:'flex',flexDirection:'column',
      background:'var(--navy)'}}>

      {/* Header */}
      <div style={{background:'rgba(7,9,31,.98)',borderBottom:'1px solid rgba(59,130,246,.2)',
        padding:'10px 14px',flexShrink:0,display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:16,color:'#3b82f6',textTransform:'uppercase',letterSpacing:'.06em',
            display:'flex',alignItems:'center',gap:7}}>
            <span>☁️</span> Nube de Palabras
            {rawWords.length>0&&(
              <span style={{background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.3)',
                borderRadius:20,padding:'2px 8px',fontSize:11,color:'#3b82f6',fontWeight:700}}>
                {rawWords.length}
              </span>
            )}
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {isAdmin&&rawWords.length>0&&(
            <button onClick={handleClear} style={{background:'rgba(255,255,255,.06)',
              border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'5px 9px',
              color:'var(--muted)',fontSize:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              textTransform:'uppercase'}}>🗑</button>
          )}
          {isAdmin&&(
            <button onClick={handleStop} style={{background:'rgba(239,68,68,.1)',
              border:'1px solid rgba(239,68,68,.25)',borderRadius:8,padding:'5px 9px',
              color:'#f87171',fontSize:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              textTransform:'uppercase'}}>⏹ Terminar</button>
          )}
          {!isAdmin&&(
            <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',
              border:'1px solid rgba(255,255,255,.1)',borderRadius:'50%',
              width:30,height:30,color:'var(--muted)',fontSize:14,
              display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:0,
        borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        {[{id:'escribir',l:'✏️ Escribir'},{id:'nube',l:'☁️ Ver Nube'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:'11px 4px',border:'none',background:'none',
            color:tab===t.id?'#3b82f6':'var(--muted)',
            fontWeight:700,fontSize:12,fontFamily:'Barlow Condensed,sans-serif',
            letterSpacing:'.04em',textTransform:'uppercase',
            borderBottom:tab===t.id?'2px solid #3b82f6':'2px solid transparent',
            transition:'all .15s'}}>
            {t.l}
            {t.id==='nube'&&sorted.length>0&&tab!=='nube'&&(
              <span style={{marginLeft:6,background:'rgba(59,130,246,.2)',
                borderRadius:20,padding:'1px 6px',fontSize:10,color:'#3b82f6'}}>{sorted.length}</span>
            )}
          </button>
        ))}
      </div>

      {/* TAB: ESCRIBIR */}
      {tab==='escribir'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'20px 16px',gap:16,overflowY:'auto'}}>
          {/* Pregunta */}
          {question&&(
            <div style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',
              borderRadius:14,padding:'14px 16px',textAlign:'center'}}>
              <div style={{fontSize:11,color:'rgba(59,130,246,.7)',fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>
                📖 Pregunta del repaso
              </div>
              <div style={{fontSize:15,color:'var(--white)',lineHeight:1.6,fontWeight:500}}>
                {question}
              </div>
            </div>
          )}

          {/* Estado del usuario */}
          <div style={{textAlign:'center'}}>
            {myCount===0?(
              <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6}}>
                Escribe hasta <strong style={{color:'#3b82f6'}}>{MAX} palabras</strong> relacionadas con la pregunta
              </div>
            ):(
              <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center'}}>
                {myWords.map((w,i)=>{
                  const c=colorFor(w.word.toLowerCase().trim());
                  return(
                    <span key={i} style={{background:`${c}18`,
                      border:`1px solid ${c}44`,
                      borderRadius:20,padding:'4px 12px',
                      fontSize:13,color:c,fontWeight:600}}>
                      ✓ {w.word}
                    </span>
                  );
                })}
              </div>
            )}
          </div>

          {/* Input */}
          {canSend?(
            <>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input ref={inputRef} value={input}
                  onChange={e=>setInput(e.target.value.slice(0,30))}
                  onKeyDown={e=>e.key==='Enter'&&handleSend()}
                  placeholder="Escribe una palabra o frase corta..."
                  autoFocus
                  style={{flex:1,padding:'12px 16px',borderRadius:24,
                    background:'rgba(255,255,255,.06)',border:'1px solid rgba(59,130,246,.25)',
                    color:'var(--white)',fontSize:14,outline:'none',fontFamily:'Barlow,sans-serif'}}/>
                <button onClick={handleSend} disabled={!input.trim()||sending} style={{
                  width:46,height:46,flexShrink:0,borderRadius:'50%',border:'none',
                  background:input.trim()&&!sending
                    ?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'rgba(255,255,255,.06)',
                  color:input.trim()&&!sending?'white':'var(--muted)',
                  fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',
                  boxShadow:input.trim()&&!sending?'0 0 16px rgba(59,130,246,.4)':undefined}}>
                  {sending?<Spinner size={18} color="white"/>:'↑'}
                </button>
              </div>
              <div style={{textAlign:'right',fontSize:10,color:'var(--muted)'}}>
                {MAX-myCount} envío{MAX-myCount!==1?'s':''} restante{MAX-myCount!==1?'s':''}
              </div>
            </>
          ):(
            <div style={{textAlign:'center',padding:'16px 0'}}>
              <div style={{fontSize:22,marginBottom:8}}>✅</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:16,color:'#10b981',textTransform:'uppercase',letterSpacing:'.05em'}}>
                ¡Gracias por participar!
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>
                Toca "Ver Nube" para ver el resultado en tiempo real
              </div>
              <button onClick={()=>setTab('nube')} style={{marginTop:12,
                background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',
                border:'none',borderRadius:20,padding:'10px 24px',
                color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase',
                boxShadow:'0 4px 16px rgba(59,130,246,.4)'}}>
                ☁️ Ver Nube →
              </button>
            </div>
          )}

          {justSent&&(
            <div style={{textAlign:'center',animation:'scoreUp .4s ease'}}>
              <span style={{fontSize:13,color:'#10b981',fontWeight:700}}>
                ✓ Palabra enviada
              </span>
            </div>
          )}
        </div>
      )}

      {/* TAB: NUBE */}
      {tab==='nube'&&(
        <div style={{flex:1,position:'relative',display:'flex',flexWrap:'wrap',alignItems:'center',
          justifyContent:'center',alignContent:'center',
          padding:'24px 18px',gap:'2px 14px',overflowY:'auto',
          background:'radial-gradient(ellipse at 50% 40%,#0a0e2a,#07091f)'}}>
          {/* Stars bg */}
          <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
            {[...Array(14)].map((_,i)=>(
              <div key={i} style={{position:'absolute',
                left:`${(wordHash('s'+i)%92)+3}%`,top:`${(wordHash('d'+i)%85)+5}%`,
                width:wordHash('w'+i)%2+1,height:wordHash('w'+i)%2+1,
                borderRadius:'50%',background:'rgba(255,255,255,.12)'}}/>
            ))}
          </div>

          {sorted.length===0?(
            <div style={{textAlign:'center',opacity:.4,position:'relative',zIndex:1}}>
              <div style={{fontSize:64}}>☁️</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:15,color:'white',textTransform:'uppercase',letterSpacing:'.1em',marginTop:8}}>
                Esperando palabras...
              </div>
            </div>
          ):sorted.map(([key,data],i)=>{
            const sz=getFontSize(data.count);
            const c=colorFor(key);
            const rot=getRotation(key);
            const jx=getJitterX(key);
            const jy=getJitterY(key);
            return(
              <span key={key} style={{
                display:'inline-block',position:'relative',zIndex:1,
                fontSize:sz,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:data.count>=3?900:data.count>=2?800:600,
                color:c,
                transform:`translate(${jx}px,${jy}px) rotate(${rot}deg)`,
                textShadow:sz>34?`0 0 ${sz*.55}px ${c}55`:undefined,
                letterSpacing:'-.01em',lineHeight:.95,padding:'0 4px',
                margin:`${(wordHash('m'+key)%14)-7}px ${(wordHash('n'+key)%10)}px`,
                animation:`fadeUp ${.15+i*.04}s ease both`,
                transition:'font-size .5s cubic-bezier(0.23,1,0.32,1)',
                userSelect:'none',cursor:'default',
              }}>
                {data.display}
                {data.count>1&&sz>=30&&(
                  <span style={{fontSize:sz*.32,verticalAlign:'super',
                    opacity:.6,fontWeight:700,marginLeft:2}}>
                    {data.count}×
                  </span>
                )}
              </span>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════ MISIÓN: ACTIVIDAD ════════════════════════ */
function MisionActivity({session,users,myId,SID,isAdmin,onClose}){
  const mision=session?.mision;
  const mode=mision?.mode||'commitments';
  const[text,setText]=useState('');
  const[sending,setSending]=useState(false);
  const{remaining}=useTimer(mision?.startTime,PHASE_DURATIONS.mision);

  if(!mision?.active) return null;

  const me=users[myId]||{};
  const myName=me.name||'Yo';
  const myColor=me.color||'#3b82f6';

  // Compromisos
  const commitments=mision.commitments||{};
  const myCommitment=commitments[myId];
  const commitmentList=Object.entries(commitments).sort(([,a],[,b])=>(b.ts||0)-(a.ts||0));

  const submitCommitment=async()=>{
    const t=text.trim();
    if(!t||sending) return;
    setSending(true);
    await db.ref(`sessions/${SID}/mision/commitments/${myId}`).set({
      name:myName,color:myColor,avatar:me.avatar||'👤',photo:me.photo||null,
      text:t.slice(0,240),ts:Date.now(),
    });
    setText('');setSending(false);
  };
  const removeCommitment=()=>db.ref(`sessions/${SID}/mision/commitments/${myId}`).remove();

  // Proyectos: una persona ora por un proyecto
  const togglePrayer=async(projectId)=>{
    const ref=db.ref(`sessions/${SID}/mision/projects/${projectId}/prayers/${myId}`);
    const snap=await ref.get();
    if(snap.val()) ref.remove();
    else await ref.set({
      name:myName,color:myColor,avatar:me.avatar||'🙏',photo:me.photo||null,ts:Date.now(),
    });
  };

  const isOver=remaining<=0;

  return(
    <div style={{position:'fixed',inset:0,zIndex:170,display:'flex',flexDirection:'column',
      background:'linear-gradient(170deg,#070920,#0a1240 55%,#0d1450)'}}>

      {/* Header */}
      <div style={{padding:'10px 14px',borderBottom:'1px solid rgba(59,130,246,.22)',
        background:'rgba(7,9,31,.65)',backdropFilter:'blur(10px)',
        display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:17,color:'#3b82f6',textTransform:'uppercase',letterSpacing:'.05em',
            display:'flex',alignItems:'center',gap:7}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#3b82f6',
              display:'inline-block',animation:isOver?undefined:'pulse 1.5s infinite'}}/>
            ✈️ Misión · {mode==='commitments'?'Compromiso':'Proyectos'}
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>
            {Object.values(users).filter(u=>u.zone==='mision').length} en sala ·{' '}
            <span style={{color:isOver?'#ef4444':'#3b82f6',fontWeight:600}}>
              {isOver?'Tiempo extra':'Tiempo: '+formatTime(remaining)}
            </span>
          </div>
        </div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',
          border:'1px solid rgba(255,255,255,.1)',borderRadius:'50%',
          width:30,height:30,color:'var(--muted)',fontSize:14,
          display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>

      {/* Body — Compromisos */}
      {mode==='commitments'&&(
        <div style={{flex:1,overflowY:'auto',padding:'16px 14px',display:'flex',
          flexDirection:'column',gap:14}}>
          {!myCommitment?(
            <div style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.25)',
              borderRadius:14,padding:'14px'}}>
              <div style={{fontSize:11,color:'rgba(147,197,253,.95)',
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>
                Tu compromiso de la semana
              </div>
              <textarea value={text} onChange={e=>setText(e.target.value)}
                placeholder='Ej: invitar a Marco al culto, llevar mercadería a la familia X…'
                rows={3} maxLength={240}
                style={{width:'100%',background:'rgba(255,255,255,.04)',
                  border:'1px solid rgba(255,255,255,.12)',borderRadius:10,
                  padding:'10px 12px',color:'var(--white)',fontSize:13,
                  fontFamily:'Barlow,sans-serif',resize:'none',outline:'none'}}/>
              <div style={{display:'flex',gap:8,alignItems:'center',marginTop:10,
                justifyContent:'space-between'}}>
                <div style={{fontSize:10,color:'var(--muted)'}}>{text.length}/240</div>
                <button onClick={submitCommitment} disabled={!text.trim()||sending}
                  style={{
                    background:text.trim()?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'var(--muted2)',
                    color:text.trim()?'white':'var(--muted)',
                    border:'none',borderRadius:8,padding:'8px 16px',
                    fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:12,
                    letterSpacing:'.04em',textTransform:'uppercase'}}>
                  Comprometerme
                </button>
              </div>
            </div>
          ):(
            <div style={{background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.3)',
              borderRadius:14,padding:'14px',display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{fontSize:22}}>✅</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,color:'#10b981',
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>
                  Tu compromiso
                </div>
                <div style={{fontSize:14,color:'var(--white)',lineHeight:1.4,
                  wordBreak:'break-word'}}>
                  {myCommitment.text}
                </div>
              </div>
              <button onClick={removeCommitment} style={{background:'rgba(255,255,255,.06)',
                border:'1px solid rgba(255,255,255,.1)',borderRadius:6,padding:'4px 8px',
                color:'var(--muted)',fontSize:10,
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                textTransform:'uppercase'}}>Editar</button>
            </div>
          )}

          <div>
            <div style={{fontSize:11,color:'var(--muted)',
              fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>
              Compromisos de la sala ({commitmentList.length})
            </div>
            {commitmentList.length===0?(
              <div style={{textAlign:'center',padding:'24px 12px',opacity:.5}}>
                <div style={{fontSize:36,marginBottom:6}}>✈️</div>
                <div style={{fontSize:12,color:'var(--muted)',
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                  textTransform:'uppercase',letterSpacing:'.06em'}}>
                  Sé el primero en comprometerte
                </div>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {commitmentList.map(([uid,c])=>(
                  <div key={uid} style={{
                    background:'rgba(255,255,255,.04)',
                    border:`1px solid ${(c.color||'#3b82f6')}33`,
                    borderRadius:10,padding:'10px 12px',
                    display:'flex',gap:10,alignItems:'flex-start'}}>
                    <AvatarBubble profile={c} size={28}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:c.color||'#3b82f6',
                        fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                        letterSpacing:'.04em',marginBottom:3}}>
                        {c.name}{uid===myId?' · tú':''}
                      </div>
                      <div style={{fontSize:13,color:'var(--white)',lineHeight:1.4,
                        wordBreak:'break-word'}}>
                        {c.text}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Body — Proyectos */}
      {mode==='projects'&&(
        <div style={{flex:1,overflowY:'auto',padding:'14px',display:'grid',
          gridTemplateColumns:'1fr 1fr',gap:10,alignContent:'start'}}>
          {MISION_PROJECTS.map(p=>{
            const prayers=mision.projects?.[p.id]?.prayers||{};
            const prayerList=Object.entries(prayers).sort(([,a],[,b])=>(b.ts||0)-(a.ts||0));
            const iPray=!!prayers[myId];
            return(
              <button key={p.id} onClick={()=>togglePrayer(p.id)} style={{
                background:iPray
                  ?`linear-gradient(160deg,${p.color}33,${p.color}1a)`
                  :'rgba(255,255,255,.04)',
                border:`2px solid ${iPray?p.color:p.color+'33'}`,
                borderRadius:14,padding:'14px 10px',
                display:'flex',flexDirection:'column',alignItems:'center',gap:7,
                transition:'all .2s',cursor:'pointer',
                boxShadow:iPray?`0 6px 22px ${p.color}44`:'none',
                animation:iPray?'pop .35s ease':undefined,
              }}>
                <div style={{fontSize:38,lineHeight:1}}>{p.icon}</div>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                  fontSize:14,color:p.color,textTransform:'uppercase',letterSpacing:'.04em',
                  textAlign:'center',lineHeight:1.1}}>
                  {p.label}
                </div>
                <div style={{fontSize:9,color:'var(--muted)',textAlign:'center',
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:600,
                  letterSpacing:'.04em',lineHeight:1.2}}>
                  {p.desc}
                </div>
                <div style={{
                  marginTop:2,
                  background:iPray?p.color:'rgba(255,255,255,.06)',
                  color:iPray?'#fff':'var(--muted)',
                  padding:'5px 12px',borderRadius:20,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13,
                  display:'flex',alignItems:'center',gap:6,
                  letterSpacing:'.04em'}}>
                  <span>🙏</span>
                  <span>{prayerList.length}</span>
                </div>
                {prayerList.length>0&&(
                  <div style={{display:'flex',gap:0,flexWrap:'wrap',justifyContent:'center',
                    minHeight:22}}>
                    {prayerList.slice(0,6).map(([uid,pr],i)=>(
                      <div key={uid} style={{
                        width:20,height:20,borderRadius:'50%',
                        background:`${pr.color||p.color}22`,
                        border:`1.5px solid ${pr.color||p.color}`,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:10,marginLeft:i>0?-5:0,overflow:'hidden',
                      }}>
                        {pr.photo
                          ?<img src={pr.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                          :<span>{pr.avatar||'👤'}</span>}
                      </div>
                    ))}
                    {prayerList.length>6&&(
                      <div style={{fontSize:10,color:'var(--muted)',
                        marginLeft:4,alignSelf:'center'}}>+{prayerList.length-6}</div>
                    )}
                  </div>
                )}
                <div style={{fontSize:9,color:iPray?p.color:'var(--muted)',
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                  letterSpacing:'.06em',textTransform:'uppercase',opacity:.85}}>
                  {iPray?'✓ Estás orando':'Toca para orar'}
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════ ENCUESTA SEMANAL (USUARIO) ════════════════════════ */
function SurveyModal({myId,myName,SID,onSent,onClose,alreadyResponded}){
  const[days,setDays]=useState(0);
  const[bible,setBible]=useState(null);
  const[mission,setMission]=useState(null);
  const[sent,setSent]=useState(false);
  const[sending,setSending]=useState(false);
  const[error,setError]=useState('');

  // Si ya respondió hoy, mostrar mensaje en vez del formulario (el admin
  // puede reabrir la encuesta varias veces el mismo día).
  if(alreadyResponded&&!sent) return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'rgba(0,0,0,.82)',
      backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:480,
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(16,185,129,.3)',borderRadius:'20px 20px 0 0',
        padding:'28px 22px 32px',animation:'modalIn .3s ease',textAlign:'center'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(16,185,129,.3)',margin:'0 auto 18px'}}/>
        <div style={{fontSize:54,marginBottom:12}}>✅</div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#10b981',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:8}}>
          Ya respondiste hoy
        </div>
        <div style={{fontFamily:'Barlow,sans-serif',fontSize:14,color:'var(--muted)',
          lineHeight:1.5,marginBottom:20,maxWidth:320,marginLeft:'auto',marginRight:'auto'}}>
          Gracias por participar. No necesitas responder de nuevo.
        </div>
        <button onClick={onClose} style={{
          width:'100%',padding:13,borderRadius:12,border:'none',
          background:'linear-gradient(135deg,#10b981,#059669)',color:'#fff',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14,
          letterSpacing:'.06em',textTransform:'uppercase',cursor:'pointer'}}>
          Cerrar
        </button>
      </div>
    </div>
  );

  const handleSubmit=async()=>{
    if(bible===null||mission===null||sending) return;
    setSending(true);
    setError('');
    const payload={
      name:myName,daysStudied:days,hasBibleStudents:bible,
      missionaryAction:mission,ts:Date.now()
    };
    try{
      // Vista en vivo: requerida — si falla, el usuario ve el error y reintenta.
      await db.ref(`sessions/${SID}/survey/responses/${myId}`).set(payload);
      // Copia persistente: best-effort — no bloquear el envío si las reglas de RTDB
      // no permiten escribir en /surveyHistory. Solo logueamos el error.
      db.ref(`surveyHistory/${SID}/${myId}`).set(payload).catch(err=>{
        console.warn('No se pudo persistir surveyHistory:',err);
      });
      setSent(true);
      setTimeout(onSent,2000);
    }catch(e){
      console.error('Error enviando encuesta:',e);
      setError('No se pudo enviar. Intenta de nuevo.');
      setSending(false);
    }
  };

  if(sent) return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'rgba(0,0,0,.85)',
      display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',padding:32}}>
        <div style={{fontSize:54,marginBottom:12}}>🙌</div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#10b981',textTransform:'uppercase',letterSpacing:'.05em'}}>
          ¡Gracias por responder!
        </div>
      </div>
    </div>
  );

  return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'rgba(0,0,0,.82)',
      backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:480,
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.25)',borderRadius:'20px 20px 0 0',
        padding:'20px 18px 36px',overflowY:'auto',maxHeight:'88vh',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.25)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,gap:8}}>
          <div style={{width:32}}/>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em',
            textAlign:'center',flex:1}}>
            📋 Encuesta semanal
          </div>
          <button onClick={onClose} aria-label="Cerrar" style={{
            width:32,height:32,borderRadius:8,border:'1px solid rgba(255,255,255,.12)',
            background:'rgba(255,255,255,.06)',color:'var(--white)',
            fontSize:18,lineHeight:1,cursor:'pointer',padding:0,
          }}>×</button>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,color:'var(--white)',fontFamily:'Barlow,sans-serif',fontWeight:600,marginBottom:10}}>
            ¿Cuántos días estudiaste la lección esta semana?
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[0,1,2,3,4,5,6,7].map(d=>(
              <button key={d} onClick={()=>setDays(d)} style={{
                width:40,height:40,borderRadius:10,border:'none',
                background:days===d?'linear-gradient(135deg,#ffd000,#e6a800)':'rgba(255,255,255,.08)',
                color:days===d?'#07091f':'var(--white)',
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,cursor:'pointer'}}>
                {d}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,color:'var(--white)',fontFamily:'Barlow,sans-serif',fontWeight:600,marginBottom:10}}>
            ¿Tienes estudiantes de la Biblia?
          </div>
          <div style={{display:'flex',gap:8}}>
            {[{v:true,l:'✅ Sí'},{v:false,l:'❌ No'}].map(opt=>(
              <button key={String(opt.v)} onClick={()=>setBible(opt.v)} style={{
                flex:1,padding:'10px',borderRadius:12,border:'none',
                background:bible===opt.v?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'rgba(255,255,255,.06)',
                color:bible===opt.v?'white':'var(--muted)',
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13,
                letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>
                {opt.l}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:13,color:'var(--white)',fontFamily:'Barlow,sans-serif',fontWeight:600,marginBottom:10}}>
            ¿Participaste de una acción misionera esta semana?
          </div>
          <div style={{display:'flex',gap:8}}>
            {[{v:true,l:'✅ Sí'},{v:false,l:'❌ No'}].map(opt=>(
              <button key={String(opt.v)} onClick={()=>setMission(opt.v)} style={{
                flex:1,padding:'10px',borderRadius:12,border:'none',
                background:mission===opt.v?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'rgba(255,255,255,.06)',
                color:mission===opt.v?'white':'var(--muted)',
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13,
                letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>
                {opt.l}
              </button>
            ))}
          </div>
        </div>
        {error&&(
          <div style={{marginBottom:12,padding:'10px 12px',borderRadius:10,
            background:'rgba(239,68,68,.12)',border:'1px solid rgba(239,68,68,.35)',
            color:'#fca5a5',fontSize:13,fontFamily:'Barlow,sans-serif',textAlign:'center'}}>
            {error}
          </div>
        )}
        <button onClick={handleSubmit} disabled={bible===null||mission===null||sending} style={{
          width:'100%',padding:13,borderRadius:12,border:'none',
          background:bible!==null&&mission!==null&&!sending?'linear-gradient(135deg,#ffd000,#e6a800)':'var(--muted2)',
          color:bible!==null&&mission!==null&&!sending?'#07091f':'var(--muted)',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:15,
          letterSpacing:'.05em',textTransform:'uppercase',
          boxShadow:bible!==null&&mission!==null&&!sending?'0 0 24px rgba(255,208,0,.4)':undefined,
          cursor:bible!==null&&mission!==null&&!sending?'pointer':'default'}}>
          {sending?'Enviando…':'Enviar respuestas →'}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════ ADMIN ENCUESTA MODAL ════════════════════════ */
function AdminSurveyModal({responses,users,SID,onClose,onToggle,surveyActive}){
  const responsesObj=responses||{};
  const list=Object.values(responsesObj);
  const respondedUids=new Set(Object.keys(responsesObj));
  // Usuarios actualmente en la sala
  const allInRoom=Object.entries(users||{}).map(([uid,u])=>({uid,name:u?.name||uid,avatar:u?.avatar,color:u?.color,photo:u?.photo}));
  const pending=allInRoom.filter(u=>!respondedUids.has(u.uid));
  const respondedInRoom=allInRoom.filter(u=>respondedUids.has(u.uid));
  // Personas que respondieron pero ya no están en la sala (igual cuentan).
  const respondedNotInRoom=Object.entries(responsesObj)
    .filter(([uid])=>!allInRoom.find(u=>u.uid===uid))
    .map(([uid,r])=>({uid,name:r?.name||uid}));
  const totalExpected=allInRoom.length;
  const totalResponded=list.length;
  const allDone=totalExpected>0&&pending.length===0;

  const downloadResults=()=>{
    const rows=[
      `Encuesta — Maranata Class (${new Date().toLocaleDateString('es-CL')})`,
      'Nombre\tDías estudiados\tEst. Biblia\tAcc. Misionera',
      ...list.map(r=>`${r.name}\t${r.daysStudied}\t${r.hasBibleStudents?'Sí':'No'}\t${r.missionaryAction?'Sí':'No'}`)
    ];
    const blob=new Blob([rows.join('\n')],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`encuesta_${SID}.txt`; a.click();
    URL.revokeObjectURL(url);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'rgba(0,0,0,.8)',
      backdropFilter:'blur(4px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',borderRadius:'20px 20px 0 0',
        padding:'20px 18px 32px',maxHeight:'85vh',overflowY:'auto',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:18,color:allDone?'#10b981':'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📋 Encuesta — {totalResponded}{totalExpected>0?` / ${totalExpected}`:''}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>
        {allDone&&(
          <div style={{marginBottom:12,padding:'10px 14px',borderRadius:10,
            background:'rgba(16,185,129,.15)',border:'1px solid rgba(16,185,129,.35)',
            color:'#10b981',fontSize:12,fontFamily:'Barlow Condensed,sans-serif',
            fontWeight:800,letterSpacing:'.06em',textTransform:'uppercase',textAlign:'center'}}>
            ✅ Todos en la sala respondieron
          </div>
        )}
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button onClick={onToggle} style={{
            flex:1,padding:'9px',borderRadius:10,
            background:surveyActive?'rgba(239,68,68,.15)':'linear-gradient(135deg,#10b981,#059669)',
            border:surveyActive?'1px solid rgba(239,68,68,.4)':'none',
            color:surveyActive?'#f87171':'white',
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:12,
            letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>
            {surveyActive?'⏹ Cerrar encuesta':'▶ Abrir encuesta'}
          </button>
          {list.length>0&&(
            <button onClick={downloadResults} style={{
              flex:1,padding:'9px',borderRadius:10,
              background:'rgba(255,208,0,.1)',border:'1px solid rgba(255,208,0,.3)',
              color:'#ffd000',fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
              fontSize:12,letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>
              📥 Exportar .txt
            </button>
          )}
        </div>
        {list.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[
              {label:'Prom. días',value:(list.reduce((s,r)=>s+r.daysStudied,0)/list.length).toFixed(1),color:'#ffd000'},
              {label:'Est. Biblia',value:list.filter(r=>r.hasBibleStudents).length,color:'#3b82f6'},
              {label:'Misión',value:list.filter(r=>r.missionaryAction).length,color:'#10b981'},
            ].map(st=>(
              <div key={st.label} style={{background:'rgba(255,255,255,.04)',borderRadius:10,
                padding:'10px 6px',textAlign:'center',borderLeft:`3px solid ${st.color}`}}>
                <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,color:st.color}}>{st.value}</div>
                <div style={{fontSize:9,color:'var(--muted)',marginTop:3,textTransform:'uppercase',letterSpacing:'.04em'}}>{st.label}</div>
              </div>
            ))}

        )}
        {totalExpected>0&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
            <div style={{background:'rgba(16,185,129,.06)',border:'1px solid rgba(16,185,129,.2)',
              borderRadius:10,padding:'10px 12px'}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:10,
                color:'#10b981',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>
                ✓ Respondieron ({respondedInRoom.length+respondedNotInRoom.length})
              </div>
              {respondedInRoom.length+respondedNotInRoom.length===0?(
                <div style={{fontSize:11,color:'var(--muted)',fontStyle:'italic'}}>—</div>
              ):(

                  {[...respondedInRoom,...respondedNotInRoom].map(u=>(
                    <span key={u.uid} style={{fontSize:11,fontFamily:'Barlow,sans-serif',
                      fontWeight:600,color:'var(--white)',background:'rgba(16,185,129,.12)',
                      padding:'3px 8px',borderRadius:20,
                      border:'1px solid rgba(16,185,129,.25)'}}>{u.name}</span>
                  ))}
                </div>
              )}
            </div>
            <div style={{background:'rgba(255,208,0,.05)',border:'1px solid rgba(255,208,0,.18)',
              borderRadius:10,padding:'10px 12px'}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:10,
                color:'#ffd000',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:6}}>

              ):(
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {pending.map(u=>(
                    <span key={u.uid} style={{fontSize:11,fontFamily:'Barlow,sans-serif',

                      border:'1px solid rgba(255,208,0,.25)'}}>{u.name}</span>

        )}
        {list.length===0?(
          <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Aún no hay respuestas</div>
        ):list.map((r,i)=>(
          <div key={i} style={{background:'rgba(255,255,255,.03)',borderRadius:10,
            padding:'10px 12px',marginBottom:8,border:'1px solid rgba(255,255,255,.06)'}}>

            color:'#f87171',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
            fontSize:11,letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>

  );
}

/* ════════════════════════ ADMIN: DESCARGA DE DATOS ════════════════════════ */
function DataDownloadModal({onClose}){
  const[busy,setBusy]=useState('');
  const[startDate,setStartDate]=useState('');
  const[endDate,setEndDate]=useState('');

  const dl=(content,filename)=>{
    const blob=new Blob([content],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  };

  // Las fechas son ISO YYYY-MM-DD → comparación lexicográfica directa
  const inRange=(d,s,e)=>(!s||d>=s)&&(!e||d<=e);
  const rangeSuffix=()=>{
    if(!startDate&&!endDate) return '';
    return `_${startDate||'inicio'}_a_${endDate||'fin'}`;
  };

  // ── Asistencia ──────────────────────────────────────────────────────
  const fetchAttendance=async()=>{
    const[pSnap,aSnap]=await Promise.all([
      db.ref('profiles').get(),db.ref('attendance').get()
    ]);
    const profiles=pSnap.val()||{};
    const attendance=aSnap.val()||{};
    const allDates=new Set();
    Object.values(attendance).forEach(u=>Object.keys(u).forEach(d=>{
      if(inRange(d,startDate,endDate)) allDates.add(d);
    }));
    const dates=[...allDates].sort();
    // Unión: todo uid con perfil + todo uid con asistencia (cubre profiles huérfanos)
    const allUids=new Set([...Object.keys(profiles),...Object.keys(attendance)]);
    const rows=[...allUids].map(uid=>{
      const p=profiles[uid]||{};
      const ua=attendance[uid]||{};
      const fallback=Object.values(ua).find(v=>v&&v.name)?.name;
      const name=p.name||fallback||uid;
      const tag=p.isAdmin?' (admin)':'';
      const total=dates.reduce((s,d)=>s+(ua[d]?1:0),0);
      return{name:name+tag,total,line:name+tag+'\t'+dates.map(d=>ua[d]?'✓':'').join('\t')};
    })
    .sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name));
    return[
      'Asistencia — Maranata Class Las Condes'+(startDate||endDate?` (${startDate||'inicio'} a ${endDate||'fin'})`:''),
      'Nombre\t'+dates.join('\t'),
      ...rows.map(r=>r.line)
    ].join('\n');
  };

  // ── Juegos (gameHistory) ────────────────────────────────────────────
  const fetchGames=async()=>{
    const snap=await db.ref('gameHistory').get();
    const data=snap.val()||{};
    const rows=[];
    Object.entries(data).forEach(([uid,games])=>{
      Object.entries(games||{}).forEach(([gid,g])=>{
        const date=g.date||'';
        if(date&&!inRange(date,startDate,endDate)) return;
        rows.push({date,name:g.name||uid,score:g.score||0,
          rank:g.rank||0,total:g.totalPlayers||0,gid});
      });
    });
    rows.sort((a,b)=>(a.date>b.date?-1:1)||(a.rank-b.rank));
    return[
      'Historial de Juegos — Maranata Class'+(startDate||endDate?` (${startDate||'inicio'} a ${endDate||'fin'})`:''),
      'Fecha\tNombre\tPuntaje\tPosición\tJugadores',
      ...rows.map(r=>`${r.date}\t${r.name}\t${r.score}\t${r.rank}/${r.total}\t${r.total}`)
    ].join('\n');
  };

  // ── Encuestas (todas las sesiones) ─────────────────────────────────
  const fetchSurveys=async()=>{
    // Lee de surveyHistory (persistente) y mezcla con sessions/.../survey/responses.
    // surveyHistory puede estar bloqueado por reglas de RTDB — toleramos el fallo
    // y caemos en sessions como fuente principal para que la descarga siga andando.
    const[hSnap,sSnap]=await Promise.all([
      db.ref('surveyHistory').get().catch(err=>{
        console.warn('No se pudo leer surveyHistory:',err);
        return null;
      }),
      db.ref('sessions').get(),
    ]);
    const history=hSnap?.val()||{};
    const sessions=sSnap.val()||{};
    const merged={};
    Object.entries(sessions).forEach(([sid,s])=>{
      const responses=s?.survey?.responses;
      if(!responses) return;
      merged[sid]=merged[sid]||{};
      Object.assign(merged[sid],responses);
    });
    Object.entries(history).forEach(([sid,uids])=>{
      merged[sid]=merged[sid]||{};
      Object.assign(merged[sid],uids); // history pisa sessions si hay duplicado
    });
    const rows=[];
    Object.entries(merged).forEach(([sid,uids])=>{
      if(!inRange(sid,startDate,endDate)) return;
      Object.entries(uids).forEach(([uid,r])=>{
        if(!r) return;
        rows.push({date:sid,uid,
          name:r.name||uid,days:r.daysStudied??'',
          bible:r.hasBibleStudents?'Sí':'No',
          mission:r.missionaryAction?'Sí':'No'});
      });
    });
    rows.sort((a,b)=>a.date>b.date?-1:1);
    return[
      'Encuestas semanales — Maranata Class'+(startDate||endDate?` (${startDate||'inicio'} a ${endDate||'fin'})`:''),
      'Fecha\tNombre\tDías estudiados\tEst. Biblia\tAcc. Misionera',
      ...rows.map(r=>`${r.date}\t${r.name}\t${r.days}\t${r.bible}\t${r.mission}`)
    ].join('\n');
  };

  const handle=async(kind)=>{
    if(busy) return;
    if(startDate&&endDate&&startDate>endDate){
      alert('La fecha de inicio no puede ser posterior a la fecha final.');
      return;
    }
    setBusy(kind);
    try{
      const stamp=new Date().toISOString().slice(0,10);
      const suf=rangeSuffix();
      if(kind==='asistencia'){
        dl(await fetchAttendance(),`asistencia_${stamp}${suf}.txt`);
      }else if(kind==='juegos'){
        dl(await fetchGames(),`juegos_${stamp}${suf}.txt`);
      }else if(kind==='encuesta'){
        dl(await fetchSurveys(),`encuestas_${stamp}${suf}.txt`);
      }else if(kind==='todos'){
        const[a,j,e]=await Promise.all([fetchAttendance(),fetchGames(),fetchSurveys()]);
        const sep='\n\n'+'═'.repeat(60)+'\n\n';
        dl(['MARANATA CLASS — Datos completos ('+stamp+')',
          sep,a,sep,j,sep,e].join(''),`maranata_datos_${stamp}${suf}.txt`);
      }
    }catch(err){
      console.error('Error descargando',kind,err);
      alert('Error descargando datos. Revisa la consola.');
    }finally{
      setBusy('');
    }
  };

  const opts=[
    {id:'asistencia',icon:'📅',label:'Asistencia',desc:'Tabla por persona × fecha',color:'#10b981'},
    {id:'juegos',    icon:'🎮',label:'Juegos',    desc:'Puntajes y posiciones',  color:'#fb923c'},
    {id:'encuesta',  icon:'📋',label:'Encuestas', desc:'Todas las sesiones',     color:'#8b5cf6'},
    {id:'todos',     icon:'📦',label:'Todos juntos',desc:'Un archivo con todo',  color:'#ffd000'},
  ];

  return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'rgba(0,0,0,.8)',
      backdropFilter:'blur(4px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',borderRadius:'20px 20px 0 0',
        padding:'20px 18px 32px',maxHeight:'85vh',overflowY:'auto',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,
          background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:18,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📥 Descargar datos
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:14,
          fontFamily:'Barlow,sans-serif',lineHeight:1.45}}>
          Genera un archivo de texto separado por tabulaciones — pegable
          directamente en Google Sheets / Excel.
        </div>
        <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,208,0,.12)',
          borderRadius:12,padding:'10px 12px',marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--muted)',
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
            textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>
            🗓 Filtrar por fecha (opcional)
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'var(--muted)',marginBottom:3,
                fontFamily:'Barlow,sans-serif'}}>Inicio</div>
              <input type="date" value={startDate} max={endDate||undefined}
                onChange={e=>setStartDate(e.target.value)}
                style={{width:'100%',padding:'7px 9px',borderRadius:8,
                  background:'rgba(255,255,255,.06)',
                  border:'1px solid rgba(255,208,0,.2)',color:'var(--white)',
                  fontSize:12,fontFamily:'Barlow,sans-serif',outline:'none',
                  colorScheme:'dark'}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'var(--muted)',marginBottom:3,
                fontFamily:'Barlow,sans-serif'}}>Fin</div>
              <input type="date" value={endDate} min={startDate||undefined}
                onChange={e=>setEndDate(e.target.value)}
                style={{width:'100%',padding:'7px 9px',borderRadius:8,
                  background:'rgba(255,255,255,.06)',
                  border:'1px solid rgba(255,208,0,.2)',color:'var(--white)',
                  fontSize:12,fontFamily:'Barlow,sans-serif',outline:'none',
                  colorScheme:'dark'}}/>
            </div>
            {(startDate||endDate)&&(
              <button onClick={()=>{setStartDate('');setEndDate('');}}
                title="Limpiar filtro"
                style={{alignSelf:'flex-end',padding:'7px 10px',borderRadius:8,
                  background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
                  color:'#f87171',fontSize:11,fontFamily:'Barlow Condensed,sans-serif',
                  fontWeight:700,cursor:'pointer'}}>✕</button>
            )}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {opts.map(o=>{
            const isBusy=busy===o.id;
            const anyBusy=!!busy;
            return(
              <button key={o.id} onClick={()=>handle(o.id)} disabled={anyBusy}
                style={{
                  background:isBusy?`${o.color}33`:'rgba(255,255,255,.04)',
                  border:`1px solid ${isBusy?o.color+'88':o.color+'33'}`,
                  borderRadius:12,padding:'12px 14px',
                  display:'flex',alignItems:'center',gap:12,
                  cursor:anyBusy?'default':'pointer',opacity:anyBusy&&!isBusy?.5:1,
                  transition:'all .2s'}}>
                <div style={{fontSize:24,flexShrink:0}}>{o.icon}</div>
                <div style={{flex:1,textAlign:'left'}}>
                  <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                    fontSize:14,color:o.color,textTransform:'uppercase',letterSpacing:'.04em'}}>
                    {o.label}
                  </div>
                  <div style={{fontSize:10,color:'var(--muted)',marginTop:2,
                    fontFamily:'Barlow,sans-serif'}}>
                    {o.desc}
                  </div>
                </div>
                <div style={{fontSize:14,color:o.color,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:800}}>
                  {isBusy?'…':'↓'}
                </div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ ADMIN PANEL ════════════════════════ */
function AdminPanel({session,users,onStartConfra,onNextSpeaker,onEndConfra,onStartRepaso,onEndRepaso,onOpenPresentationMenu,onEndPresentation,onOpenVideoMenu,onEndVideo,onStartJuegos,onEndJuegos,onStartMision,onEndMision,onStartTemplo,onEndTemplo,onOpenStats,onToggleWordCloud,onResetSession,onOpenDownload,onOpenSurveyResults,surveyResponses}){
  const[open,setOpen]=useState(false);
  const[wcQ,setWcQ]=useState('');
  const phase=session?.phase||'waiting';
  const allUsers=Object.entries(users);
  const confraUsers=Object.entries(users).filter(([,u])=>u.zone==='confra');
  const repasoUsers=Object.entries(users).filter(([,u])=>u.zone==='repaso');
  const juegosUsers=Object.entries(users).filter(([,u])=>u.zone==='juegos');
  const misionUsers=Object.entries(users).filter(([,u])=>u.zone==='mision');
  const temploUsers=Object.entries(users).filter(([,u])=>u.zone==='templo');

  const phaseColor={waiting:'var(--muted)',confra:'#eab308',repaso:'#fb923c',juegos:'#fdba74',mision:'#3b82f6',templo:'#7c3aed'}[phase];

  return(
    <>
      <button onClick={()=>setOpen(o=>!o)} style={{
        position:'fixed',bottom:20,right:20,zIndex:120,
        width:48,height:48,borderRadius:'50%',
        background:'linear-gradient(135deg,#ffd000,#e6a800)',
        border:'none',fontSize:20,
        boxShadow:'0 4px 20px rgba(255,208,0,.4)',
        display:'flex',alignItems:'center',justifyContent:'center',
      }}>
        {open?'✕':'⚙️'}
      </button>

      {open&&(
        <div style={{
          position:'fixed',bottom:78,right:16,zIndex:120,
          width:288,background:'linear-gradient(160deg,#0d1035,#0a0c28)',
          border:'1px solid rgba(255,208,0,.2)',borderRadius:16,
          padding:16,boxShadow:'0 8px 40px rgba(0,0,0,.7)',
          animation:'modalIn .2s ease',
        }}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:14,color:'#ffd000',textTransform:'uppercase',
            letterSpacing:'.06em',marginBottom:12,
            display:'flex',alignItems:'center',gap:8}}>
            <span>⚙️ Panel Admin</span>
            <span style={{fontSize:11,color:phaseColor,
              background:`${phaseColor}22`,padding:'2px 8px',borderRadius:20,
              border:`1px solid ${phaseColor}44`}}>
              {phase.toUpperCase()}
            </span>
