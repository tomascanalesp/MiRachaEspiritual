/* ════════════════════════ MODAL EDITAR PERFIL ════════════════════════ */
function EditProfileModal({profile,onSave,onClose}){
  const[name,  setName]  =useState(profile.name  ||'');
  const[avatar,setAvatar]=useState(profile.avatar||null);
  const[color, setColor] =useState(profile.color ||'#ffd000');
  const[photo, setPhoto] =useState(profile.photo ||null);
  const[saving,setSaving]=useState(false);
  const[err,   setErr]   =useState('');
  const fileRef=useRef();

  const handlePhoto=async(e)=>{
    const f=e.target.files[0];
    if(!f) return;
    setSaving(true);
    const base64=await compressImage(f,200);
    setPhoto(base64);
    setSaving(false);
  };

  const handleSave=async()=>{
    if(!name.trim()||saving) return;
    setSaving(true);
    try{ await onSave({name:name.trim(),avatar,color,photo}); }
    catch(e){ setErr('Error al guardar. Intenta de nuevo.'); setSaving(false); }
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,overflowY:'auto',maxHeight:'90vh',
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'20px 20px 0 0',padding:'20px 20px 32px',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,
          background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            Editar perfil
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Foto de perfil */}
        <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:14}}>
          <div style={{position:'relative',cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
            <AvatarBubble profile={{...profile,photo,avatar,color}} size={72}/>
            <div style={{
              position:'absolute',bottom:-2,right:-2,
              width:22,height:22,borderRadius:'50%',
              background:'#ffd000',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:12,color:'#07091f',fontWeight:800,
            }}>📷</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--white)',marginBottom:6}}>Foto de perfil</div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>fileRef.current?.click()} style={{
                background:'rgba(255,208,0,.08)',border:'1px solid rgba(255,208,0,.2)',
                borderRadius:8,padding:'6px 10px',color:'#ffd000',fontSize:11,
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              }}>📁 Subir foto</button>
              {photo&&(
                <button onClick={()=>setPhoto(null)} style={{
                  background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
                  borderRadius:8,padding:'6px 10px',color:'#f87171',fontSize:11,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                }}>Quitar</button>
              )}
            </div>
            <input ref={fileRef} type="file" accept="image/*"
              onChange={handlePhoto} style={{display:'none'}}/>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>
              También puedes usar un avatar de abajo
            </div>
          </div>
        </div>

        {/* Nombre */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif'}}>Nombre en la sala</label>
          <input value={name} onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSave()}
            placeholder="¿Cómo quieres que te vean?"
            style={{width:'100%',padding:'11px 14px',borderRadius:10,
              background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,208,0,.15)',
              color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif'}}/>
        </div>

        {/* Avatar */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif'}}>Avatar (si no usas foto)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setAvatar(a)} style={{
                background:avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                border:avatar===a?`2px solid ${color}`:'2px solid rgba(255,255,255,.06)',
                borderRadius:10,padding:'7px 2px',fontSize:19,
                display:'flex',alignItems:'center',justifyContent:'center',
                boxShadow:avatar===a?`0 0 12px ${color}55`:'none',transition:'all .15s',
              }}>{a}</button>
            ))}
          </div>
        </div>

        {/* Color */}
        <div style={{marginBottom:20}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:8,
            fontFamily:'Barlow Condensed,sans-serif'}}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setColor(c)} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:color===c?'3px solid white':'3px solid transparent',
                boxShadow:color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
              }}/>
            ))}
          </div>
        </div>

        {err&&<div style={{marginBottom:10,color:'#fca5a5',fontSize:12,
          background:'rgba(239,68,68,.08)',borderRadius:8,padding:'8px 12px'}}>⚠️ {err}</div>}

        <button onClick={handleSave} disabled={!name.trim()||saving} style={{
          width:'100%',padding:13,borderRadius:12,border:'none',
          background:!name.trim()||saving?'var(--muted2)':'linear-gradient(135deg,#ffd000,#e6a800)',
          color:!name.trim()||saving?'var(--muted)':'#07091f',
          fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
          letterSpacing:'.06em',textTransform:'uppercase',
          display:'flex',alignItems:'center',justifyContent:'center',gap:8,
        }}>
          {saving?<><Spinner size={18} color="#07091f"/>Guardando...</>:'Guardar cambios ✓'}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════ MODAL ASISTENCIA ════════════════════════ */
function AttendanceModal({myAtt,gameHistory,onClose}){
  const[activeTab,setActiveTab]=useState('asistencia');
  const sessions=Object.entries(myAtt||{}).sort((a,b)=>b[0].localeCompare(a[0]));
  // Agrupar por mes
  const byMonth={};
  sessions.forEach(([sid])=>{
    const d=new Date(sid+'T12:00:00');
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[key]) byMonth[key]=[];
    byMonth[key].push(sid);
  });

  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio',
    'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,maxHeight:'85vh',overflowY:'auto',
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'20px 20px 0 0',padding:'20px 18px 32px',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,
          background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📊 Mi asistencia
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Resumen */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
          {[
            {label:'Total clases',  value:sessions.length,    color:'#ffd000'},
            {label:'Este año',      value:sessions.filter(([s])=>s.startsWith(new Date().getFullYear().toString())).length, color:'#10b981'},
            {label:'Último mes',    value:Object.values(byMonth)[0]?.length||0, color:'#22d3ee'},
          ].map(st=>(
            <div key={st.label} style={{
              background:'rgba(255,255,255,.03)',borderRadius:10,padding:'10px 8px',
              borderLeft:`3px solid ${st.color}`,textAlign:'center',
            }}>
              <div style={{fontSize:24,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
              <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:10,
          padding:3,marginBottom:16,border:'1px solid rgba(255,208,0,.08)'}}>
          {[{id:'asistencia',l:'📅 Asistencia'},{id:'juegos',l:'🏆 Juegos'}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{
              flex:1,padding:'7px 4px',borderRadius:8,border:'none',
              background:activeTab===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:activeTab===t.id?'#07091f':'var(--muted)',
              fontSize:12,fontWeight:700,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.03em',textTransform:'uppercase',transition:'all .2s',
            }}>{t.l}</button>
          ))}
        </div>

        {activeTab==='asistencia'&&(<>
          {sessions.length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
              Aún no tienes asistencias registradas
            </div>
          )}
          {Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([key,days])=>{
            const[year,month]=key.split('-');
            return(
              <div key={key} style={{marginBottom:14}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                  fontSize:13,color:'var(--muted)',textTransform:'uppercase',
                  letterSpacing:'.07em',marginBottom:8}}>
                  {monthNames[parseInt(month)-1]} {year}
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {days.map(sid=>(
                    <div key={sid} style={{background:'rgba(16,185,129,.08)',padding:'7px 10px',
                      borderRadius:10,textAlign:'center',border:'1px solid rgba(16,185,129,.2)'}}>
                      <div style={{fontSize:16,marginBottom:2}}>✅</div>
                      <div style={{fontSize:9,color:'#10b981',fontFamily:'Barlow Condensed,sans-serif'}}>
                        {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </>)}

        {activeTab==='juegos'&&(()=>{
          const games=Object.entries(gameHistory||{})
            .map(([id,g])=>({id,...g}))
            .sort((a,b)=>b.date?.localeCompare(a.date||'')||0);
          const wins=games.filter(g=>g.rank===1).length;
          const top3=games.filter(g=>g.rank<=3).length;
          return(<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
              {[
                {label:'Partidas',value:games.length,color:'#8b5cf6'},
                {label:'🥇 Ganadas',value:wins,color:'#ffd000'},
                {label:'🏅 Top 3',value:top3,color:'#f59e0b'},
              ].map(st=>(
                <div key={st.label} style={{background:'rgba(255,255,255,.03)',borderRadius:10,
                  padding:'10px 8px',borderLeft:`3px solid ${st.color}`,textAlign:'center'}}>
                  <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',
                    fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
                  <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                    textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
                </div>
              ))}
            </div>
            {games.length===0&&(
              <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
                Aún no has jugado ningún juego
              </div>
            )}
            {games.map(g=>(
              <div key={g.id} style={{display:'flex',alignItems:'center',gap:12,
                background:g.rank===1?'rgba(255,208,0,.07)':'rgba(255,255,255,.03)',
                border:g.rank===1?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
                borderRadius:12,padding:'10px 14px',marginBottom:7}}>
                <div style={{fontSize:22,width:28,textAlign:'center'}}>
                  {g.rank===1?'🥇':g.rank===2?'🥈':g.rank===3?'🥉':`#${g.rank}`}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:'var(--muted)',
                    fontFamily:'Barlow Condensed,sans-serif',textTransform:'uppercase',
                    letterSpacing:'.05em'}}>
                    {g.date?new Date(g.date+'T12:00:00').toLocaleDateString('es-CL',
                      {day:'numeric',month:'short',year:'numeric'}):''}
                  </div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
                    {g.rank}° de {g.totalPlayers} jugadores
                  </div>
                </div>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                  fontSize:20,color:'#ffd000'}}>{g.score} pts</div>
              </div>
            ))}
          </>);
        })()}
      </div>
    </div>
  );
}

/* ════════════════════════ ADMIN STATS MODAL ════════════════════════ */
function AdminStatsModal({onClose}){
  const[data,setData]=useState([]);
  const[loading,setLoading]=useState(true);
  const[selected,setSelected]=useState(null);
  const[tab,setTab]=useState('jovenes');
  const[search,setSearch]=useState('');
  const monthNames=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  useEffect(()=>{
    Promise.all([
      db.ref('profiles').get(),
      db.ref('attendance').get(),
      db.ref('gameHistory').get(),
    ]).then(([pSnap,aSnap,gSnap])=>{
      const profiles=pSnap.val()||{};
      const attendance=aSnap.val()||{};
      const history=gSnap.val()||{};
      const list=Object.entries(profiles)
        .filter(([,p])=>p&&p.name)
        .map(([uid,p])=>({
          uid,...p,
          attCount:Object.keys(attendance[uid]||{}).length,
          attThisYear:Object.keys(attendance[uid]||{}).filter(s=>s.startsWith(new Date().getFullYear().toString())).length,
          attSessions:Object.keys(attendance[uid]||{}).sort().reverse(),
          gameCount:Object.keys(history[uid]||{}).length,
          gameWins:Object.values(history[uid]||{}).filter(g=>g.rank===1).length,
          gameTop3:Object.values(history[uid]||{}).filter(g=>g.rank<=3).length,
          games:Object.entries(history[uid]||{}).map(([id,g])=>({id,...g})).sort((a,b)=>b.date?.localeCompare(a.date||'')||0),
        }))
        .sort((a,b)=>b.attCount-a.attCount);
      setData(list);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const filtered=data.filter(u=>u.name?.toLowerCase().includes(search.toLowerCase()));
  const gameRankings=[...data].sort((a,b)=>(b.gameWins-a.gameWins)||(b.gameTop3-a.gameTop3)||(b.gameCount-a.gameCount));

  return(
    <div style={{position:'fixed',inset:0,zIndex:210,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.8)',backdropFilter:'blur(6px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:520,maxHeight:'90vh',overflowY:'auto',
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'22px 22px 0 0',padding:'18px 18px 32px',
        animation:'modalIn .28s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.2)',margin:'0 auto 14px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:20,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📊 Estadísticas Globales
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
          {[
            {label:'Jóvenes',value:data.length,icon:'👥',color:'#ffd000'},
            {label:'Asistencias',value:data.reduce((s,u)=>s+u.attCount,0),icon:'📅',color:'#10b981'},
            {label:'Partidas',value:data.reduce((s,u)=>s+u.gameCount,0),icon:'🎮',color:'#8b5cf6'},
          ].map(st=>(
            <div key={st.label} style={{background:'rgba(255,255,255,.04)',borderRadius:12,
              padding:'10px 8px',textAlign:'center',
              border:`1px solid ${st.color}22`,borderTop:`3px solid ${st.color}`}}>
              <div style={{fontSize:20,marginBottom:4}}>{st.icon}</div>
              <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                color:st.color,lineHeight:1}}>{st.value}</div>
              <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:10,
          padding:3,marginBottom:14,border:'1px solid rgba(255,208,0,.08)'}}>
          {[{id:'jovenes',l:'👥 Jóvenes'},{id:'rankings',l:'🏆 Rankings'}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1,padding:'7px 4px',borderRadius:8,border:'none',
              background:tab===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:tab===t.id?'#07091f':'var(--muted)',
              fontSize:12,fontWeight:700,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.03em',textTransform:'uppercase',transition:'all .2s'}}>
              {t.l}
            </button>
          ))}
        </div>

        {loading&&(<div style={{display:'flex',justifyContent:'center',padding:'30px 0'}}><Spinner size={28}/></div>)}

        {!loading&&tab==='jovenes'&&(<>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Buscar joven..."
            style={{width:'100%',padding:'9px 14px',borderRadius:10,
              background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,208,0,.15)',
              color:'var(--white)',fontSize:13,fontFamily:'Barlow,sans-serif',
              marginBottom:12,outline:'none'}}/>

          {selected&&(()=>{
            const u=data.find(x=>x.uid===selected);
            if(!u) return null;
            const byMonth={};
            u.attSessions.forEach(sid=>{
              const d=new Date(sid+'T12:00:00');
              const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
              if(!byMonth[key]) byMonth[key]=[];
              byMonth[key].push(sid);
            });
            return(
              <div style={{background:'rgba(255,255,255,.03)',borderRadius:14,
                padding:14,marginBottom:12,border:'1px solid rgba(255,208,0,.12)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                  <AvatarBubble profile={u} size={40}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:'white'}}>{u.name}</div>
                    <div style={{fontSize:10,color:'var(--muted)'}}>{u.isAdmin?'👑 Admin':'Joven'}</div>
                  </div>
                  <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:18}}>✕</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:12}}>
                  {[
                    {l:'Clases',v:u.attCount,c:'#ffd000'},
                    {l:'Este año',v:u.attThisYear,c:'#10b981'},
                    {l:'🎮 Jugadas',v:u.gameCount,c:'#8b5cf6'},
                    {l:'🥇 Ganadas',v:u.gameWins,c:'#f59e0b'},
                  ].map(st=>(
                    <div key={st.l} style={{background:'rgba(255,255,255,.03)',
                      borderRadius:8,padding:'7px 4px',textAlign:'center',borderTop:`2px solid ${st.c}`}}>
                      <div style={{fontSize:18,fontFamily:'Barlow Condensed,sans-serif',
                        fontWeight:900,color:st.c}}>{st.v}</div>
                      <div style={{fontSize:8,color:'var(--muted)',textTransform:'uppercase',
                        letterSpacing:'.04em'}}>{st.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',
                  textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Asistencias</div>
                {Object.entries(byMonth).slice(0,3).map(([key,days])=>{
                  const[yr,mo]=key.split('-');
                  return(
                    <div key={key} style={{marginBottom:7}}>
                      <div style={{fontSize:9,color:'var(--muted)',marginBottom:3}}>
                        {monthNames[parseInt(mo)-1]} {yr}
                      </div>
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        {days.map(sid=>(
                          <div key={sid} style={{background:'rgba(16,185,129,.1)',
                            border:'1px solid rgba(16,185,129,.2)',
                            borderRadius:6,padding:'3px 7px',fontSize:9,color:'#10b981'}}>
                            ✅ {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {filtered.map((u,i)=>(
            <div key={u.uid} onClick={()=>setSelected(u.uid===selected?null:u.uid)}
              style={{
                display:'flex',alignItems:'center',gap:10,
                background:selected===u.uid?'rgba(255,208,0,.07)':'rgba(255,255,255,.025)',
                border:selected===u.uid?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
                borderRadius:12,padding:'10px 12px',marginBottom:6,cursor:'pointer',transition:'all .18s',
              }}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                fontSize:14,color:'var(--muted)',width:20,textAlign:'center'}}>{i+1}</div>
              <AvatarBubble profile={u} size={34}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'white'}}>{u.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{u.isAdmin?'👑 Admin · ':''}{u.attCount} clases · {u.gameWins} 🥇</div>
              </div>
              <div style={{background:'rgba(255,208,0,.1)',borderRadius:8,
                padding:'2px 8px',fontSize:11,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:700,color:'#ffd000'}}>{u.attCount}</div>
            </div>
          ))}
          {filtered.length===0&&<div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Sin resultados</div>}
        </>)}

        {!loading&&tab==='rankings'&&(<>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
            fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10}}>
            🏆 Ranking de Juegos
          </div>
          {gameRankings.filter(u=>u.gameCount>0).map((u,i)=>(
            <div key={u.uid} style={{display:'flex',alignItems:'center',gap:10,
              background:i===0?'rgba(255,208,0,.08)':'rgba(255,255,255,.025)',
              border:i===0?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
              borderRadius:12,padding:'10px 12px',marginBottom:6}}>
              <div style={{fontSize:i<3?20:14,width:28,textAlign:'center'}}>
                {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}
              </div>
              <AvatarBubble profile={u} size={34}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'white'}}>{u.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>{u.gameCount} partidas · 🏅 {u.gameTop3} top3</div>
              </div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:18,color:'#ffd000'}}>{u.gameWins}🥇</div>
            </div>
          ))}
          {gameRankings.filter(u=>u.gameCount>0).length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Nadie ha jugado aún</div>
          )}
        </>)}
      </div>
    </div>
  );
}

/* ════════════════════════ SCREEN VIEW (PROYECCIÓN) ════════════════════════ */
function ScreenView({users,session,msgs,reactions,onExit}){
  const phase=session?.phase||'waiting';
  const confra=session?.confra;
  const repaso=session?.repaso;
  const roomRef=useRef();
  const{remaining:confraRemaining}=useTimer(confra?.startTime,PHASE_DURATIONS.confra);
  const{remaining:repasoRemaining}=useTimer(repaso?.startTime,PHASE_DURATIONS.repaso);

  const speakerUid=confra?.active?confra?.queue?.[confra?.currentIdx||0]:null;
  const speaker=speakerUid?users[speakerUid]:null;

  return(
    <div style={{position:'fixed',inset:0,background:'#f8f5ef',overflow:'hidden'}}>
      {/* Canvas con zonas */}
      <div ref={roomRef} style={{width:'100%',height:'100%'}}>
        <RoomCanvas users={users} myId={null} session={session}
          selectedChar={false} onSelectChar={()=>{}} onMoveTo={()=>{}}
          roomRef={roomRef} full={true} reactions={reactions} moveTarget={null}/>
      </div>

      {/* Código QR de acceso — esquina superior izquierda, visible para que la
          gente lo escanee mientras va llegando a la sala. */}
      <div style={{
        position:'absolute',top:16,left:16,zIndex:40,
        background:'#fff',borderRadius:18,padding:'14px 14px 12px',
        boxShadow:'0 12px 32px rgba(10,14,46,.18)',
        border:'1px solid rgba(255,208,0,.4)',
        display:'flex',flexDirection:'column',alignItems:'center',gap:8,
      }}>
        <div style={{
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:15,color:'#0a0e2e',textTransform:'uppercase',
          letterSpacing:'.12em',lineHeight:1,
        }}>📲 Únete</div>
        <img
          src={`https://api.qrserver.com/v1/create-qr-code/?size=360x360&margin=0&data=${encodeURIComponent(window.location.origin+window.location.pathname)}`}
          alt="Escanear para unirse a la sala" width={220} height={220}
          style={{display:'block',borderRadius:8}}/>
        <div style={{
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:10,color:'rgba(10,14,46,.6)',letterSpacing:'.1em',
          textTransform:'uppercase',lineHeight:1,
        }}>Escanea y entra</div>
      </div>

      {/* Panel fase activa - lado derecho */}
      {phase!=='waiting'&&(
        <div style={{
          position:'absolute',top:80,right:16,
          width:170,
          background:'#fff',border:'1px solid rgba(10,14,46,.08)',
          borderRadius:14,padding:14,zIndex:40,
          boxShadow:'0 8px 24px rgba(10,14,46,.12)',
        }}>
          {phase==='confra'&&(
            <>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:11,color:'#a16207',textTransform:'uppercase',
                letterSpacing:'.07em',marginBottom:10}}>🤝 Confraternización</div>
              <TimerDisplay remaining={confraRemaining} color="#eab308"/>
              {speaker&&(
                <div style={{marginTop:10,textAlign:'center'}}>
                  <AvatarBubble profile={speaker} size={40}/>
                  <div style={{fontSize:11,color:'#0a0e2e',marginTop:4,
                    fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
                    {speaker.name}
                  </div>
                  <div style={{fontSize:9,color:'#a16207'}}>compartiendo</div>
                </div>
              )}
            </>
          )}
          {phase==='repaso'&&(
            <>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:11,color:'#c2410c',textTransform:'uppercase',
                letterSpacing:'.07em',marginBottom:10}}>📖 Repaso Bíblico</div>
              <TimerDisplay remaining={repasoRemaining} color="#fb923c"/>
              {repasoRemaining<=0&&(
                <div style={{marginTop:8,fontSize:10,color:'#ef4444',
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                  textAlign:'center',animation:'pulse 1s infinite'}}>
                  TIEMPO EXTRA
                </div>
              )}
            </>
          )}
          {phase==='juegos'&&(
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:4}}>🎮</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:13,color:'#c2410c',textTransform:'uppercase'}}>¡JUEGOS!</div>
            </div>
          )}
          {phase==='mision'&&(
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:4}}>✈️</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:13,color:'#1d4ed8',textTransform:'uppercase'}}>MISIÓN</div>
              <div style={{fontSize:9,color:'#3b82f6',marginTop:4,
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                letterSpacing:'.06em',textTransform:'uppercase'}}>
                {session?.mision?.mode==='projects'?'🌍 Proyectos':'✍️ Compromiso'}
              </div>
            </div>
          )}
          {phase==='templo'&&(
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:4}}>⛪</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:13,color:'#5b21b6',textTransform:'uppercase'}}>TEMPLO</div>
              <div style={{fontSize:9,color:'#7c3aed',marginTop:4,
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                letterSpacing:'.06em',textTransform:'uppercase'}}>📋 Encuesta abierta</div>
            </div>
          )}
        </div>
      )}

      {/* Chat del repaso en pantalla */}
      {phase==='repaso'&&<RepasoChatScreen msgs={msgs} session={session} users={users}/>}

      <button onClick={onExit} style={{
        position:'fixed',bottom:20,right:20,zIndex:100,
        background:'#0a0e2e',border:'1px solid rgba(255,208,0,.3)',
        color:'#ffd000',padding:'8px 16px',borderRadius:20,fontSize:12,
        fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.04em',
      }}>✕ SALIR</button>
    </div>
  );
}

/* ════════════════════════ APP PRINCIPAL ════════════════════════ */
function App(){
  // Auto-actualización: revisa periódicamente si se publicó una versión nueva
  // del index.html y, si cambió APP_VERSION, recarga para que todos (también
  // los participantes) tengan siempre las funciones más recientes.
  useEffect(()=>{
    let stop=false;
    const check=async()=>{
      try{
        const res=await fetch(window.location.pathname+'?v='+Date.now(),{cache:'no-store'});
        const txt=await res.text();
        const m=txt.match(/APP_VERSION='([^']+)'/);
        if(!stop&&m&&m[1]&&m[1]!==APP_VERSION) window.location.reload();
      }catch(e){/* sin red: reintentar luego */}
    };
    const id=setInterval(check,60000);
    return()=>{stop=true;clearInterval(id);};
  },[]);

  /* ── Responsive ── */
  const isMobile=useIsMobile(640);
  /* ── Vista y auth ── */
  const[view,        setView]        =useState('loading');
  const[authMode,    setAuthMode]    =useState('login');
  const[landingTheme,setLandingTheme]=useState('light'); // 'light' | 'dark'
  const[authOpen,    setAuthOpen]    =useState(false);
  const[email,       setEmail]       =useState('');
  const[password,    setPassword]    =useState('');
  const[authError,   setAuthError]   =useState('');
  const[authLoad,    setAuthLoad]    =useState(false);
  const[resetMode,   setResetMode]   =useState(false);
  const[resetSent,   setResetSent]   =useState(false);

  /* ── Perfil ── */
  const[profile,     setProfile]     =useState({name:'',avatar:null,color:'#ffd000',photo:null});
  const[isAdmin,     setIsAdmin]     =useState(false);
  const[setupSaving, setSetupSaving] =useState(false);
  const[setupError,  setSetupError]  =useState('');

  /* ── Modales ── */
  const[editOpen,    setEditOpen]    =useState(false);
  const[attOpen,     setAttOpen]     =useState(false);
  const[adminStats,  setAdminStats]  =useState(false);
  const[endBanner,   setEndBanner]   =useState(null);
  const[kahootOpen,  setKahootOpen]  =useState(false);

  /* ── Sala ── */
  const[users,       setUsers]       =useState({});
  const[msgs,        setMsgs]        =useState([]);
  const[myAtt,       setMyAtt]       =useState({});
  const[session,     setSession]     =useState(null);
  const[reactions,   setReactions]   =useState({});
  const[gameHistory, setGameHistory] =useState({});

  const[repasoChatOpen,setRepasoChatOpen]=useState(false);
  const[presMenuOpen,setPresMenuOpen]=useState(false);
  const[videoMenuOpen,setVideoMenuOpen]=useState(false);
  const[guideOpen,setGuideOpen]=useState(false);
  const[wordCloudOpen, setWordCloudOpen] =useState(false);
  const[misionOpen,    setMisionOpen]    =useState(false);
  // confraOpen: bandera local solo para admin — nunca sobreescrita por el echo de Firebase
  const[confraOpen,    setConfraOpen]    =useState(false);

  const[chatReactions,  setChatReactions]  =useState({});
  const[attNotify,      setAttNotify]      =useState(false);
  const[surveyOpen,     setSurveyOpen]     =useState(false);
  const[adminSurvey,    setAdminSurvey]    =useState(false);
  const[downloadOpen,   setDownloadOpen]   =useState(false);
  const[surveyResponses,setSurveyResponses]=useState({});
  // Prompt para integrarse a una actividad activa cuando un late-joiner entra a la zona
  const[joinPrompt,     setJoinPrompt]     =useState(null); // {phase,label}
  // QR de acceso visible en la sala (solo admin) — small | medium | large
  const[qrSize,         setQrSize]         =useState('small');
  // Posición personalizada del QR cuando el admin lo arrastra (null = anclado arriba a la derecha)
  const[qrPos,          setQrPos]          =useState(null); // {x,y} en px desde top-left | null
  // Visibilidad del QR (el admin puede ocultarlo/mostrarlo, p. ej. durante la presentación)
  const[qrVisible,      setQrVisible]      =useState(true);
  // Toast cuando todos respondieron la encuesta (solo admin)
  const[surveyAllNotify,setSurveyAllNotify]=useState(null); // {done,total} | null
  const surveyAllNotifyShownRef=useRef(false);

  const UID      =useRef(null);
  const SID      =useRef(getSID());
  const roomRef  =useRef(null);
  const sessionRef=useRef(null);
  const lastPosRef=useRef({zone:'entrada',x:49,y:9});
  const profileRef=useRef({name:'',avatar:null,color:'#ffd000',photo:null});
  // Zonas de actividades activas que el usuario ya rechazó unirse en su entrada actual.
  // Se limpia cuando sale de la zona, para que la próxima entrada vuelva a preguntar.
  const declinedZonesRef=useRef(new Set());
  const prevZoneRef=useRef('entrada');
  // Fase en la que el usuario quedó "integrado" (no puede salir hasta que termine).
  // Se setea si estaba en la zona cuando el admin inició la fase, o al aceptar el prompt.
  const lockedPhaseRef=useRef(null);
  const prevPhaseRef=useRef(null);
  // Encuesta: marcar cuando el usuario cierra/responde para no re-abrir el modal
  // hasta la próxima activación (inactiva→activa) desde Templo.
  const surveyDismissedRef=useRef(false);
  const prevSurveyActiveRef=useRef(false);
  // Presentación: detectar transición inactiva→activa para colapsar el chat.
  const prevPresActiveRef=useRef(false);
  // Repaso: para abrir el chat solo una vez al entrar (no en cada update).
  const repasoAutoRef=useRef(false);

  // Mantener profileRef siempre actualizado para usarlo en reconexión
  useEffect(()=>{ profileRef.current=profile; },[profile]);

  /* ── body class ── */
  useEffect(()=>{
    document.body.classList.remove('in-room','landing','landing-dark');
    if(view==='room'||view==='screen') document.body.classList.add('in-room');
    else if(view==='auth') document.body.classList.add(landingTheme==='dark'?'landing-dark':'landing');
  },[view,landingTheme]);

  /* ── Auth listener ── */
  useEffect(()=>{
    const t=setTimeout(()=>{ if(view==='loading') setView('auth'); },8000);
    const unsub=auth.onAuthStateChanged(async user=>{
      clearTimeout(t);
      if(user){
        UID.current=user.uid;
        const whitelisted=isAdminEmail(user.email);
        try{
          const snap=await db.ref(`profiles/${user.uid}`).get();
          const p=snap.val();
          const adminFlag=!!p?.isAdmin||whitelisted;
          // Persistir admin si fue otorgado por la whitelist y aún no estaba marcado.
          if(whitelisted&&!p?.isAdmin){
            db.ref(`profiles/${user.uid}/isAdmin`).set(true).catch(err=>{
              console.warn('No se pudo persistir isAdmin:',err);
            });
          }
          if(p&&p.name){
            setProfile({...p,isAdmin:adminFlag});
            setIsAdmin(adminFlag);
            await joinRoom(user.uid,p);
            setView('room');
          } else {
            // Setup: dejamos el flag listo para que saveProfile lo persista.
            setIsAdmin(adminFlag);
            setView('setup');
          }
        } catch(e){ console.error(e); setView('setup'); }
      } else { UID.current=null; setView('auth'); }
    });
    return()=>{ clearTimeout(t); unsub(); };
  },[]);

  /* ── Firebase listeners sala ── */
  useEffect(()=>{
    if(view!=='room'&&view!=='screen') return;
    const sid=SID.current, uid=UID.current;
    if(!uid) return;
    // Si el juego terminó (finished/idle) y kahootOpen era true, resetear
    // (se maneja en closeGame)
    const refs={
      users:    db.ref(`rooms/${sid}/users`),
      chat:     db.ref(`rooms/${sid}/chat`),
      att:      db.ref(`attendance/${uid}`),
      sess:     db.ref(`sessions/${sid}`),
      reac:     db.ref(`sessions/${sid}/reactions`),
      hist:     db.ref(`gameHistory/${uid}`),
      banner:   db.ref(`sessions/${sid}/lastBanner`),
      chatRxns: db.ref(`sessions/${sid}/chatReactions`),
      survResp: db.ref(`sessions/${sid}/survey/responses`),
    };
    refs.users.on('value',s=>setUsers(s.val()||{}));
    refs.chat.on('value',s=>{
      const v=s.val();
      if(v) setMsgs(Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
      else setMsgs([]);
    });
    refs.att.on('value',s=>setMyAtt(s.val()||{}));
    refs.sess.on('value',s=>{
      const val=s.val();
      sessionRef.current=val;
      setSession(val);
    });
    refs.reac.on('value',s=>setReactions(s.val()||{}));
    refs.hist.on('value',s=>setGameHistory(s.val()||{}));
    refs.chatRxns.on('value',s=>setChatReactions(s.val()||{}));
    refs.survResp.on('value',s=>setSurveyResponses(s.val()||{}));
    // Listener dedicado para el banner — se dispara directamente en todos los clientes
    let bannerInitialized=false;
    refs.banner.on('value',s=>{
      const val=s.val();
      // Ignorar el valor inicial al montar (para no mostrar banners de sesiones pasadas)
      if(!bannerInitialized){ bannerInitialized=true; return; }
      if(val) setEndBanner(val);
    });
    // Reconexión automática: cuando Firebase vuelve a conectar, reinsertar al usuario
    let connReady=false;
    const connRef=db.ref('.info/connected');
    connRef.on('value',snap=>{
      if(!connReady){connReady=true;return;} // ignorar el primer disparo (conexión inicial)
      if(snap.val()!==true) return;
      const p=profileRef.current;
      if(!p.name) return;
      const pos=lastPosRef.current;
      const uRef=db.ref(`rooms/${sid}/users/${uid}`);
      uRef.set({
        name:p.name,avatar:p.avatar,color:p.color,photo:p.photo||null,
        zone:pos.zone,x:pos.x,y:pos.y,joinedAt:Date.now(),
      });
      uRef.onDisconnect().remove();
    });

    return()=>{
      Object.values(refs).forEach(r=>r.off());
      connRef.off();
    };
  },[view]);

  /* ── Sincronizar estado de actividades desde Firebase ── */
  useEffect(()=>{
    if(!session) return;
    const p=session.phase||'waiting';

    // Confra — abrir solo para los integrantes de la cola (o admin).
    // Late-joiners verán el prompt de unirse al entrar a la zona.
    if(p==='confra'&&session.confra){
      const q=session.confra?.queue||{};
      const arr=Array.isArray(q)?q:Object.values(q);
      if(arr.includes(UID.current)||isAdmin) setConfraOpen(true);
      else setConfraOpen(false);
    } else if(p!=='confra') setConfraOpen(false);

    // Repaso — el chat queda como ícono que cada persona activa (NO se fuerza
    // a pantalla completa). Para los participantes (no admin) se abre UNA sola
    // vez al entrar a la zona, y luego respeta si lo cierran. El admin nunca
    // recibe el chat forzado, así su panel de configuración queda siempre libre.
    const presActive=!!session.presentation?.active;
    if(p==='repaso'&&session.repaso?.active){
      if(!isAdmin&&!presActive&&users[UID.current]?.zone==='repaso'&&!repasoAutoRef.current){
        setRepasoChatOpen(true);
        repasoAutoRef.current=true;
      }
    } else {
      repasoAutoRef.current=false;
    }
    // Al iniciar la presentación (transición inactiva→activa) colapsar el chat
    // para que todos vean la slide; el ícono permite reabrirlo.
    if(presActive&&!prevPresActiveRef.current) setRepasoChatOpen(false);
    prevPresActiveRef.current=presActive;

    // Misión — auto-abrir actividad para usuarios en zona misión o admin
    if(p==='mision'&&session.mision?.active){
      if(users[UID.current]?.zone==='mision'||isAdmin) setMisionOpen(true);
    }

    // Nube de palabras
    if(session.wordcloud?.active===true) setWordCloudOpen(true);
    if(session.wordcloud?.active===false) setWordCloudOpen(false);

    // Cerrar repaso/wordcloud/misión al volver a waiting
    if(p==='waiting'){
      setRepasoChatOpen(false);
      setWordCloudOpen(false);
      setMisionOpen(false);
    }

  },[session]);

  // Encuesta — sólo abre en la transición inactiva→activa (cuando el admin inicia
  // Templo o reabre la encuesta). No reabrir por otros cambios de la sesión
  // (descargas, reacciones, etc.) ni cada vez que llegan respuestas.
  useEffect(()=>{
    const active=!!session?.survey?.active;
    const wasActive=prevSurveyActiveRef.current;
    prevSurveyActiveRef.current=active;
    if(active&&!wasActive){
      // Nueva apertura: limpiar el dismiss y abrir el modal — incluso si ya
      // habían respondido antes (permite actualizar la respuesta).
      surveyDismissedRef.current=false;
      setSurveyOpen(true);
    } else if(!active&&wasActive){
      setSurveyOpen(false);
    }
  },[session]);

  // Notificar al admin cuando todos respondieron la encuesta (una sola vez
  // por activación: el flag se resetea cuando la encuesta se cierra o cuando
  // alguien aún no respondió).
  useEffect(()=>{
    if(!isAdmin||!session?.survey?.active){
      surveyAllNotifyShownRef.current=false;
      return;
    }
    const total=Object.keys(users||{}).length;
    const done=Object.keys(surveyResponses||{}).length;
    if(total>0&&done>=total){
      if(!surveyAllNotifyShownRef.current){
        surveyAllNotifyShownRef.current=true;
        setSurveyAllNotify({done,total});
        setTimeout(()=>setSurveyAllNotify(null),8000);
      }
    } else {
      surveyAllNotifyShownRef.current=false;
    }
  },[users,surveyResponses,session?.survey?.active,isAdmin]);

  /* ── Prompt para integrarse a una actividad activa al entrar a su zona ── */
  useEffect(()=>{
    const me=users[UID.current];
    if(!me) return;
    const p=session?.phase;
    const myZone=me.zone;
    const prevZone=prevZoneRef.current;
    prevZoneRef.current=myZone;

    // Si la fase cambia o no hay actividad: limpiar prompt, rechazos y lock
    if(!p||p==='waiting'){
      declinedZonesRef.current.clear();
      lockedPhaseRef.current=null;
      if(joinPrompt) setJoinPrompt(null);
      return;
    }

    // Auto-integración: solo cuando la fase recién cambia y el usuario YA está
    // en la zona (típicamente estaba ahí cuando el admin inició la fase).
    const phaseChanged=prevPhaseRef.current!==p;
    prevPhaseRef.current=p;
    if(phaseChanged&&myZone===p&&!declinedZonesRef.current.has(p)){
      if(p==='confra'){
        const q=session?.confra?.queue||{};
        const arr=Array.isArray(q)?q:Object.values(q);
        if(arr.includes(UID.current)) lockedPhaseRef.current=p;
      } else {
        lockedPhaseRef.current=p;
      }
    }

    // Admin nunca recibe el prompt
    if(isAdmin){ if(joinPrompt) setJoinPrompt(null); return; }

    // Si el usuario salió de la zona de la fase, limpiar el rechazo
    // para que la próxima entrada vuelva a preguntar
    if(prevZone===p&&myZone!==p){
      declinedZonesRef.current.delete(p);
      if(joinPrompt?.phase===p) setJoinPrompt(null);
    }

    // Si entró a la zona de la fase y no está integrado todavía, preguntar
    if(myZone===p){
      let alreadyIn=lockedPhaseRef.current===p;
      if(p==='confra'){
        const q=session?.confra?.queue||{};
        const arr=Array.isArray(q)?q:Object.values(q);
        if(arr.includes(UID.current)) alreadyIn=true;
      }
      if(!alreadyIn&&!declinedZonesRef.current.has(p)){
        const label=ZONES[p]?.label||p;
        if(joinPrompt?.phase!==p) setJoinPrompt({phase:p,label});
      }
    }
  },[users,session,isAdmin]);

  const handleJoinActivity=async()=>{
    const p=session?.phase;
    if(!p) { setJoinPrompt(null); return; }
    try{
      if(p==='confra'){
        const q=session?.confra?.queue||{};
        const arr=Array.isArray(q)?[...q]:Object.values(q);
        if(!arr.includes(UID.current)){
          arr.push(UID.current);
          const queueObj={};
          arr.forEach((uid,i)=>{queueObj[i]=uid;});
          await db.ref(`sessions/${SID.current}/confra/queue`).set(queueObj);
        }
        setConfraOpen(true);
      } else if(p==='repaso'){
        // Si hay una presentación en curso, NO abrir el chat encima (taparía la
        // slide). El overlay de presentación se muestra solo por su condición de
        // render. El chat queda disponible en su ícono flotante.
        if(!session?.presentation?.active) setRepasoChatOpen(true);
      } else if(p==='mision'){
        setMisionOpen(true);
      }
      // juegos/templo: integrarse = estar en la zona, los modales de juego se abren solos
      lockedPhaseRef.current=p;
    }catch(e){
      console.error('Error integrándose a la actividad:',e);
    }
    declinedZonesRef.current.delete(p);
    setJoinPrompt(null);
  };

  const handleDeclineJoin=()=>{
    const p=session?.phase;
    if(p) declinedZonesRef.current.add(p);
    setJoinPrompt(null);
  };

  /* ── Helpers ── */
  const joinRoom=async(uid,p)=>{

    await uRef.set({
      name:p.name,avatar:p.avatar,color:p.color,photo:p.photo||null,
      zone:'entrada',x:49,y:9,joinedAt:Date.now(),

      await db.ref(`attendance/${uid}/${SID.current}`).set({
        name:p.name,avatar:p.avatar,color:p.color,timestamp:Date.now(),
      });

      setTimeout(()=>setAttNotify(false),4000);
    }
  };

  const toggleSurvey=async()=>{
    const current=session?.survey?.active;
    await db.ref(`sessions/${SID.current}/survey`).update({active:!current});
  };


  const saveProfile=async(newProfile)=>{
    const uid=UID.current;
    if(!uid) return;

    try{
      await db.ref(`profiles/${uid}`).set({...newProfile,isAdmin:isAdmin||false});

          name:newProfile.name,avatar:newProfile.avatar,

  /* ── Auth handlers ── */
  const handleEmailAuth=async()=>{
    if(!email.trim()||!password) return;
    setAuthLoad(true); setAuthError('');
    try{
      if(authMode==='login'){
        await auth.signInWithEmailAndPassword(email.trim(),password);
      } else {
        await auth.createUserWithEmailAndPassword(email.trim(),password);

      }

  };

  const handleReset=async()=>{
    if(!email.trim()) return;
    setAuthLoad(true); setAuthError('');
    try{
      await auth.sendPasswordResetEmail(email.trim());
      setResetSent(true);
    }catch(e){
      setAuthError(getErr(e.code)||'No se pudo enviar el correo. Verifica el email.');
    }
    setAuthLoad(false);
  };

  const handleGoogle=async()=>{
    setAuthLoad(true); setAuthError('');
    try{
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }catch(e){

        setAuthError(getErr(e.code));

  const handleSignOut=async()=>{

  };

  /* ── Drag to move ── */
  const handleDragMove=useCallback((x,y)=>{
    const uid=UID.current;
    if(!uid) return;
    const sess=sessionRef.current;
    const phase=sess?.phase;
    if(phase&&phase!=='waiting'){

      // El resto (late-joiners o quienes rechazaron) puede moverse libremente.
      let inActivity=lockedPhaseRef.current===phase;
      if(phase==='confra'){
        const q=sess?.confra?.queue||{};
        const arr=Array.isArray(q)?q:Object.values(q);
        if(arr.includes(uid)) inActivity=true;
      }
      if(inActivity) return;
    }
    const zone=detectZone(x,y);
    lastPosRef.current={zone,x,y};
    db.ref(`rooms/${SID.current}/users/${uid}`).update({x,y,zone});
  },[]);

  /* ── Chat ── */
  const handleSend=(text,extra={})=>{
    if(!text?.trim()&&!extra.imageData) return;
    const me=users[UID.current];
    if(!me) return;
    db.ref(`rooms/${SID.current}/chat`).push({

  /* ── Reaccionar ── */
  const handleReact=async(reactionId)=>{
    const confra=session?.confra;
    if(!confra) return;
    const rawQueue=confra.queue||{};
    const qArr=Array.isArray(rawQueue)?rawQueue:Object.values(rawQueue);
    const cIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
    const sUid=qArr[cIdx];
    if(!sUid) return;
    const ref=db.ref(`sessions/${SID.current}/reactions/${sUid}/${UID.current}/${reactionId}`);
    const snap=await ref.get();
    if(snap.val()) ref.remove();
    else ref.set(true);
  };

  // Reacciones del usuario actual para el speaker actual
  const myReactions=useMemo(()=>{
    const confra=session?.confra;
    if(!confra) return {};
    const rawQueue=confra.queue||{};
    const qArr=Array.isArray(rawQueue)?rawQueue:Object.values(rawQueue);
    const cIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
    const sUid=qArr[cIdx];
    if(!sUid) return {};
    return reactions?.[sUid]?.[UID.current]||{};
  },[reactions,session]);

  /* ── Admin: gestión de fases ── */
  const startConfra=async(confraUsers)=>{
    if(confraUsers.length===0) return;
    const uids=confraUsers.map(([uid])=>uid).sort(()=>Math.random()-.5);
    const queueObj={};
    uids.forEach((uid,i)=>{ queueObj[i]=uid; });
    // Mostrar panel inmediatamente en el admin (antes del echo de Firebase)
    setConfraOpen(true);
    try{
      await db.ref(`sessions/${SID.current}`).set({
        phase:'confra',
        confra:{active:true,queue:queueObj,currentIdx:0,startTime:Date.now()}
      });
    }catch(e){
      console.error('Error iniciando confra:',e);
      setConfraOpen(false);
    }
  };

  const nextSpeaker=async()=>{
    const confra=session?.confra;
    if(!confra) return;
    const rawQueue=confra.queue||{};
    const queue=Array.isArray(rawQueue)?rawQueue:Object.values(rawQueue);
    const currentIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
    const next=currentIdx+1;
    if(next>=queue.length){
      await endConfra();
    } else {
      await db.ref(`sessions/${SID.current}/confra/currentIdx`).set(next);
      await db.ref(`sessions/${SID.current}/reactions`).remove();
    }
  };

  const endPresentation=async()=>{

  const endVideo=async()=>{

  const toggleWordCloud=async(question='')=>{

  const startJuegos=async()=>{

  const endJuegos=async()=>{

  const startMision=async(_misionUsers=[],mode='commitments')=>{

        phase:'mision',
        mision:{active:true,startTime:Date.now(),mode},

  const endMision=async()=>{
    setMisionOpen(false);
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','mision/active':false});
  };

  const startTemplo=async()=>{
    try{
      // Al ir a Templo se abre automáticamente la encuesta semanal.
      // Si ya hubo una apertura previa el mismo día, preservar las respuestas
      // existentes: si los usuarios responden de nuevo, el `set` por uid las
      // sobreescribe; si no, queda la última respuesta registrada.
      const sessRef=db.ref(`sessions/${SID.current}`);
      const respSnap=await sessRef.child('survey/responses').get();
      const responses=respSnap.val();
      await sessRef.set({

  const endTemplo=async()=>{

      'survey/active':false,

  const resetSession=async()=>{

    setWordCloudOpen(false);
    setRepasoChatOpen(false);

      await db.ref(`sessions/${SID.current}`).set({phase:'waiting'});
      await db.ref(`rooms/${SID.current}/chat`).remove();
    }catch(e){ console.error('Error reiniciando sesión:',e); }
