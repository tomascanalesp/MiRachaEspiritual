/* Controlador principal de Dibujando la Biblia. */
function DibujaController({session,users,myId,isAdmin,SID,onClose}){
  const game=session?.dibuja;
  const gState=game?.gameState;
  const teams=game?.teams||{};
  const order=game?.order||[];
  const turnIdx=game?.turnIdx||0;
  const turnTeamId=order[turnIdx];
  const turnTeam=teams[turnTeamId];
  const phase=game?.phase||'idle';
  const card=game?.card;
  const mode=game?.mode;
  const allPlay=!!game?.allPlay;
  const TURN_SECONDS=90;
  const[timeLeft,setTimeLeft]=useState(TURN_SECONDS);
  const timerRef=useRef(null);

  const juegosUsers=Object.entries(users||{}).filter(([_,u])=>u.zone==='juegos').map(([uid,u])=>({uid,...u}));
  const myTeamId=order.find(tid=>teams[tid]?.members?.[myId]);
  const isMyTurn=myTeamId===turnTeamId;
  const drawerId=game?.currentDrawer;
  const isDrawer=drawerId===myId;
  // ¿Puedo ver la palabra? Solo el dibujante (y el admin). El equipo adivina.
  const canSeeWord=isDrawer||isAdmin;
  // ¿Puedo dibujar? El dibujante actual, solo si el modo es dibujo.
  const canDraw=isDrawer&&mode==='dibujo'&&phase==='draw';

  // Timer de la ronda
  useEffect(()=>{
    if(phase!=='draw'||!game?.roundStartTime){setTimeLeft(TURN_SECONDS);return;}
    const tick=()=>{
      const left=Math.max(0,TURN_SECONDS-Math.floor((Date.now()-game.roundStartTime)/1000));
      setTimeLeft(left);
    };
    tick(); timerRef.current=setInterval(tick,500);
    return()=>clearInterval(timerRef.current);
  },[phase,game?.roundStartTime]);

  const ref=()=>db.ref(`sessions/${SID}/dibuja`);
  const clearDrawing=()=>{ ref().child('strokes').remove(); ref().child('live').remove(); };

  // ── Acciones admin ──
  const teamDrawer=(team)=>{
    const m=Object.keys(team?.members||{});
    if(m.length===0) return null;
    return m[(team.drawerIdx||0)%m.length];
  };
  const sacarCarta=async()=>{
    const sq=DIBUJA_BOARD[turnTeam?.pos||0];
    const isAll=sq?.type==='all';
    const cat=(sq&&DIBUJA_CATS[sq.type])?sq.type:null;
    const newCard=cat?dibujaRandomCardForCat(cat):dibujaRandomCard();
    clearDrawing();
    await ref().update({card:newCard,allPlay:isAll,currentDrawer:teamDrawer(turnTeam),
      phase:'mode',mode:null,modeRoll:null,moveRoll:null});
  };
  const tirarModo=async()=>{
    const val=Math.random()<0.5?'mimica':'dibujo';
    await ref().update({mode:val,modeRoll:{value:val,ts:Date.now()}});
    setTimeout(()=>{ ref().update({phase:'draw',roundStartTime:Date.now()}); },750);
  };
  const otraCarta=async()=>{
    const sq=DIBUJA_BOARD[turnTeam?.pos||0];
    const cat=(sq&&DIBUJA_CATS[sq.type])?sq.type:null;
    clearDrawing();
    await ref().update({card:cat?dibujaRandomCardForCat(cat):dibujaRandomCard(),roundStartTime:Date.now()});
  };
  // Adivinaron: el equipo que adivinó (winnerTeamId) tira el dado y avanza.
  const adivinaron=async(winnerTeamId)=>{
    const move=1+Math.floor(Math.random()*6);
    await ref().update({moveRoll:{value:move,ts:Date.now()},phase:'moved',lastWinner:winnerTeamId});
    setTimeout(async()=>{
      const wTeam=teams[winnerTeamId];
      const newPos=Math.min(DIBUJA_GOAL,(wTeam.pos||0)+move);
      const updates={};
      updates[`teams/${winnerTeamId}/pos`]=newPos;
      // rota el dibujante de ese equipo para la próxima
      const memCount=Object.keys(wTeam.members||{}).length||1;
      updates[`teams/${winnerTeamId}/drawerIdx`]=((wTeam.drawerIdx||0)+1)%memCount;
      if(newPos>=DIBUJA_GOAL){
        updates['gameState']='finished'; updates['winner']=winnerTeamId;
      } else {
        // el turno pasa al equipo que adivinó (gana el dado y el turno)
        updates['turnIdx']=order.indexOf(winnerTeamId);
        updates['phase']='idle'; updates['card']=null; updates['mode']=null;
        updates['modeRoll']=null; updates['moveRoll']=null; updates['allPlay']=false;
      }
      await ref().update(updates);
      clearDrawing();
    },1400);
  };
  const seAcaboTiempo=async()=>{
    clearDrawing();
    await ref().update({turnIdx:(turnIdx+1)%order.length,phase:'idle',card:null,
      mode:null,modeRoll:null,moveRoll:null,allPlay:false});
  };
  const finalizar=async()=>{ await ref().update({gameState:'finished'}); };
  const cerrar=async()=>{
    await ref().remove();
    await db.ref(`sessions/${SID}`).update({phase:'waiting'});
    if(onClose) onClose();
  };
  // Pasar de armado de equipos a votación de capitanes.
  const irACapitanes=async()=>{ await ref().update({gameState:'captains',votes:null}); };
  // Cada jugador vota por el capitán de SU equipo.
  const votarCapitan=async(targetUid)=>{
    if(!myTeamId) return;
    await ref().child(`votes/${myTeamId}/${myId}`).set(targetUid);
  };
  // Cerrar votación: define capitán de cada equipo (más votos; desempate aleatorio).
  const cerrarVotacion=async()=>{
    const votes=game?.votes||{};
    const updates={};
    order.forEach(tid=>{
      const members=Object.keys(teams[tid]?.members||{});
      if(members.length===0) return;
      const tally={};
      members.forEach(m=>tally[m]=0);
      Object.values(votes[tid]||{}).forEach(v=>{ if(tally[v]!==undefined) tally[v]++; });
      let best=members[0],bestN=-1;
      members.forEach(m=>{ if(tally[m]>bestN){bestN=tally[m];best=m;} });
      updates[`teams/${tid}/captain`]=best;
    });
    updates['gameState']='rolloff';
    updates['startRolls']=null;
    await ref().update(updates);
  };
  // Tiro para definir quién comienza: cada equipo tira; mayor empieza.
  const tirarInicio=async(tid)=>{
    const val=1+Math.floor(Math.random()*6);
    await ref().child(`startRolls/${tid}`).set({value:val,ts:Date.now()});
  };
  const comenzarPartida=async()=>{
    const rolls=game?.startRolls||{};
    let bestTid=order[0],bestN=-1;
    order.forEach(tid=>{ const v=rolls[tid]?.value||0; if(v>bestN){bestN=v;bestTid=tid;} });
    await ref().update({gameState:'playing',turnIdx:order.indexOf(bestTid),
      phase:'idle',card:null,mode:null,modeRoll:null,moveRoll:null,allPlay:false,
      currentDrawer:null,strokes:null,live:null});
  };

  const myZone=users[myId]?.zone;
  if(myZone!=='juegos'&&!isAdmin) return null;

  // ── SETUP (armado de equipos) ──
  if(gState==='setup'){
    if(isAdmin) return <DibujaSetup game={game} SID={SID} juegosUsers={juegosUsers} onCancel={cerrar} onContinue={irACapitanes}/>;
    return <DibujaTeamsWatch teams={teams} order={order} users={users}
      title="Dibujando la Biblia" subtitle="El anfitrión está armando los equipos"/>;
  }

  // ── CAPITANES (cada equipo vota por separado) ──
  if(gState==='captains'){
    const votes=game?.votes||{};
    // Vista para jugadores: votan dentro de su equipo.
    return(
      <div style={{position:'fixed',inset:0,zIndex:250,background:'rgba(7,9,31,.97)',
        backdropFilter:'blur(8px)',display:'flex',flexDirection:'column',alignItems:'center',
        padding:'20px 16px',gap:14,overflowY:'auto'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:40}}>👑</div>
          <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:24,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em',margin:0}}>Elijan a su capitán</h2>
          <p style={{color:'var(--muted)',fontSize:13,marginTop:4}}>Cada equipo vota por separado</p>
        </div>

        {/* Mi equipo: votar */}
        {myTeamId&&(()=>{
          const team=teams[myTeamId];
          const members=Object.keys(team?.members||{});
          const myVote=votes[myTeamId]?.[myId];
          const tally={}; members.forEach(m=>tally[m]=0);
          Object.values(votes[myTeamId]||{}).forEach(v=>{ if(tally[v]!==undefined) tally[v]++; });
          return(
            <div style={{width:'100%',maxWidth:420,background:`${team.color}1a`,
              border:`1px solid ${team.color}55`,borderRadius:14,padding:'12px 14px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <span style={{fontSize:22}}>{team.avatar}</span>
                <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,
                  color:team.color}}>{team.name} · tu voto</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {members.map(uid=>users[uid]).filter(Boolean).map(u=>(
                  <button key={u.uid} onClick={()=>votarCapitan(u.uid)} style={{display:'flex',alignItems:'center',gap:8,
                    background:myVote===u.uid?`${team.color}33`:'rgba(255,255,255,.05)',
                    border:myVote===u.uid?`2px solid ${team.color}`:'1px solid rgba(255,255,255,.12)',
                    borderRadius:10,padding:'8px 10px',cursor:'pointer',color:'#fff',
                    fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:14,textAlign:'left'}}>
                    <AvatarBubble profile={u} size={26}/>
                    <span style={{flex:1}}>{u.name}{u.uid===myId?' (tú)':''}</span>
                    <span style={{background:'rgba(255,255,255,.1)',borderRadius:20,padding:'1px 9px',
                      fontSize:13,fontWeight:900}}>{tally[u.uid]||0}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        })()}
        {!myTeamId&&!isAdmin&&(
          <div style={{color:'var(--muted)',fontSize:13}}>No estás en ningún equipo.</div>
        )}

        {/* Admin: progreso + cerrar votación */}
        {isAdmin&&(
          <div style={{width:'100%',maxWidth:420,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,
              color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.12em'}}>Progreso de votación</div>
            {order.map(tid=>{
              const team=teams[tid];
              const memN=Object.keys(team?.members||{}).length;
              const votedN=Object.keys(votes[tid]||{}).length;
              return(
                <div key={tid} style={{display:'flex',alignItems:'center',gap:8,
                  background:'rgba(255,255,255,.04)',borderRadius:10,padding:'8px 10px'}}>
                  <span style={{fontSize:18}}>{team?.avatar}</span>
                  <span style={{flex:1,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:14,color:'#fff'}}>{team?.name}</span>
                  <span style={{fontSize:12,color:votedN>=memN&&memN>0?'#10b981':'var(--muted)',fontWeight:700}}>{votedN}/{memN} votaron</span>
                </div>
              );
            })}
            <button onClick={cerrarVotacion} style={{padding:'13px',borderRadius:12,border:'none',
              background:'linear-gradient(135deg,#ffd000,#e6a800)',color:'#0a0e2e',
              fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14,
              letterSpacing:'.05em',textTransform:'uppercase',cursor:'pointer'}}>
              ✅ Cerrar votación y continuar
            </button>
          </div>
        )}
      </div>
    );
  }

  // ── ROLLOFF (quién comienza: mayor dado) ──
  if(gState==='rolloff'){
    const rolls=game?.startRolls||{};
    const allRolled=order.every(tid=>rolls[tid]);
    let leader=null,leadN=-1;
    order.forEach(tid=>{ const v=rolls[tid]?.value||0; if(v>leadN){leadN=v;leader=tid;} });
    return(
      <div style={{position:'fixed',inset:0,zIndex:250,background:'rgba(7,9,31,.97)',
        backdropFilter:'blur(8px)',display:'flex',flexDirection:'column',alignItems:'center',
        padding:'20px 16px',gap:14,overflowY:'auto'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:40}}>🎲</div>
          <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:24,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em',margin:0}}>¿Quién comienza?</h2>
          <p style={{color:'var(--muted)',fontSize:13,marginTop:4}}>Cada equipo tira un dado · el mayor empieza</p>
        </div>
        <div style={{width:'100%',maxWidth:420,display:'flex',flexDirection:'column',gap:8}}>
          {order.map(tid=>{
            const team=teams[tid];
            const roll=rolls[tid];
            const isLeader=allRolled&&tid===leader;
            const captainUid=team?.captain;
            const iAmCaptain=captainUid===myId;
            return(
              <div key={tid} style={{display:'flex',alignItems:'center',gap:10,
                background:isLeader?'rgba(255,208,0,.16)':`${team?.color}1a`,
                border:isLeader?'2px solid #ffd000':`1px solid ${team?.color}55`,
                borderRadius:12,padding:'10px 12px'}}>
                <span style={{fontSize:22}}>{team?.avatar}</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:15,color:'#fff'}}>{team?.name}</div>
                  {captainUid&&users[captainUid]&&(
                    <div style={{fontSize:11,color:'var(--muted)'}}>👑 Capitán: {users[captainUid].name}</div>
                  )}
                </div>
                {roll
                  ? <DibujaDie roll={roll} size={44}/>
                  : (iAmCaptain||isAdmin)
                    ? <button onClick={()=>tirarInicio(tid)} style={{padding:'8px 14px',borderRadius:10,border:'none',
                        background:team?.color||'#ffd000',color:'#0a0e2e',fontFamily:'Barlow Condensed,sans-serif',
                        fontWeight:900,fontSize:13,letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>🎲 Tirar</button>
                    : <span style={{fontSize:12,color:'var(--muted)'}}>esperando…</span>}
              </div>
            );
          })}
        </div>
        {isAdmin&&(
          <button onClick={comenzarPartida} disabled={!allRolled} style={{width:'100%',maxWidth:420,
            padding:'13px',borderRadius:12,border:'none',cursor:allRolled?'pointer':'not-allowed',
            background:allRolled?'linear-gradient(135deg,#ffd000,#e6a800)':'rgba(255,255,255,.1)',
            color:allRolled?'#0a0e2e':'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',
            fontWeight:900,fontSize:14,letterSpacing:'.05em',textTransform:'uppercase'}}>
            {allRolled?`🎨 Comienza ${teams[leader]?.name}`:'Faltan equipos por tirar'}
          </button>
        )}
      </div>
    );
  }

  // ── FINISHED ──
  if(gState==='finished'){
    const ranking=order.map(tid=>teams[tid]).filter(Boolean).sort((a,b)=>(b.pos||0)-(a.pos||0));
    const winner=game?.winner?teams[game.winner]:ranking[0];
    return(
      <div style={{position:'fixed',inset:0,zIndex:250,background:'rgba(7,9,31,.97)',
        backdropFilter:'blur(8px)',display:'flex',flexDirection:'column',alignItems:'center',
        justifyContent:'center',padding:24,gap:14,overflowY:'auto'}}>
        <Confetti/>
        <div style={{fontSize:56}}>🏆</div>
        <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:28,
          color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em',margin:0,textAlign:'center'}}>
          ¡{winner?.name||'Equipo'} ganó! {winner?.avatar}
        </h2>
        <div style={{width:'100%',maxWidth:420,display:'flex',flexDirection:'column',gap:8,marginTop:8}}>
          {ranking.map((t,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:14,
              background:i===0?'linear-gradient(135deg,rgba(255,208,0,.22),rgba(255,208,0,.06))':'rgba(255,255,255,.05)',
              border:i===0?'2px solid #ffd000':`1px solid ${t.color}55`}}>
              <span style={{fontSize:26}}>{t.avatar}</span>
              <div style={{flex:1,fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:18,color:'#fff'}}>{t.name}</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,color:'#ffd000'}}>
                {Math.round(((t.pos||0)/DIBUJA_GOAL)*100)}%
              </div>
            </div>
          ))}
        </div>
        {isAdmin&&(<button onClick={cerrar} style={{marginTop:14,background:'#ffd000',border:'none',
          borderRadius:14,padding:'14px 32px',color:'#07091f',fontWeight:900,fontSize:14,
          fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase',cursor:'pointer'}}>Cerrar juego</button>)}
      </div>
    );
  }

  // ── PLAYING ──
  const cat=card?DIBUJA_CATS[card.category]:null;
  const timeColor=timeLeft<15?'#ef4444':timeLeft<35?'#f97316':'#ffd000';
  const drawer=drawerId?users[drawerId]:null;
  return(
    <div style={{position:'fixed',inset:0,zIndex:250,background:'rgba(7,9,31,.97)',
      backdropFilter:'blur(8px)',display:'flex',flexDirection:'column',alignItems:'center',
      padding:'16px 14px',gap:12,overflowY:'auto'}}>

      {/* Encabezado de turno */}
      <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,
          background:`${turnTeam?.color||'#ffd000'}22`,border:`1px solid ${turnTeam?.color||'#ffd000'}66`,
          borderRadius:30,padding:'6px 14px'}}>
          <span style={{fontSize:22}}>{turnTeam?.avatar}</span>
          <div>
            <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>Turno de</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:15,color:'#fff'}}>
              {allPlay?'¡TODOS PARTICIPAN!':turnTeam?.name}
            </div>
          </div>
        </div>
        {phase==='draw'&&(
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:30,color:timeColor}}>
            {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}
          </div>
        )}
      </div>

      {/* Tablero */}
      <div style={{width:'100%',maxWidth:440}}>
        <DibujaBoard teams={teams} order={order}/>
      </div>

      {/* Dados */}
      {(phase==='mode'||phase==='moved')&&(
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          {game?.modeRoll&&(
            <div style={{textAlign:'center'}}>
              <DibujaDie roll={game.modeRoll} faces={{mimica:'🎭',dibujo:'✏️'}}/>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:10,
                color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:4}}>
                {game.modeRoll.value==='mimica'?'Mímica':'Dibujo'}
              </div>
            </div>
          )}
          {game?.moveRoll&&phase==='moved'&&(
            <div style={{textAlign:'center'}}>
              <DibujaDie roll={game.moveRoll}/>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:10,
                color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:4}}>Avanza {game.moveRoll.value}</div>
            </div>
          )}
        </div>
      )}

      {/* Carta + lienzo (durante draw) */}
      {phase==='draw'&&(
        <div style={{width:'100%',maxWidth:440,display:'flex',flexDirection:'column',gap:10}}>
          {/* Modo */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <span style={{fontSize:18}}>{mode==='mimica'?'🎭':'✏️'}</span>
            <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,
              color:'#fff',textTransform:'uppercase',letterSpacing:'.05em'}}>
              {mode==='mimica'?'Haz mímica':'Dibuja'}
            </span>
          </div>

          {/* La palabra: solo el dibujante/admin la ve */}
          {canSeeWord&&cat&&(
            <div style={{background:'linear-gradient(135deg,#fff,#f8f5ef)',borderRadius:16,
              padding:'14px 18px',border:`4px solid ${cat.color}`,textAlign:'center'}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,
                color:cat.dark,textTransform:'uppercase',letterSpacing:'.16em'}}>{cat.icon} {cat.label}</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:28,
                color:'#0a0e2e',textTransform:'uppercase',lineHeight:1.05,marginTop:4}}>{card.word}</div>
              {isDrawer&&<div style={{fontSize:11,color:'#a16207',marginTop:6}}>
                {mode==='mimica'?'Actúa esta palabra ¡sin hablar!':'Dibújala ¡sin letras ni números!'}
              </div>}
            </div>
          )}
          {!canSeeWord&&(
            <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',
              borderRadius:16,padding:'12px',textAlign:'center'}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,
                color:cat?cat.color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
                {cat?cat.label:'Adivina'} {cat?cat.icon:'🤔'}
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>
                {allPlay?'¡Todos pueden adivinar! Grita tu respuesta.'
                  :isMyTurn?'¡Tu equipo adivina! Grita tu respuesta.'
                  :'Observa: adivina el equipo en turno.'}
              </div>
            </div>
          )}

          {/* Lienzo de dibujo (solo en modo dibujo) */}
          {mode==='dibujo'&&(
            <>
              <DibujaCanvas SID={SID} canDraw={canDraw}
                color={turnTeam?.color||'#0a0e2e'}
                strokes={game?.strokes} live={game?.live}/>
              {canDraw&&(
                <button onClick={()=>{ ref().child('strokes').remove(); ref().child('live').remove(); }}
                  style={{alignSelf:'center',background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.35)',
                  borderRadius:10,padding:'8px 16px',color:'#fca5a5',fontWeight:800,fontSize:12,
                  fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>
                  🧽 Borrar
                </button>
              )}
            </>
          )}
          {mode==='mimica'&&(
            <div style={{textAlign:'center',padding:'18px',background:'rgba(255,255,255,.04)',
              borderRadius:14,border:'1px dashed rgba(255,255,255,.15)'}}>
              <div style={{fontSize:38}}>🎭</div>
              <div style={{fontSize:13,color:'var(--muted)',marginTop:6}}>
                {isDrawer?'¡Actúa la palabra en vivo para tu equipo!':'El dibujante está actuando — ¡adivina!'}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Controles admin */}
      {isAdmin&&(
        <div style={{width:'100%',maxWidth:440,display:'flex',flexDirection:'column',gap:8,marginTop:4}}>
          {phase==='idle'&&(
            <button onClick={sacarCarta} style={{padding:'14px',borderRadius:12,border:'none',
              background:'#ffd000',color:'#0a0e2e',fontFamily:'Barlow Condensed,sans-serif',
              fontWeight:900,fontSize:15,letterSpacing:'.05em',textTransform:'uppercase',cursor:'pointer'}}>
              🃏 Sacar carta {turnTeam?`· ${turnTeam.name}`:''}
            </button>
          )}
          {phase==='mode'&&(
            <button onClick={tirarModo} disabled={!!game?.modeRoll} style={{padding:'14px',borderRadius:12,border:'none',
              background:game?.modeRoll?'rgba(255,255,255,.1)':'linear-gradient(135deg,#8b5cf6,#6d28d9)',
              color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:15,
              letterSpacing:'.05em',textTransform:'uppercase',cursor:'pointer'}}>
              🎲 Tirar dado: 🎭 mímica / ✏️ dibujo
            </button>
          )}
          {phase==='draw'&&(
            <>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,
                color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.12em'}}>
                {allPlay?'¿Qué equipo adivinó primero?':'Si adivinaron, confirma:'}
              </div>
              <div style={{display:'grid',gridTemplateColumns:allPlay?'1fr 1fr':'1fr',gap:6}}>
                {(allPlay?order:[turnTeamId]).map(tid=>(
                  <button key={tid} onClick={()=>adivinaron(tid)} style={{display:'flex',alignItems:'center',gap:8,
                    background:'rgba(34,197,94,.14)',border:'1px solid rgba(34,197,94,.35)',borderRadius:10,
                    padding:'10px 12px',cursor:'pointer',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',
                    fontWeight:800,fontSize:14}}>
                    <span style={{fontSize:18}}>{teams[tid]?.avatar}</span>
                    <span style={{flex:1,textAlign:'left'}}>✅ {teams[tid]?.name}</span>
                  </button>
                ))}
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={otraCarta} style={{flex:1,background:'rgba(139,92,246,.18)',
                  border:'1px solid rgba(139,92,246,.4)',borderRadius:10,padding:'10px',color:'#c4b5fd',
                  fontWeight:800,fontSize:12,fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                  textTransform:'uppercase',cursor:'pointer'}}>🔄 Otra carta</button>
                <button onClick={seAcaboTiempo} style={{flex:1,background:'rgba(239,68,68,.15)',
                  border:'1px solid rgba(239,68,68,.35)',borderRadius:10,padding:'10px',color:'#fca5a5',
                  fontWeight:800,fontSize:12,fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                  textTransform:'uppercase',cursor:'pointer'}}>⏭ Se acabó el tiempo</button>
              </div>
            </>
          )}
          {phase==='moved'&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'8px'}}>
              {teams[game?.lastWinner]?.name} avanza… <Spinner size={18}/>
            </div>
          )}
          <div style={{display:'flex',gap:8,marginTop:6}}>
            <button onClick={finalizar} style={{flex:1,background:'rgba(34,197,94,.15)',
              border:'1px solid rgba(34,197,94,.35)',borderRadius:12,padding:'11px',color:'#86efac',
              fontWeight:800,fontSize:12,fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
              textTransform:'uppercase',cursor:'pointer'}}>🏆 Finalizar</button>
            <button onClick={cerrar} style={{flex:1,background:'rgba(239,68,68,.15)',
              border:'1px solid rgba(239,68,68,.35)',borderRadius:12,padding:'11px',color:'#fca5a5',
              fontWeight:800,fontSize:12,fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
              textTransform:'uppercase',cursor:'pointer'}}>✕ Cerrar</button>
          </div>
        </div>
      )}
      {!isAdmin&&phase==='idle'&&(
        <div style={{textAlign:'center',color:'var(--muted)',fontSize:14,maxWidth:300}}>
          Esperando que el anfitrión saque la carta… <Spinner size={20}/>
        </div>
      )}
    </div>
  );
}


function CountdownTimer({from,onDone}){
  const[n,setN]=useState(from);
  useEffect(()=>{
    if(n<=0){onDone();return;}
    const t=setTimeout(()=>setN(n-1),1000);
    return()=>clearTimeout(t);
  },[n]);
  if(n<=0) return null;
  return(
    <>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
        fontSize:110,color:'#ffd000',lineHeight:1,
        animation:'countdownPop .7s ease'}} key={n}>{n}</div>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:18,
        color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase'}}>
        Prepárate
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
