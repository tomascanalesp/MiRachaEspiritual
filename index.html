  const phase=session?.phase||'waiting';
  const usersArr=Object.entries(users);
  const attSessions=Object.keys(myAtt).sort().reverse();
  const streak=(()=>{
    if(!attSessions.length) return 0;
    let s=1;
    for(let i=1;i<attSessions.length;i++){
      if((new Date(attSessions[i-1])-new Date(attSessions[i]))/86400000<=10) s++;
      else break;
    }
    return s;
  })();

  /* ════ LOADING ════ */
  if(view==='loading') return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      background:'var(--navy)',position:'relative',overflow:'hidden'}}>
      <BgTriangles/>
      <div style={{position:'relative',zIndex:1,textAlign:'center',
        display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
        <MaranataLogo size={260}/>
        <div style={{fontSize:11,color:'var(--muted)',letterSpacing:'.12em',
          textTransform:'uppercase',marginTop:-8}}>Las Condes</div>
        <Spinner size={28}/>
      </div>
    </div>
  );

  /* ════ AUTH ════ */
  if(view==='auth'){
    const dark=landingTheme==='dark';
    const T={
      bg:        dark?'#0a0e2e':'#f8f5ef',
      bgAlt:     dark?'#0d1239':'#efeae0',
      ink:       dark?'#f7f3eb':'#0a0e2e',
      inkSoft:   dark?'rgba(247,243,235,.7)':'rgba(10,14,46,.7)',
      muted:     dark?'rgba(247,243,235,.45)':'rgba(10,14,46,.45)',
      border:    dark?'rgba(247,243,235,.12)':'rgba(10,14,46,.12)',
      cardBg:    dark?'rgba(255,255,255,.03)':'rgba(255,255,255,.6)',
      accent:    '#ffd000',
      accentInk: '#0a0e2e',
    };
    return(
      <LandingPage
        T={T} dark={dark}
        onToggleTheme={()=>setLandingTheme(d=>d==='dark'?'light':'dark')}
        onOpenAuth={(mode)=>{setAuthMode(mode);setAuthError('');setResetMode(false);setResetSent(false);setAuthOpen(true);}}
        authOpen={authOpen} onCloseAuth={()=>setAuthOpen(false)}
        authMode={authMode} setAuthMode={setAuthMode}
        email={email} setEmail={setEmail}
        password={password} setPassword={setPassword}
        authError={authError} setAuthError={setAuthError}
        authLoad={authLoad}
        resetMode={resetMode} setResetMode={setResetMode}
        resetSent={resetSent} setResetSent={setResetSent}
        onEmailAuth={handleEmailAuth}
        onReset={handleReset}
        onGoogle={handleGoogle}
      />
    );
  }

  /* ════ SETUP ════ */
  if(view==='setup') return(
    <div style={pageWrap}>
      <BgTriangles/>
      <div style={cardStyle}>
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{fontSize:40,marginBottom:8}}>👋</div>
          <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:22,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.04em'}}>¡Bienvenido!</h2>
          <p style={{color:'var(--muted)',fontSize:12,marginTop:4}}>
            Personaliza tu perfil. Podrás cambiarlo después.
          </p>
        </div>

        {/* Foto */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
          <div style={{position:'relative',cursor:'pointer'}}
            onClick={()=>document.getElementById('setupPhoto')?.click()}>
            <AvatarBubble profile={profile} size={70}/>
            <div style={{position:'absolute',bottom:-2,right:-2,width:22,height:22,
              borderRadius:'50%',background:'#ffd000',display:'flex',
              alignItems:'center',justifyContent:'center',fontSize:12,color:'#07091f'}}>
              📷
            </div>
          </div>
          <input id="setupPhoto" type="file" accept="image/*"
            style={{display:'none'}}
            onChange={async e=>{
              const f=e.target.files[0]; if(!f) return;
              const b64=await compressImage(f,200);
              setProfile(p=>({...p,photo:b64}));
            }}/>
        </div>

        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Nombre en la sala</label>
          <input value={profile.name}
            onChange={e=>setProfile(p=>({...p,name:e.target.value}))}
            placeholder="¿Cómo quieres que te vean?"
            style={inputStyle}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Avatar (si no usas foto)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setProfile(p=>({...p,avatar:a}))} style={{
                background:profile.avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                border:profile.avatar===a?`2px solid ${profile.color}`:'2px solid rgba(255,255,255,.06)',
                borderRadius:10,padding:'7px 2px',fontSize:19,
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all .15s',
              }}>{a}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <label style={labelStyle}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setProfile(p=>({...p,color:c}))} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:profile.color===c?'3px solid white':'3px solid transparent',
                boxShadow:profile.color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
              }}/>
            ))}
          </div>
        </div>
        <button onClick={()=>saveProfile(profile)}
          disabled={!profile.name.trim()||setupSaving}
          style={btnYellow(!profile.name.trim()||setupSaving)}>
          {setupSaving
            ?<><Spinner size={18} color="#07091f"/>Guardando...</>
            :'Entrar a la sala ✨'}
        </button>
        {setupError&&(
          <div style={{marginTop:10,color:'#fca5a5',fontSize:12,
            background:'rgba(239,68,68,.08)',borderRadius:8,padding:'9px 12px'}}>
            ⚠️ {setupError}
          </div>
        )}
        <p style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--muted2)'}}>
          Tu perfil se guarda para siempre
        </p>
      </div>
    </div>
  );

  /* ════ SCREEN ════ */
  if(view==='screen') return(
    <ScreenView
      users={users} session={session} msgs={msgs} reactions={reactions}
      onExit={()=>setView('room')}
    />
  );

  /* ════ ROOM ════ */
  const iconBtn={
    background:'rgba(247,243,235,.04)',
    border:'1px solid rgba(247,243,235,.1)',
    borderRadius:50,width:36,height:36,
    display:'flex',alignItems:'center',justifyContent:'center',
    color:'#f7f3eb',cursor:'pointer',transition:'all .15s',
  };
  return(
    <div style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',
      background:'#0a0e2e',fontFamily:'var(--sans)'}}>

      {/* ── HEADER editorial ── */}
      <header style={{
        background:'rgba(8,11,34,.92)',
        backdropFilter:'blur(14px)',
        borderBottom:'1px solid rgba(247,243,235,.08)',
        padding:isMobile?'8px 10px':'10px 12px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        flexShrink:0,minHeight:isMobile?52:56,gap:isMobile?6:8,
      }}>
        {/* IZQ — Logo + estado */}
        <div style={{display:'flex',alignItems:'center',
          gap:isMobile?8:10,minWidth:0,flex:'1 1 auto',overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',gap:isMobile?7:10,flexShrink:0}}>
            <svg width={isMobile?28:32} height={isMobile?21:24} viewBox="0 0 80 60">
              <polygon points="8,54 72,54 58,10" fill="#ffd000"/>
              <g stroke="#0a0e2e" strokeWidth="3.4" fill="none" strokeLinecap="round" strokeLinejoin="round">
                <path d="M28 42L28 18Q28 15 31 15L40 17L40 42"/>
                <path d="M52 42L52 18Q52 15 49 15L40 17L40 42"/>
                <path d="M28 42Q34 40 40 42Q46 40 52 42"/>
              </g>
            </svg>
            {!isMobile&&(
              <div style={{lineHeight:1}}>
                <div style={{fontFamily:'var(--display)',fontWeight:900,fontSize:15,
                  color:'#f7f3eb',letterSpacing:'.04em'}}>MARANATA</div>
                <div style={{fontFamily:'var(--display)',fontWeight:600,fontSize:9,
                  color:'rgba(247,243,235,.45)',letterSpacing:'.22em',marginTop:2}}>
                  CLASS · LAS CONDES
                </div>
              </div>
            )}
          </div>

          {/* Botón de guía — entre el logo y el estado de sala */}
          <button onClick={()=>setGuideOpen(true)} title="¿Cómo usar la app?" style={{
            width:isMobile?26:28,height:isMobile?26:28,flexShrink:0,borderRadius:'50%',
            border:'1px solid rgba(255,208,0,.35)',background:'rgba(255,208,0,.1)',
            color:'#ffd000',fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:isMobile?14:15,display:'flex',alignItems:'center',justifyContent:'center',
            cursor:'pointer'}}>?</button>

          {/* Divisor + estado de sala */}
          <div style={{height:isMobile?28:32,width:1,background:'rgba(247,243,235,.1)',flexShrink:0}}/>
          <div style={{display:'flex',alignItems:'center',gap:isMobile?10:14,minWidth:0}}>
            <div style={{flexShrink:0}}>
              {!isMobile&&(
                <div style={{fontSize:10,color:'rgba(247,243,235,.4)',
                  textTransform:'uppercase',letterSpacing:'.16em',fontWeight:600,marginBottom:3}}>
                  En sala
                </div>
              )}
              <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                <div style={{fontFamily:'var(--serif)',fontSize:isMobile?20:22,fontWeight:500,
                  color:'#f7f3eb',lineHeight:1,letterSpacing:'-.01em'}}>
                  {usersArr.length}
                </div>
                {isMobile&&(
                  <div style={{fontSize:9,color:'rgba(247,243,235,.45)',
                    textTransform:'uppercase',letterSpacing:'.14em',fontWeight:600}}>
                    en sala
                  </div>
                )}
              </div>
            </div>
            {phase!=='waiting'&&ZONES[phase]&&(
              <>
                <div style={{height:isMobile?28:32,width:1,
                  background:'rgba(247,243,235,.1)',flexShrink:0}}/>
                <div style={{display:'flex',alignItems:'center',gap:isMobile?7:10,minWidth:0}}>
                  <div style={{
                    width:isMobile?24:28,height:isMobile?24:28,borderRadius:isMobile?6:7,
                    background:ZONES[phase].color,flexShrink:0,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    color:'white',fontFamily:'var(--display)',fontWeight:900,
                    fontSize:isMobile?14:16,
                    boxShadow:`0 4px 14px ${ZONES[phase].color}66`,
                  }}>{ZONES[phase].letter}</div>
                  <div style={{lineHeight:1,minWidth:0}}>
                    {!isMobile&&(
                      <div style={{fontSize:9,color:'rgba(247,243,235,.4)',
                        textTransform:'uppercase',letterSpacing:'.16em',fontWeight:600,marginBottom:3}}>
                        En curso
                      </div>
                    )}
                    <div style={{fontFamily:'var(--serif)',fontStyle:'italic',
                      fontSize:isMobile?14:18,fontWeight:500,color:'#f7f3eb',
                      letterSpacing:'-.01em',
                      whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                      maxWidth:isMobile?90:'none'}}>
                      {ZONES[phase].label}
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>

        {/* DER — Acciones */}
        <div style={{display:'flex',gap:isMobile?5:8,alignItems:'center',flexShrink:0}}>
          <button onClick={()=>setEditOpen(true)} title="Editar perfil" style={{
            display:'flex',alignItems:'center',gap:isMobile?0:8,
            background:'rgba(247,243,235,.04)',
            border:'1px solid rgba(247,243,235,.1)',
            borderRadius:50,padding:isMobile?3:'5px 14px 5px 5px',
            color:'#f7f3eb',transition:'all .15s',cursor:'pointer',
          }}>
            <AvatarBubble profile={profile} size={isMobile?26:28}/>
            {!isMobile&&(
              <span style={{fontSize:13,fontWeight:600,maxWidth:90,overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {profile.name||'Yo'}
              </span>
            )}
          </button>

          <button onClick={()=>setAttOpen(true)} title="Mi asistencia" style={{
            ...iconBtn,
            width:isMobile?32:36,height:isMobile?32:36,
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>
            </svg>
          </button>

          {!isMobile&&(
            <button onClick={()=>setView('screen')} title="Proyectar a la pantalla grande" style={iconBtn}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
            </button>
          )}

          {!isMobile&&(
            <div style={{width:1,height:24,background:'rgba(247,243,235,.1)',margin:'0 4px'}}/>
          )}

          <button onClick={handleSignOut} title="Cerrar sesión" style={{
            ...iconBtn,
            width:isMobile?32:36,height:isMobile?32:36,
            color:'rgba(247,243,235,.5)',
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      {/* ── Sub-header: hint contextual ── */}
      {phase==='waiting'&&(
        <div style={{
          background:'linear-gradient(90deg,rgba(255,208,0,.06),rgba(255,208,0,.02))',
          borderBottom:'1px solid rgba(255,208,0,.12)',
          padding:isMobile?'8px 12px':'10px 24px',
          display:'flex',alignItems:'center',gap:isMobile?8:14,flexShrink:0,
        }}>
          <span style={{fontFamily:'var(--display)',fontSize:10,fontWeight:700,
            letterSpacing:'.22em',textTransform:'uppercase',
            color:'#ffd000',flexShrink:0,
            background:'rgba(255,208,0,.1)',padding:'4px 10px',borderRadius:50,
            border:'1px solid rgba(255,208,0,.25)',
          }}>
            ● En espera
          </span>
          <span style={{fontFamily:'var(--serif)',fontStyle:'italic',
            fontSize:isMobile?13:15,color:'rgba(247,243,235,.7)',letterSpacing:'-.01em',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:isMobile?'nowrap':'normal',minWidth:0}}>
            {isMobile?'Arrastra tu avatar a una zona.':'Arrastra tu avatar a la zona donde quieras participar.'}
          </span>
        </div>
      )}

      {/* ── SALA (canvas con zonas — mobile-first, llena el espacio) ── */}
      <div style={{flex:1,position:'relative',overflow:'hidden',
        background:'#f8f5ef'}}>
        <RoomCanvas
          users={users} myId={UID.current} session={session}
          onDragMove={handleDragMove}
          roomRef={roomRef} full={false} reactions={reactions}
        />

        {/* Repaso: botón flotante — solo para usuarios en zona repaso */}
        {phase==='repaso'&&!repasoChatOpen&&(users[UID.current]?.zone==='repaso'||isAdmin)&&(
          <button onClick={()=>setRepasoChatOpen(true)} style={{
            position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',
            background:'#fb923c',
            border:'none',borderRadius:50,padding:'12px 26px',
            color:'#0a0e2e',fontWeight:700,fontSize:14,
            fontFamily:'var(--sans)',letterSpacing:'-.01em',
            display:'flex',alignItems:'center',gap:10,zIndex:20,cursor:'pointer',
            boxShadow:'0 8px 28px rgba(251,146,60,.4)',
          }}>
            Abrir Chat del Repaso
            <span style={{fontSize:16}}>→</span>
            {msgs.length>0&&(
              <span style={{background:'rgba(10,14,46,.18)',borderRadius:50,
                padding:'2px 9px',fontSize:11,fontWeight:700}}>{msgs.length}</span>
            )}
          </button>
        )}

        {/* Misión: botón flotante — solo para usuarios en zona misión */}
        {phase==='mision'&&!misionOpen&&(users[UID.current]?.zone==='mision'||isAdmin)&&(
          <button onClick={()=>setMisionOpen(true)} style={{
            position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',
            background:'#3b82f6',
            border:'none',borderRadius:50,padding:'12px 26px',
            color:'#fff',fontWeight:700,fontSize:14,
            fontFamily:'var(--sans)',letterSpacing:'-.01em',
            display:'flex',alignItems:'center',gap:10,zIndex:20,cursor:'pointer',
            boxShadow:'0 8px 28px rgba(59,130,246,.4)',
          }}>
            {session?.mision?.mode==='projects'?'🌍 Abrir Proyectos':'✍️ Abrir Compromiso'}
            <span style={{fontSize:16}}>→</span>
          </button>
        )}
      </div>

      {/* Confraternización — solo para usuarios en zona confra (o admin o si están en la cola) */}
      {(confraOpen||session?.phase==='confra')&&(()=>{
        const myZone=users[UID.current]?.zone;
        const confra=session?.confra;
        const rawQ=confra?.queue||{};
        const qArr=Array.isArray(rawQ)?rawQ:Object.values(rawQ);
        const inQueue=qArr.includes(UID.current);
        if(!isAdmin&&myZone!=='confra'&&!inQueue) return null;
        return(
          <ConfraSpeakerPanel
            session={session}
            users={users}
            myId={UID.current} isAdmin={isAdmin}
            onNext={nextSpeaker} onEnd={endConfra}
            onReact={handleReact}
            myReactions={myReactions}
            allReactions={(()=>{
              if(!confra) return {};
              const cIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
              const sUid=qArr[cIdx];
              return sUid?reactions?.[sUid]||{}:{};
            })()}
          />
        );
      })()}

      {/* Banner fin de actividad */}
      {endBanner&&(
        <ActivityEndBanner phase={endBanner} onDismiss={()=>setEndBanner(null)}/>
      )}

      {/* Panel admin */}
      {isAdmin&&(
        <AdminPanel
          session={session} users={users}
          onStartConfra={startConfra}
          onNextSpeaker={nextSpeaker}
          onEndConfra={endConfra}
          onStartRepaso={startRepaso}
          onEndRepaso={endRepaso}
          onOpenPresentationMenu={()=>setPresMenuOpen(true)}
          onEndPresentation={endPresentation}
          onOpenVideoMenu={()=>setVideoMenuOpen(true)}
          onEndVideo={endVideo}
          onStartJuegos={startJuegos}
          onEndJuegos={endJuegos}
          onStartMision={startMision}
          onEndMision={endMision}
          onStartTemplo={startTemplo}
          onEndTemplo={endTemplo}
          onOpenStats={()=>setAdminStats(true)}
          onToggleWordCloud={toggleWordCloud}
          onResetSession={resetSession}
          onOpenDownload={()=>setDownloadOpen(true)}
          onOpenSurveyResults={()=>setAdminSurvey(true)}
          surveyResponses={surveyResponses}
        />
      )}

      {/* QR de acceso (solo admin) — arrastrable y visible incluso en presentación */}
      {isAdmin&&qrVisible&&(
        <DraggableQR qrSize={qrSize} setQrSize={setQrSize} qrPos={qrPos} setQrPos={setQrPos}/>
      )}


      {/* Kahoot — solo si NO hay otro juego activo */}
      {phase==='juegos'&&!session?.tabu?.active&&!session?.quiensoy?.active&&!session?.dibuja?.active&&(
        <KahootController
          session={session} users={users}
          myId={UID.current} isAdmin={isAdmin}
          SID={SID.current}
          onClose={()=>setKahootOpen(false)}
        />
      )}
      {/* Tabú Bíblico */}
      {phase==='juegos'&&session?.tabu?.active&&(
        <TabuController
          session={session} users={users}
          myId={UID.current} isAdmin={isAdmin}
          SID={SID.current}
          onClose={()=>setKahootOpen(false)}
        />
      )}
      {/* ¿Quién soy? */}
      {phase==='juegos'&&session?.quiensoy?.active&&(
        <QuienSoyController
          session={session} users={users}
          myId={UID.current} isAdmin={isAdmin}
          SID={SID.current}
          onClose={()=>setKahootOpen(false)}
        />
      )}
      {/* Dibujando la Biblia */}
      {phase==='juegos'&&session?.dibuja?.active&&(
        <DibujaController
          session={session} users={users}
          myId={UID.current} isAdmin={isAdmin}
          SID={SID.current}
          onClose={()=>setKahootOpen(false)}
        />
      )}

      {/* Word Cloud — auto-abre para todos, solo usuarios en repaso */}
      {wordCloudOpen&&phase==='repaso'&&session?.wordcloud?.active&&(
        <WordCloudActivity
          wordcloud={session.wordcloud}
          question={session.wordcloud?.question||''}
          myId={UID.current} users={users}
          isAdmin={isAdmin} SID={SID.current}
          onClose={()=>setWordCloudOpen(false)}
        />
      )}

      {/* Modales */}
      {guideOpen&&<GuideModal isAdmin={isAdmin} onClose={()=>setGuideOpen(false)}/>}
      {editOpen&&<EditProfileModal profile={profile} onSave={saveProfile} onClose={()=>setEditOpen(false)}/>}
      {attOpen&&<AttendanceModal myAtt={myAtt} gameHistory={gameHistory} onClose={()=>setAttOpen(false)}/>}
      {adminStats&&<AdminStatsModal onClose={()=>setAdminStats(false)}/>}
      {attNotify&&<AttNotifyToast/>}
      {isAdmin&&surveyAllNotify&&(
        <div style={{position:'fixed',top:80,left:'50%',transform:'translateX(-50%)',
          zIndex:240,background:'linear-gradient(135deg,#10b981,#059669)',
          color:'#fff',padding:'12px 20px',borderRadius:14,
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13,
          letterSpacing:'.06em',textTransform:'uppercase',
          boxShadow:'0 12px 32px rgba(16,185,129,.5)',
          display:'flex',alignItems:'center',gap:10,
          animation:'modalIn .35s ease',cursor:'pointer',
        }} onClick={()=>setSurveyAllNotify(null)}>
          <span style={{fontSize:18}}>✅</span>
          <span>Todos respondieron la encuesta ({surveyAllNotify.done}/{surveyAllNotify.total})</span>
        </div>
      )}
      {joinPrompt&&(
        <JoinActivityPrompt
          label={joinPrompt.label}
          phase={joinPrompt.phase}
          onJoin={handleJoinActivity}
          onDecline={handleDeclineJoin}
        />
      )}
      {surveyOpen&&<SurveyModal myId={UID.current} myName={profile.name} SID={SID.current}
        alreadyResponded={!!surveyResponses[UID.current]}
        onSent={()=>{surveyDismissedRef.current=true;setSurveyOpen(false);}}
        onClose={()=>{surveyDismissedRef.current=true;setSurveyOpen(false);}}/>}
      {adminSurvey&&<AdminSurveyModal responses={surveyResponses} users={users} SID={SID.current} onClose={()=>setAdminSurvey(false)} onToggle={toggleSurvey} surveyActive={!!session?.survey?.active}/>}
      {downloadOpen&&<DataDownloadModal onClose={()=>setDownloadOpen(false)}/>}

      {/* Menú de presentaciones — el admin elige cuál proyectar */}
      {presMenuOpen&&isAdmin&&phase==='repaso'&&(
        <PresentationMenu
          onSelect={id=>{setPresMenuOpen(false);startPresentation(id);}}
          onClose={()=>setPresMenuOpen(false)}
        />
      )}

      {/* Menú de videos — el admin elige cuál proyectar (YouTube sincronizado) */}
      {videoMenuOpen&&isAdmin&&phase==='repaso'&&(
        <VideoMenu
          onSelect={id=>{setVideoMenuOpen(false);startVideo(id);}}
          onClose={()=>setVideoMenuOpen(false)}
        />
      )}

      {/* Reproductor de video — todos lo ven; el admin controla play/pausa/seek */}
      {phase==='repaso'&&session?.video?.active&&(
        <VideoOverlay
          session={session} isAdmin={isAdmin}
          SID={SID.current} onEnd={endVideo}
        />
      )}

      {/* Presentación del repaso — todos ven la slide; el admin la avanza */}
      {phase==='repaso'&&session?.presentation?.active&&(
        <PresentationOverlay
          session={session} isAdmin={isAdmin}
          onPrev={()=>movePresentation(-1)}
          onNext={()=>movePresentation(1)}
          onEnd={endPresentation}
          onToggleWordCloud={(question='')=>toggleWordCloud(question)}
          onToggleQR={()=>setQrVisible(v=>!v)}
          qrOn={qrVisible}
        />
      )}

      {/* Repaso Chat — solo para usuarios en zona repaso o admin */}
      {repasoChatOpen&&phase==='repaso'&&(users[UID.current]?.zone==='repaso'||isAdmin)&&(
        <RepasoChat
          msgs={msgs} session={session}
          myId={UID.current} users={users}
          onSend={handleSend}
          SID={SID.current}
          chatReactions={chatReactions}
          onClose={()=>setRepasoChatOpen(false)}
        />
      )}

      {/* Ícono flotante de chat — visible sobre la presentación (cuando el
          botón normal de la sala queda tapado por la slide) */}
      {phase==='repaso'&&session?.presentation?.active&&!repasoChatOpen&&(users[UID.current]?.zone==='repaso'||isAdmin)&&(
        <ChatFab count={msgs.length} onClick={()=>setRepasoChatOpen(true)}/>
      )}

      {/* Misión — solo para usuarios en zona mision o admin */}
      {misionOpen&&phase==='mision'&&(users[UID.current]?.zone==='mision'||isAdmin)&&(
        <MisionActivity
          session={session} users={users}
          myId={UID.current} SID={SID.current} isAdmin={isAdmin}
          onClose={()=>setMisionOpen(false)}
        />
      )}
    </div>
  );
}

function Confetti(){
  const pieces=React.useMemo(()=>Array.from({length:28},(_,i)=>({
    id:i,x:Math.random()*100,delay:Math.random()*2,dur:2.5+Math.random()*2,
    color:['#ffd000','#ec4899','#22d3ee','#10b981','#8b5cf6'][i%5],
    size:6+Math.random()*8,
  })),[]);
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:300,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:'absolute',left:`${p.x}%`,top:-20,
          width:p.size,height:p.size,background:p.color,borderRadius:p.size/4,
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function KahootLeaderboard({scores,users,isAdmin,isFinished,onClose,myId,SID}){
  const sorted=Object.entries(scores||{})
    .map(([uid,score])=>({uid,score,user:users[uid]||{name:'?',avatar:'👤',color:'#8b5cf6'}}))
    .sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const winner=sorted[0];
  const isWinner=winner?.uid===myId;

  const[podiumReactions,setPodiumReactions]=useState({});
  const[myReactions,setMyReactions]=useState({});

  useEffect(()=>{
    if(!isFinished||!SID) return;
    const ref=db.ref(`sessions/${SID}/juegos/podiumReactions`);
    const handler=snap=>setPodiumReactions(snap.val()||{});
    ref.on('value',handler);
    return()=>ref.off('value',handler);
  },[isFinished,SID]);

  useEffect(()=>{
    setMyReactions(podiumReactions[myId]||{});
  },[podiumReactions,myId]);

  const reactionTotals={};
  REACTIONS.forEach(r=>{reactionTotals[r.id]=0;});
  Object.values(podiumReactions).forEach(userRxns=>{
    if(userRxns&&typeof userRxns==='object'){
      Object.entries(userRxns).forEach(([rid,val])=>{
        if(val&&reactionTotals[rid]!==undefined) reactionTotals[rid]++;
      });
    }
  });

  const toggleReaction=async(rid)=>{
    if(!myId||!SID||isWinner) return;
    const path=`sessions/${SID}/juegos/podiumReactions/${myId}/${rid}`;
    await db.ref(path).set(myReactions[rid]?null:true);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {isFinished&&<Confetti/>}
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'14px 20px',flexShrink:0,textAlign:'center',
        borderBottom:'1px solid rgba(255,208,0,.15)'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.08em'}}>
          {isFinished?'🏆 Resultados Finales':'Marcador'}
        </div>
      </div>

      {isFinished&&isWinner&&winner&&(
        <div style={{background:'linear-gradient(135deg,rgba(255,208,0,.18),rgba(255,208,0,.05))',

function KahootSetup({onStart,juegosCount,onCancel}){
  const[questions,setQuestions]=useState([{text:'',options:['','','',''],correct:0}]);
  const[qIdx,setQIdx]=useState(0);
  const q=questions[qIdx];
  const updateQ=(f,v)=>setQuestions(qs=>qs.map((x,i)=>i===qIdx?{...x,[f]:v}:x));
  const updateOpt=(oi,v)=>setQuestions(qs=>qs.map((x,i)=>i===qIdx?
    {...x,options:x.options.map((o,j)=>j===oi?v:o)}:x));
  const addQ=()=>{ setQuestions(qs=>[...qs,{text:'',options:['','','',''],correct:0}]); setQIdx(questions.length); };
  const canStart=questions.every(q=>q.text.trim()&&q.options.every(o=>o.trim()));
  return(
    <div style={{position:'fixed',inset:0,zIndex:250,
      background:'rgba(7,9,31,.97)',backdropFilter:'blur(6px)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid rgba(255,255,255,.06)',
        flexShrink:0,display:'flex',alignItems:'center',gap:12}}>
        <button onClick={onCancel} style={{background:'none',border:'none',
          color:'var(--muted)',fontSize:22,cursor:'pointer',padding:'0 4px',lineHeight:1}}>‹</button>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:18,color:'white',textTransform:'uppercase',letterSpacing:'.06em'}}>
          Crear Juego
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8,flexWrap:'wrap'}}>
          {questions.map((_,i)=>(
            <button key={i} onClick={()=>setQIdx(i)}
              style={{width:28,height:28,borderRadius:8,border:'none',
                background:i===qIdx?'#8b5cf6':'rgba(255,255,255,.1)',
                color:'white',fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:700,fontSize:12,cursor:'pointer'}}>
              {i+1}
            </button>
          ))}
          <button onClick={addQ} style={{width:28,height:28,borderRadius:8,border:'none',
            background:'rgba(255,255,255,.06)',color:'var(--muted)',
            fontSize:16,cursor:'pointer'}}>+</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:16}}>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.05em',
            textTransform:'uppercase'}}>Pregunta {qIdx+1}</div>
          <textarea value={q.text} onChange={e=>updateQ('text',e.target.value)}
            placeholder="Escribe la pregunta aquí..."
            style={{width:'100%',background:'rgba(255,255,255,.05)',
              border:'1px solid rgba(255,255,255,.1)',borderRadius:12,
              color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif',
              padding:'12px 14px',resize:'none',height:72,lineHeight:1.4}}/>
        </div>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <button onClick={()=>updateQ('correct',i)}
              style={{width:34,height:34,borderRadius:8,border:'none',flexShrink:0,
                background:q.correct===i?ANS_COLORS[i]:`${ANS_COLORS[i]}28`,
                color:'white',fontSize:14,fontWeight:700,cursor:'pointer',
                boxShadow:q.correct===i?`0 0 12px ${ANS_COLORS[i]}77`:undefined,
                transition:'background .2s'}}>
              {q.correct===i?'✓':ANS_SHAPES[i]}
            </button>
            <input value={q.options[i]} onChange={e=>updateOpt(i,e.target.value)}
              placeholder={`Opción ${i+1}`}
              style={{flex:1,padding:'10px 12px',borderRadius:10,
                background:`${ANS_COLORS[i]}18`,

          width:'100%',padding:13,borderRadius:12,border:'none',
          background:canStart&&juegosCount>0?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'var(--muted2)',
          color:canStart&&juegosCount>0?'white':'var(--muted)',
          fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',

function KahootController({session,users,myId,isAdmin,SID,onClose}){
  const game=session?.juegos;
  const gState=game?.gameState;
  const[timeLeft,setTimeLeft]=useState(GAME_TIMER);
  const[countdownDone,setCountdownDone]=useState(false);
  const[showSetup,setShowSetup]=useState(false);
  const[menuDismissed,setMenuDismissed]=useState(false);
  const timerRef=useRef(null);
  const questions=game?.questions||[];
  const qIdx=game?.currentQ||0;
  const currentQ=questions[qIdx];
  const scores=game?.scores||{};
  const myScore=scores[myId]||0;
  const myAnswer=game?.answers?.[myId];
  const juegosUsers=Object.entries(users).filter(([,u])=>u.zone==='juegos');

  useEffect(()=>{
    if(gState==='question'&&game?.qStartTime){
      clearInterval(timerRef.current);
      timerRef.current=setInterval(()=>{
        const elapsed=Math.floor((Date.now()-game.qStartTime)/1000);
        const left=Math.max(0,GAME_TIMER-elapsed);
        setTimeLeft(left);
        if(left===0){
          clearInterval(timerRef.current);
          if(isAdmin) db.ref(`sessions/${SID}/juegos/gameState`).set('results');
        }
      },400);
    }
    return()=>clearInterval(timerRef.current);
  },[gState,game?.qStartTime,isAdmin]);

  useEffect(()=>{ setCountdownDone(false); },[qIdx]);

  // Auto-avanzar a resultados cuando todos los jugadores respondieron
  useEffect(()=>{
    if(!isAdmin||gState!=='question') return;
    if(juegosUsers.length===0) return;
    const answers=game?.answers||{};
    const answeredCount=Object.keys(answers).length;
    if(answeredCount>=juegosUsers.length){
      clearInterval(timerRef.current);
      db.ref(`sessions/${SID}/juegos/gameState`).set('results');
    }
  },[game?.answers,gState,isAdmin,juegosUsers.length]);

  const handleAnswer=async(ansIdx)=>{
    if(myAnswer!==null&&myAnswer!==undefined) return;
    const elapsed=game?.qStartTime?Math.floor((Date.now()-game.qStartTime)/1000):GAME_TIMER;
    const speed=Math.max(0,GAME_TIMER-Math.min(elapsed,GAME_TIMER));
    const pts=currentQ?.correct===ansIdx?Math.round(100+speed*30):0;
    await db.ref(`sessions/${SID}/juegos/answers/${myId}`).set(ansIdx);
    if(pts>0) await db.ref(`sessions/${SID}/juegos/scores/${myId}`).transaction(c=>(c||0)+pts);
  };

  const nextQuestion=async()=>{
    const next=qIdx+1;
    await db.ref(`sessions/${SID}/juegos`).update({
      currentQ:next,gameState:'question',qStartTime:Date.now(),answers:{}
    });
  };

  const finishGame=async()=>{
    const fs=game?.scores||{};
    const sorted=Object.entries(fs).sort((a,b)=>b[1]-a[1]);
    const gid=`${SID}_${Date.now()}`;
    await Promise.all(sorted.map(([uid,score],i)=>
      db.ref(`gameHistory/${uid}/${gid}`).set({
        date:SID,score,rank:i+1,totalPlayers:sorted.length,
        name:users[uid]?.name||'?'
      })
    ));
    await db.ref(`sessions/${SID}/juegos/gameState`).set('finished');
  };

  const skipQuestion=async()=>{
    const next=qIdx+1;
    if(next<questions.length){
      await db.ref(`sessions/${SID}/juegos`).update({
        currentQ:next,gameState:'starting',qStartTime:null,answers:{}
      });
    } else {
      await finishGame();
    }
  };

  const endTimeNow=async()=>{
    clearInterval(timerRef.current);
    await db.ref(`sessions/${SID}/juegos/gameState`).set('results');
  };

  const closeGame=async()=>{
    await db.ref(`sessions/${SID}/juegos/podiumReactions`).remove();
    await db.ref(`sessions/${SID}`).update({phase:'waiting','juegos/active':false});
  };

  const myZone=users[myId]?.zone;
  if(myZone!=='juegos'&&!isAdmin) return null;

  /* ── Admin: menú de selección / setup ── */
  if(isAdmin&&(!gState||gState==='idle')){
    // Menú cerrado por el admin: mostrar un botón flotante para reabrirlo.
    if(menuDismissed){
      return(
        <button onClick={()=>setMenuDismissed(false)} title="Elegir juego" style={{
          position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',zIndex:140,
          background:'linear-gradient(135deg,#fdba74,#ea580c)',border:'none',borderRadius:50,
          padding:'12px 24px',color:'#0a0e2e',fontFamily:'Barlow Condensed,sans-serif',
          fontWeight:900,fontSize:14,letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer',
          boxShadow:'0 8px 24px rgba(234,88,12,.5)'}}>
          🎮 Elegir juego
        </button>
      );
    }
    if(showSetup){
      return(
        <KahootSetup juegosCount={juegosUsers.length}
          onCancel={()=>setShowSetup(false)}
          onStart={async(qs)=>{
            await db.ref(`sessions/${SID}/juegos`).update({
              active:true,gameState:'starting',questions:qs,
              currentQ:0,qStartTime:null,answers:{},scores:{}
            });
          }}/>
      );
    }
    return(
      <GameSelectMenu
        juegosCount={juegosUsers.length}
        onSelectLibrary={async(qs)=>{
          await db.ref(`sessions/${SID}/juegos`).update({
            active:true,gameState:'starting',questions:qs,
            currentQ:0,qStartTime:null,answers:{},scores:{}
          });
        }}
        onCreateNew={()=>setShowSetup(true)}
        onStartTabu={async()=>{
          await db.ref(`sessions/${SID}/tabu`).set({active:true,gameState:'idle',scores:{}});
        }}
        onStartQuienSoy={async()=>{
          await db.ref(`sessions/${SID}/quiensoy`).set({active:true,gameState:'idle',scores:{}});
        }}
        onStartDibuja={async()=>{
          await db.ref(`sessions/${SID}/dibuja`).set({active:true,gameState:'setup'});
        }}
        onCancel={()=>{ setMenuDismissed(true); if(onClose) onClose(); }}
      />
    );
  }

  /* ── Countdown ── */
  if(gState==='starting'){
    if(isAdmin&&!countdownDone){
      return(
        <div style={{position:'fixed',inset:0,zIndex:250,
          background:'rgba(7,9,31,.95)',backdropFilter:'blur(6px)',
          display:'flex',flexDirection:'column',alignItems:'center',
          justifyContent:'center',gap:10}}>
          <CountdownTimer from={3} onDone={async()=>{
            setCountdownDone(true);
            await db.ref(`sessions/${SID}/juegos`).update({
              gameState:'question',qStartTime:Date.now()
            });
          }}/>
        </div>
      );
    }
    return(
      <div style={{position:'fixed',inset:0,zIndex:210,
        background:'rgba(7,9,31,.96)',display:'flex',
        alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
        <div style={{fontSize:72,animation:'bounce .7s infinite'}}>🎮</div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#8b5cf6',textTransform:'uppercase',letterSpacing:'.06em'}}>
          ¡Prepárate!
        </div>
        <Spinner size={28} color="#8b5cf6"/>
      </div>
    );
  }

  /* ── Pregunta activa ── */
  if(gState==='question'&&currentQ){
    return(
      <>
        <KahootQuestion question={currentQ} qIndex={qIdx} total={questions.length}
          myAnswer={myAnswer} onAnswer={handleAnswer}
          timeLeft={timeLeft} gameState={gState}/>
        {isAdmin&&(
          <div style={{position:'fixed',bottom:24,left:0,right:0,zIndex:300,
            display:'flex',justifyContent:'center',gap:10,padding:'0 16px',flexWrap:'wrap'}}>
            <button onClick={endTimeNow}
              style={{background:'rgba(239,68,68,.92)',border:'none',borderRadius:14,
                padding:'11px 20px',color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                textTransform:'uppercase',boxShadow:'0 4px 18px rgba(239,68,68,.45)',
                cursor:'pointer'}}>
              ⏰ Terminar tiempo
            </button>
            <button onClick={skipQuestion}
              style={{background:'rgba(139,92,246,.92)',border:'none',borderRadius:14,
                padding:'11px 20px',color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                textTransform:'uppercase',boxShadow:'0 4px 18px rgba(139,92,246,.45)',
                cursor:'pointer'}}>
              ⏭ Saltar
            </button>
            <button onClick={finishGame}
              style={{background:'rgba(16,185,129,.92)',border:'none',borderRadius:14,
                padding:'11px 20px',color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                textTransform:'uppercase',boxShadow:'0 4px 18px rgba(16,185,129,.45)',
                cursor:'pointer'}}>
              🏁 Terminar juego
            </button>
          </div>
        )}
      </>
    );
  }

  /* ── Resultados de pregunta ── */
  if(gState==='results'&&currentQ){
    const isRight=myAnswer===currentQ.correct;
    const elapsed=game?.qStartTime?Math.floor((Date.now()-game.qStartTime)/1000):GAME_TIMER;
    const speed=Math.max(0,GAME_TIMER-Math.min(elapsed,GAME_TIMER));
    const pointsEarned=isRight?Math.round(100+speed*30):0;
    return(
      <KahootResultCard question={currentQ} myAnswer={myAnswer}
        pointsEarned={pointsEarned} myScore={myScore}
        qIdx={qIdx} total={questions.length}
        isAdmin={isAdmin} onNext={nextQuestion} onFinish={finishGame} onEarlyEnd={finishGame}/>
    );
  }

  /* ── Leaderboard / Final ── */
  if(gState==='leaderboard'||gState==='finished'){
    return(
      <KahootLeaderboard scores={scores} users={users}
        isAdmin={isAdmin} isFinished={gState==='finished'}
        onClose={closeGame} myId={myId} SID={SID}/>
    );
  }

  /* ── Jugador esperando ── */
  if(!isAdmin){
    return(
      <div style={{position:'fixed',inset:0,zIndex:190,
        background:'rgba(7,9,31,.96)',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:16,padding:24,textAlign:'center'}}>
        <div style={{fontSize:54,animation:'bounce 1.2s infinite'}}>🎮</div>
        <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:24,color:'#8b5cf6',textTransform:'uppercase',letterSpacing:'.05em'}}>
          Sala de Juegos
        </h2>
        <p style={{color:'var(--muted)',fontSize:14,maxWidth:240,lineHeight:1.6}}>
          Estás listo.<br/>El profe iniciará el juego pronto.
        </p>
      </div>
    );
  }

  return null;
}



/* ═══ TABÚ BÍBLICO ═══ */
function TabuController({session,users,myId,isAdmin,SID,onClose}){
  const game=session?.tabu;
  const gState=game?.gameState;
  const [timeLeft,setTimeLeft]=useState(180);
  const [showCard,setShowCard]=useState(false);
  const timerRef=useRef(null);

  const juegosUsers=Object.entries(users||{})
    .filter(([_,u])=>u.zone==='juegos')
    .map(([uid,u])=>({uid,...u}));

  const currentSpeakerId=game?.currentSpeaker;
  const currentSpeaker=currentSpeakerId?users[currentSpeakerId]:null;
  const isSpeaker=currentSpeakerId===myId;
  const currentCard=game?.currentCard;
  const scores=game?.scores||{};

  useEffect(()=>{
    if(gState!=='playing'||!game?.roundStartTime){setTimeLeft(180);return;}
    const tick=()=>{
      const elapsed=Math.floor((Date.now()-game.roundStartTime)/1000);
      const left=Math.max(0,180-elapsed);
      setTimeLeft(left);
      if(left===0&&isAdmin){
        db.ref(`sessions/${SID}/tabu`).update({gameState:'idle',currentSpeaker:null,currentCard:null,roundStartTime:null});
      }
    };
    tick();
    timerRef.current=setInterval(tick,500);
    return()=>clearInterval(timerRef.current);
  },[gState,game?.roundStartTime,isAdmin,SID]);

  useEffect(()=>{setShowCard(false);},[currentSpeakerId]);

  const seleccionarRandom=async()=>{
    if(juegosUsers.length===0) return;
    const random=juegosUsers[Math.floor(Math.random()*juegosUsers.length)];
    const card=TABU_CARDS[Math.floor(Math.random()*TABU_CARDS.length)];
    await db.ref(`sessions/${SID}/tabu`).update({
      active:true,gameState:'playing',currentSpeaker:random.uid,
      currentCard:card,roundStartTime:Date.now()
    });
  };
  const seleccionarManual=async(uid)=>{
    const card=TABU_CARDS[Math.floor(Math.random()*TABU_CARDS.length)];
    await db.ref(`sessions/${SID}/tabu`).update({
      active:true,gameState:'playing',currentSpeaker:uid,
      currentCard:card,roundStartTime:Date.now()
    });
  };
  const otraCarta=async()=>{
    const card=TABU_CARDS[Math.floor(Math.random()*TABU_CARDS.length)];
    await db.ref(`sessions/${SID}/tabu`).update({currentCard:card,roundStartTime:Date.now()});
  };
  const adivinador=async(uid)=>{
    const newScores={...scores};
    newScores[uid]=(newScores[uid]||0)+10;
    if(currentSpeakerId) newScores[currentSpeakerId]=(newScores[currentSpeakerId]||0)+5;
    await db.ref(`sessions/${SID}/tabu`).update({
      scores:newScores,gameState:'idle',currentSpeaker:null,currentCard:null,roundStartTime:null
    });
  };
  const skipTurn=async()=>{
    await db.ref(`sessions/${SID}/tabu`).update({
      gameState:'idle',currentSpeaker:null,currentCard:null,roundStartTime:null
    });
  };
  const finalizar=async()=>{await db.ref(`sessions/${SID}/tabu`).update({gameState:'finished'});};
  const cerrar=async()=>{
    await db.ref(`sessions/${SID}/tabu`).remove();
    await db.ref(`sessions/${SID}`).update({phase:'waiting'});
    if(onClose) onClose();
  };

  const myZone=users[myId]?.zone;
  if(myZone!=='juegos'&&!isAdmin) return null;

  if(gState==='finished'){
    const ranking=Object.entries(scores)
      .map(([uid,pts])=>({uid,pts,user:users[uid]}))
      .filter(x=>x.user).sort((a,b)=>b.pts-a.pts);
    return(
      <div style={{position:'fixed',inset:0,zIndex:250,background:'rgba(7,9,31,.97)',backdropFilter:'blur(8px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,gap:14,overflowY:'auto'}}>
        <Confetti/>
        <div style={{fontSize:54}}>🏆</div>
        <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:30,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.06em',margin:0,textAlign:'center'}}>¡Tabú Bíblico — Resultados!</h2>

              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:24,color:i===0?'#ffd000':'#fff',width:36,textAlign:'center'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</div>

        </div>
        {isAdmin&&(<button onClick={cerrar} style={{marginTop:14,background:'#ffd000',border:'none',borderRadius:14,padding:'14px 32px',color:'#07091f',fontWeight:900,fontSize:14,fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase',cursor:'pointer'}}>Cerrar juego</button>)}

          <div>
            <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>Describe</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:18,color:'#fff'}}>{currentSpeaker.name}</div>
          </div>
        </div>
        {(isSpeaker||isAdmin)?(
          showCard||isSpeaker?(
            <div style={{width:'100%',maxWidth:380,background:'linear-gradient(135deg,#fff,#f8f5ef)',borderRadius:24,padding:'20px 22px',boxShadow:'0 20px 60px rgba(0,0,0,.5)',border:'4px solid #ffd000'}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,color:'#a16207',textTransform:'uppercase',letterSpacing:'.18em',marginBottom:6}}>{currentCard.tipo}</div>

            <div style={{fontSize:54,marginBottom:14}}>🤐</div>

              {juegosUsers.filter(u=>u.uid!==currentSpeakerId).map(u=>(

                  <AvatarBubble profile={u} size={26}/>
                  <span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</span>

          {juegosUsers.length===0?(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:14}}>Nadie en sala de juegos aún.</div>
          ):(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              {juegosUsers.map(u=>(
                <button key={u.uid} onClick={()=>seleccionarManual(u.uid)} style={{display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.12)',borderRadius:10,padding:'8px 10px',cursor:'pointer',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:14,textAlign:'left'}}>
                  <AvatarBubble profile={u} size={26}/>
                  <span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</span>
                </button>
              ))}
            </div>
          )}
          <div style={{display:'flex',gap:8,marginTop:10}}>
            {ranking.length>0&&(<button onClick={finalizar} style={{flex:1,background:'rgba(34,197,94,.18)',border:'1px solid rgba(34,197,94,.4)',borderRadius:14,padding:'12px',color:'#86efac',fontWeight:800,fontSize:13,fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>🏆 Finalizar y ver resultados</button>)}
            <button onClick={cerrar} style={{flex:1,background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.35)',borderRadius:14,padding:'12px',color:'#fca5a5',fontWeight:800,fontSize:13,fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>✕ Cerrar</button>
          </div>
        </div>
      ):(
        <div style={{textAlign:'center',color:'var(--muted)',fontSize:14,maxWidth:300}}>Esperando que el admin elija al próximo describidor...<Spinner size={22}/></div>
      )}
    </div>
  );
}

/* ═══ DIBUJANDO LA BIBLIA — lienzo de dibujo en vivo ═══ */
// El dibujante escribe trazos en Firebase (normalizados 0..1); todos los miran.
function DibujaCanvas({SID,canDraw,color='#0a0e2e',strokes,live,height=300}){
  const wrapRef=useRef(null);
  const curRef=useRef(null);     // trazo en curso (array de puntos)
  const lastWriteRef=useRef(0);
  const drawingRef=useRef(false);

  const getPt=e=>{
    const r=wrapRef.current.getBoundingClientRect();
    const p=e.touches?e.touches[0]:e;
    return {x:(p.clientX-r.left)/r.width, y:(p.clientY-r.top)/r.height};
  };
  const writeLive=()=>{
    db.ref(`sessions/${SID}/dibuja/live`).set({color,points:curRef.current});
  };
  const start=e=>{
    if(!canDraw) return;
    if(e.cancelable) e.preventDefault();
    drawingRef.current=true;
    curRef.current=[getPt(e)];
    writeLive();
  };
  const move=e=>{
    if(!canDraw||!drawingRef.current) return;
    if(e.cancelable) e.preventDefault();
    curRef.current.push(getPt(e));
    const now=Date.now();
    if(now-lastWriteRef.current>70){ lastWriteRef.current=now; writeLive(); }
  };
  const end=()=>{
    if(!canDraw||!drawingRef.current) return;
    drawingRef.current=false;
    if(curRef.current&&curRef.current.length>1){
      db.ref(`sessions/${SID}/dibuja/strokes`).push({color,points:curRef.current});
    }
    curRef.current=null;
    db.ref(`sessions/${SID}/dibuja/live`).remove();
  };

  const strokeArr=strokes?Object.values(strokes):[];
  const liveStroke=live&&live.points?live:null;
  const toPath=pts=>pts.map((p,i)=>`${i===0?'M':'L'} ${(p.x*100).toFixed(2)} ${(p.y*100).toFixed(2)}`).join(' ');

  return(
    <div ref={wrapRef}
      onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
      onTouchStart={start} onTouchMove={move} onTouchEnd={end}
      style={{width:'100%',height,background:'#fff',borderRadius:14,
        border:'3px solid #ffd000',overflow:'hidden',position:'relative',
        touchAction:'none',cursor:canDraw?'crosshair':'default',
        boxShadow:'0 10px 30px rgba(0,0,0,.4)'}}>
      <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"
        style={{display:'block'}}>
        {strokeArr.map((s,i)=>(
          <path key={i} d={toPath(s.points||[])} stroke={s.color||'#0a0e2e'}
            strokeWidth="0.9" fill="none" strokeLinecap="round" strokeLinejoin="round"
            vectorEffect="non-scaling-stroke"/>
        ))}
        {liveStroke&&(
          <path d={toPath(liveStroke.points)} stroke={liveStroke.color||'#0a0e2e'}
            strokeWidth="0.9" fill="none" strokeLinecap="round" strokeLinejoin="round"
            vectorEffect="non-scaling-stroke"/>
        )}
      </svg>
      {strokeArr.length===0&&!liveStroke&&(
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
          justifyContent:'center',color:'#c9c4b8',fontFamily:'Barlow Condensed,sans-serif',
          fontWeight:700,fontSize:15,letterSpacing:'.06em',textTransform:'uppercase',
          pointerEvents:'none'}}>
          {canDraw?'✏️ Dibuja aquí':'Esperando el dibujo...'}
        </div>
      )}
    </div>
  );
}

/* Dado visual con animación; todos ven el mismo resultado por su timestamp. */
function DibujaDie({roll,faces,size=64}){
  const[anim,setAnim]=useState(false);
  useEffect(()=>{ if(roll?.ts){ setAnim(true); const t=setTimeout(()=>setAnim(false),650); return()=>clearTimeout(t);} },[roll?.ts]);
  const face=roll?(faces?faces[roll.value]:roll.value):'?';
  return(
    <div style={{width:size,height:size,borderRadius:14,background:'#fff',
      border:'2px solid #ffd000',display:'flex',alignItems:'center',justifyContent:'center',
      fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:size*.5,color:'#0a0e2e',
      boxShadow:'0 6px 18px rgba(0,0,0,.35)',
      animation:anim?'diceRoll .6s ease':undefined}}>
      {face}
    </div>
  );
}

/* Pantalla de armado de equipos (solo admin). */
/* Setup de equipos (admin) — escribe DIRECTO en Firebase para que todos lo
   vean en vivo y la división sea determinista. */
function DibujaSetup({game,SID,juegosUsers,onCancel,onContinue}){
  const ref=()=>db.ref(`sessions/${SID}/dibuja`);
  const order=game?.order||[];
  const teams=game?.teams||{};
  const numTeams=order.length||2;

  const maxTeams=Math.max(2,Math.min(6,juegosUsers.length||2));

  // Crear esqueleto de N equipos (conserva avatares previos si existen).
  const buildSkeleton=async(n)=>{
    const t={},ord=[];
    for(let i=0;i<n;i++){
      const tid='t'+i; ord.push(tid);
      t[tid]={name:'Equipo '+(i+1),
        avatar:teams['t'+i]?.avatar||DIBUJA_TEAM_AVATARS[i],
        color:DIBUJA_TEAM_COLORS[i%DIBUJA_TEAM_COLORS.length],
        members:{},captain:null,pos:0,drawerIdx:0};
    }
    await ref().update({teams:t,order:ord});
  };
  // Inicializa con 2 equipos si aún no hay.
  useEffect(()=>{ if(order.length===0) buildSkeleton(2); },[order.length]);

  // Mueve un usuario al equipo t (lo quita de los demás).
  const assignUser=async(uid,t)=>{
    const updates={};
    order.forEach((tid,j)=>{ updates[`teams/${tid}/members/${uid}`]=(j===t)?true:null; });
    await ref().update(updates);
  };
  const repartirAzar=async()=>{
    const shuffled=[...juegosUsers].sort(()=>Math.random()-0.5);
    const updates={};
    shuffled.forEach((u,i)=>{
      const t=i%order.length;
      order.forEach((tid,j)=>{ updates[`teams/${tid}/members/${u.uid}`]=(j===t)?true:null; });
    });
    await ref().update(updates);
  };
  const setAvatar=(t,av)=>ref().child(`teams/${order[t]}/avatar`).set(av);
  const teamOf=uid=>order.findIndex(tid=>teams[tid]?.members?.[uid]);
  const allAssigned=juegosUsers.length>0&&juegosUsers.every(u=>teamOf(u.uid)>=0);

  return(
    <div style={{position:'fixed',inset:0,zIndex:250,background:'rgba(7,9,31,.97)',
      backdropFilter:'blur(8px)',display:'flex',flexDirection:'column',alignItems:'center',
      padding:'20px 16px',gap:14,overflowY:'auto'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:40}}>🎨</div>
        <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:26,
          color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em',margin:0}}>Dibujando la Biblia</h2>
        <p style={{color:'var(--muted)',fontSize:13,marginTop:4}}>Arma los equipos · {juegosUsers.length} en sala</p>
      </div>

      {/* Número de equipos */}
      <div style={{width:'100%',maxWidth:420,background:'rgba(255,255,255,.05)',
        border:'1px solid rgba(255,255,255,.1)',borderRadius:14,padding:'12px 14px'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,
          color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:8}}>
          Cantidad de equipos
        </div>
        <div style={{display:'flex',gap:6}}>
          {Array.from({length:maxTeams-1},(_,i)=>i+2).map(n=>(
            <button key={n} onClick={()=>buildSkeleton(n)} style={{
              flex:1,padding:'10px',borderRadius:10,cursor:'pointer',
              border:numTeams===n?'2px solid #ffd000':'1px solid rgba(255,255,255,.12)',
              background:numTeams===n?'rgba(255,208,0,.18)':'rgba(255,255,255,.04)',
              color:numTeams===n?'#ffd000':'#fff',fontFamily:'Barlow Condensed,sans-serif',
              fontWeight:900,fontSize:18}}>{n}</button>
          ))}
        </div>
      </div>

      {/* Avatar de cada equipo + miembros actuales */}
      <div style={{width:'100%',maxWidth:420,display:'flex',flexDirection:'column',gap:8}}>
        {order.map((tid,t)=>{
          const team=teams[tid]||{};
          const members=Object.keys(team.members||{});
          return(
            <div key={tid} style={{
              background:`${DIBUJA_TEAM_COLORS[t%DIBUJA_TEAM_COLORS.length]}1a`,
              border:`1px solid ${DIBUJA_TEAM_COLORS[t%DIBUJA_TEAM_COLORS.length]}55`,
              borderRadius:12,padding:'8px 10px'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14,
                  color:DIBUJA_TEAM_COLORS[t%DIBUJA_TEAM_COLORS.length],width:70,flexShrink:0}}>Equipo {t+1}</div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap',flex:1}}>
                  {DIBUJA_TEAM_AVATARS.slice(0,8).map(av=>(
                    <button key={av} onClick={()=>setAvatar(t,av)} style={{
                      width:28,height:28,borderRadius:8,fontSize:15,cursor:'pointer',
                      border:team.avatar===av?'2px solid #ffd000':'1px solid rgba(255,255,255,.15)',
                      background:team.avatar===av?'rgba(255,208,0,.2)':'rgba(255,255,255,.05)'}}>{av}</button>
                  ))}
                </div>
              </div>
              {members.length>0&&(
                <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>
                  {members.map(uid=>users_safe(juegosUsers,uid)).filter(Boolean).map(u=>(
                    <span key={u.uid} style={{display:'flex',alignItems:'center',gap:4,
                      background:'rgba(255,255,255,.08)',borderRadius:20,padding:'2px 8px 2px 4px',
                      fontSize:11,color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
                      <AvatarBubble profile={u} size={18}/>{u.name}
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Repartir */}
      <div style={{width:'100%',maxWidth:420}}>
        <button onClick={repartirAzar} disabled={juegosUsers.length===0} style={{
          width:'100%',padding:'12px',borderRadius:12,border:'none',cursor:'pointer',
          background:'linear-gradient(135deg,#8b5cf6,#6d28d9)',color:'#fff',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14,
          letterSpacing:'.05em',textTransform:'uppercase',opacity:juegosUsers.length?1:.5}}>
          🎲 Repartir al azar
        </button>
      </div>

      {/* Asignación manual */}
      <div style={{width:'100%',maxWidth:420,display:'flex',flexDirection:'column',gap:6}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,
          color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.12em'}}>O asigna manualmente:</div>
        {juegosUsers.length===0&&(<div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:10}}>Nadie en sala de juegos aún.</div>)}
        {juegosUsers.map(u=>{
          const myT=teamOf(u.uid);
          return(
            <div key={u.uid} style={{display:'flex',alignItems:'center',gap:8,
              background:'rgba(255,255,255,.04)',borderRadius:10,padding:'6px 8px'}}>
              <AvatarBubble profile={u} size={28}/>
              <span style={{flex:1,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                fontSize:14,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</span>
              <div style={{display:'flex',gap:4}}>
                {order.map((tid,t)=>(
                  <button key={t} onClick={()=>assignUser(u.uid,t)} style={{
                    width:30,height:30,borderRadius:8,cursor:'pointer',
                    fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:13,
                    border:myT===t?`2px solid ${DIBUJA_TEAM_COLORS[t]}`:'1px solid rgba(255,255,255,.12)',
                    background:myT===t?`${DIBUJA_TEAM_COLORS[t]}33`:'rgba(255,255,255,.04)',
                    color:myT===t?DIBUJA_TEAM_COLORS[t]:'#fff'}}>{t+1}</button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{width:'100%',maxWidth:420,display:'flex',gap:8,marginTop:4}}>
        <button onClick={onCancel} style={{flex:1,padding:'13px',borderRadius:12,
          border:'1px solid rgba(255,255,255,.12)',background:'rgba(255,255,255,.05)',
          color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:13,letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>Cancelar</button>
        <button onClick={onContinue} disabled={!allAssigned} style={{flex:2,padding:'13px',borderRadius:12,
          border:'none',cursor:allAssigned?'pointer':'not-allowed',
          background:allAssigned?'linear-gradient(135deg,#ffd000,#e6a800)':'rgba(255,255,255,.1)',
          color:allAssigned?'#0a0e2e':'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',
          fontWeight:900,fontSize:14,letterSpacing:'.05em',textTransform:'uppercase'}}>
          {allAssigned?'👑 Elegir capitanes →':'Asigna a todos'}
        </button>
      </div>
    </div>
  );
}
// Helper: encuentra un usuario en la lista por uid.
function users_safe(list,uid){ return list.find(u=>u.uid===uid)||null; }
