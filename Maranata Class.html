const detectZone=(x,y)=>{
  for(const[key,z] of Object.entries(ZONES)){
    if(x>=z.x1&&x<=z.x2&&y>=z.y1&&y<=z.y2) return key;
  }
  return 'entrada';
};

// Comprimir imagen a base64
const compressImage=(file,maxSize=200)=>new Promise(resolve=>{
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const ratio=Math.min(maxSize/img.width,maxSize/img.height);
    canvas.width=img.width*ratio;
    canvas.height=img.height*ratio;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    resolve(canvas.toDataURL('image/jpeg',0.6));
  };
  img.src=url;
});

const formatTime=s=>{
  const abs=Math.abs(s);
  const m=Math.floor(abs/60).toString().padStart(2,'0');
  const sec=(abs%60).toString().padStart(2,'0');
  return `${s<0?'-':''}${m}:${sec}`;
};

      headers:{'Content-Type':'application/json'},

        service_id:EMAILJS_SERVICE_ID,

/* ════════════════════════ MRNT PETALS (visual) ════════════════════════
   Visual del Plan Maranata: 4 letras (M, R, N, T) con 2 pétalos por letra
   (yo / nosotros). Aquí los mapeamos a las 4 zonas funcionales:
   M = Misión        → Confraternización (interior + exterior naranja/amarillo)
   R = Relación      → Repaso bíblico
   N = Nutrición     → Juegos
   T = Templo        → Entrada / adoración
*/
const MRNT_SECTORS=[
  {key:'M',label:'Misión',         core:'#1d4ed8', petal1:'#3b82f6', petal2:'#60a5fa', angle:135, zone:'confra'},
  {key:'R',label:'Relación',       core:'#f59e0b', petal1:'#ffd000', petal2:'#fde047', angle:45,  zone:'repaso'},
  {key:'N',label:'Nutrición',      core:'#ea580c', petal1:'#fb923c', petal2:'#fdba74', angle:315, zone:'juegos'},
  {key:'T',label:'Templo',         core:'#5b21b6', petal1:'#7c3aed', petal2:'#a78bfa', angle:225, zone:'entrada'},
];

/* Pétalo individual (forma como gajo) */
const Petal=({cx,cy,r1,r2,start,end,fill,stroke='none',onClick,style})=>{
  const toRad=d=>d*Math.PI/180;
  const x1=cx+r1*Math.cos(toRad(start)), y1=cy+r1*Math.sin(toRad(start));
  const x2=cx+r2*Math.cos(toRad(start)), y2=cy+r2*Math.sin(toRad(start));
  const x3=cx+r2*Math.cos(toRad(end)),   y3=cy+r2*Math.sin(toRad(end));
  const x4=cx+r1*Math.cos(toRad(end)),   y4=cy+r1*Math.sin(toRad(end));
  const large=Math.abs(end-start)>180?1:0;
  const d=`M${x1},${y1} L${x2},${y2} A${r2},${r2} 0 ${large} 1 ${x3},${y3} L${x4},${y4} A${r1},${r1} 0 ${large} 0 ${x1},${y1} Z`;
  return <path d={d} fill={fill} stroke={stroke} strokeWidth={stroke==='none'?0:1.5} onClick={onClick} style={{cursor:onClick?'pointer':'default',transition:'all .25s',...style}}/>;
};

/* Diagrama MRNT estático (ilustración del plan) */
function MRNTDiagram({size=400,interactive=false,onSectorClick,activeSector,labels=true,hideCenterDot=false}){
  const cx=size/2, cy=size/2;
  const rCore=size*0.20;     // círculo central con letras
  const rInner=size*0.30;    // pétalo "yo"
  const rOuter=size*0.42;    // pétalo "nosotros"
  // 4 cuadrantes a 90° cada uno; cada cuadrante tiene 2 pétalos (yo + nosotros)
  // M: 90-180 (top-left), R: 0-90 (top-right), N: -90 a 0 (bottom-right), T: 180-270 (bottom-left)
  const quadrants=[
    {key:'M', start:180, end:270, core:'#1d4ed8', p1:'#3b82f6', p2:'#1e40af', letter:'M'},
    {key:'R', start:270, end:360, core:'#ca8a04', p1:'#ffd000', p2:'#eab308', letter:'R'},
    {key:'N', start:0,   end:90,  core:'#ea580c', p1:'#fb923c', p2:'#c2410c', letter:'N'},
    {key:'T', start:90,  end:180, core:'#5b21b6', p1:'#7c3aed', p2:'#4c1d95', letter:'T'},
  ];
  return(
    <svg width="100%" height="100%" viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
      {/* Pétalo exterior (nosotros) */}
      {quadrants.map(q=>{
        const mid=(q.start+q.end)/2;
        const isActive=activeSector===q.key;
        return(
          <g key={q.key+'-out'}>
            <Petal cx={cx} cy={cy} r1={rInner+4} r2={rOuter}
              start={q.start+3} end={q.end-3}
              fill={q.p2}
              onClick={interactive?()=>onSectorClick?.(q.key,'nosotros'):undefined}
              style={{opacity:isActive?1:0.92,filter:isActive?`drop-shadow(0 0 14px ${q.p2})`:undefined}}/>
            {labels&&(
              <text
                x={cx+(rInner+rOuter)/2*Math.cos((mid)*Math.PI/180)}
                y={cy+(rInner+rOuter)/2*Math.sin((mid)*Math.PI/180)}
                textAnchor="middle" dominantBaseline="middle"
                transform={`rotate(${mid+90} ${cx+(rInner+rOuter)/2*Math.cos(mid*Math.PI/180)} ${cy+(rInner+rOuter)/2*Math.sin(mid*Math.PI/180)})`}
                fill="white" fontFamily="var(--display)" fontWeight="800"
                fontSize={size*0.032} letterSpacing="1">
                {q.letter}2 / NOSOTROS
              </text>
            )}
          </g>
        );
      })}
      {/* Pétalo interior (yo) */}
      {quadrants.map(q=>{
        const mid=(q.start+q.end)/2;
        return(
          <g key={q.key+'-in'}>
            <Petal cx={cx} cy={cy} r1={rCore+3} r2={rInner}
              start={q.start+5} end={q.end-5}
              fill={q.p1}
              onClick={interactive?()=>onSectorClick?.(q.key,'yo'):undefined}
              style={{opacity:0.96}}/>
            {labels&&(
              <text
                x={cx+(rCore+rInner)/2*Math.cos((mid)*Math.PI/180)}
                y={cy+(rCore+rInner)/2*Math.sin((mid)*Math.PI/180)}
                textAnchor="middle" dominantBaseline="middle"
                transform={`rotate(${mid+90} ${cx+(rCore+rInner)/2*Math.cos(mid*Math.PI/180)} ${cy+(rCore+rInner)/2*Math.sin(mid*Math.PI/180)})`}
                fill="white" fontFamily="var(--display)" fontWeight="700"
                fontSize={size*0.026} letterSpacing="1">
                {q.letter}1 / YO
              </text>
            )}
          </g>
        );
      })}
      {/* Núcleo central con letras MRNT */}
      {quadrants.map(q=>(
        <Petal key={q.key+'-core'} cx={cx} cy={cy} r1={size*0.04} r2={rCore}
          start={q.start+1} end={q.end-1}
          fill={q.core} style={{opacity:.98}}/>
      ))}
      {quadrants.map(q=>{
        const mid=(q.start+q.end)/2;
        const r=rCore*0.62;
        return(
          <text key={q.key+'-letter'}
            x={cx+r*Math.cos(mid*Math.PI/180)}
            y={cy+r*Math.sin(mid*Math.PI/180)}
            textAnchor="middle" dominantBaseline="central"
            fontFamily="var(--display)" fontWeight="900"
            fontSize={size*0.13} fill="white">
            {q.letter}
          </text>
        );
      })}
      {/* Punto central */}
      {!hideCenterDot&&<circle cx={cx} cy={cy} r={size*0.04} fill="#0a0e2e"/>}
    </svg>
  );
}

/* ════════════════════════ TIMER ════════════════════════ */
function useTimer(startTime,duration){
  const[elapsed,setElapsed]=useState(0);
  useEffect(()=>{
    if(!startTime) return;
    const iv=setInterval(()=>{
      setElapsed(Math.floor((Date.now()-startTime)/1000));
    },1000);
    return()=>clearInterval(iv);
  },[startTime]);
  const remaining=duration-elapsed;
  return{elapsed,remaining,over:remaining<=0};
}

function TimerDisplay({remaining,color='#ffd000',large=false}){
  const abs=Math.abs(remaining);
  const over=remaining<0;
  const s=large?72:36;
  const stroke=large?7:4;
  const r=(s-stroke)/2;
  const circ=2*Math.PI*r;
  const pct=over?0:Math.max(0,remaining/(PHASE_DURATIONS.confra||600));
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{position:'relative',width:s*2,height:s*2}}>
        <svg width={s*2} height={s*2} style={{transform:'rotate(-90deg)'}}>
          <circle cx={s} cy={s} r={r} fill="none"
            stroke="rgba(255,255,255,.08)" strokeWidth={stroke}/>
          <circle cx={s} cy={s} r={r} fill="none"
            stroke={over?'#ef4444':color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct)}
            strokeLinecap="round"
            style={{transition:'stroke-dashoffset 1s linear'}}/>
        </svg>
        <div style={{
          position:'absolute',inset:0,display:'flex',alignItems:'center',
          justifyContent:'center',flexDirection:'column',
        }}>
          <span style={{
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:large?28:14,color:over?'#ef4444':color,letterSpacing:'-.02em',
            animation:over?'timerTick 1s infinite':undefined,
          }}>
            {over?'-':''}{formatTime(abs)}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ ROOM CANVAS ════════════════════════ */
function RoomCanvas({users,myId,session,onDragMove,roomRef,full,reactions}){
  const entries=Object.entries(users);
  const phase=session?.phase||'waiting';
  const isDrag=useRef(false);
  const lastT=useRef(0);

  const handleDragStart=useCallback(e=>{
    if(full) return;
    e.preventDefault();
    isDrag.current=true;
  },[full]);

  const handleDragMove=useCallback(e=>{
    if(!isDrag.current||full) return;
    const now=Date.now();
    if(now-lastT.current<50) return;
    lastT.current=now;
    const rect=roomRef.current?.getBoundingClientRect();
    if(!rect) return;
    const cx=e.touches?.[0]?.clientX??e.clientX;
    const cy=e.touches?.[0]?.clientY??e.clientY;
    const x=Math.max(2,Math.min(96,((cx-rect.left)/rect.width)*100));
    const y=Math.max(14,Math.min(94,((cy-rect.top)/rect.height)*100));
    onDragMove(x,y);
  },[full,onDragMove,roomRef]);

  const handleDragEnd=useCallback(()=>{ isDrag.current=false; },[]);

  const zoneCardStyle=(key)=>{
    const z=ZONES[key];
    const isActive=phase===key;
    const isEntrada=key==='entrada';
    // Tinte transparente del color de la zona
    const tint=isEntrada
      ? (isActive?'rgba(255,255,255,.95)':'rgba(255,255,255,.85)')
      : (isActive?z.bg.replace('.10','.22'):z.bg.replace('.10','.13'));
    return{
      position:'absolute',
      left:`${z.cardX}%`,top:`${z.cardY}%`,
      width:`${z.cardW}%`,height:`${z.cardH}%`,
      background:tint,
      border:`${isActive?4:3}px solid ${isEntrada?'#0a0e2e':z.color}`,
      borderRadius:16,
      overflow:'hidden',
      transition:'all .3s',
      boxShadow:isActive
        ? `0 10px 28px ${isEntrada?'rgba(10,14,46,.18)':z.color+'55'}, 0 0 0 5px ${isEntrada?'rgba(10,14,46,.08)':z.color+'22'}`
        : `0 4px 14px ${isEntrada?'rgba(10,14,46,.08)':z.color+'25'}`,
      pointerEvents:'none',
      display:'flex',flexDirection:'column',
      padding:full?'12px 14px':'7px 9px',
      backdropFilter:'blur(2px)',
    };
  };

  return(
    <div
      ref={roomRef}
      onMouseMove={handleDragMove} onMouseUp={handleDragEnd} onMouseLeave={handleDragEnd}
      onTouchMove={handleDragMove} onTouchEnd={handleDragEnd}
      style={{
        width:'100%',height:'100%',position:'relative',overflow:'hidden',
        background:'#f8f5ef',touchAction:'none',userSelect:'none',
        backgroundImage:`
          radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.6),transparent 70%),
          radial-gradient(circle at 12% 88%,rgba(59,130,246,.05),transparent 50%),
          radial-gradient(circle at 88% 12%,rgba(234,179,8,.06),transparent 50%)
        `,
      }}>

      {/* Diagrama MRNT central — el plan visual */}
      <div style={{
        position:'absolute',
        left:'50%',top:'50%',transform:'translate(-50%,-50%)',
        width:full?'34%':'32%',aspectRatio:'1/1',
        pointerEvents:'none',zIndex:1,
        display:'flex',alignItems:'center',justifyContent:'center',
      }}>
        <div style={{width:'100%',height:'100%',position:'relative'}}>
          <MRNTDiagram size={full?360:220} interactive={false}
            activeSector={phase==='confra'?'R':phase==='repaso'?'N':phase==='juegos'?'N':phase==='mision'?'M':phase==='templo'?'T':null}
            labels={false} hideCenterDot={true}/>
        </div>
      </div>

      {/* Líneas conectoras sutiles desde diagrama hacia cada zona card */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',
        pointerEvents:'none',zIndex:0}} preserveAspectRatio="none" viewBox="0 0 100 100">
        {['entrada','mision','confra','repaso','juegos','templo'].map(key=>{
          const z=ZONES[key];
          const cx=z.cardX+z.cardW/2;
          const cy=z.cardY+z.cardH/2;
          const isActive=phase===key;
          return(
            <line key={key} x1="50" y1="50" x2={cx} y2={cy}
              stroke={z.color}
              strokeWidth={isActive?'.4':'.18'}
              strokeDasharray={isActive?'0':'1.2,1.2'}
              opacity={isActive?.5:.22}
              vectorEffect="non-scaling-stroke"/>
          );
        })}
      </svg>

      {/* Zone cards alrededor del diagrama (6 zonas: entrada + 4 MRNT + templo) */}
      {['entrada','mision','confra','repaso','juegos','templo'].map(key=>{
        const z=ZONES[key];
        const count=entries.filter(([,u])=>u.zone===key).length;
        const isActive=phase===key;
        const isEntrada=key==='entrada';
        return(
          <div key={key} style={zoneCardStyle(key)}>
            {isEntrada?(
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:full?10:6,
                height:'100%'}}>
                <div style={{fontSize:full?22:14}}>🚪</div>
                <div style={{lineHeight:1.05}}>
                  <div style={{
                    fontSize:full?9:6.5,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                    color:'#3b3f5a',textTransform:'uppercase',letterSpacing:'.22em',
                  }}>Llegada</div>
                  <div style={{
                    fontSize:full?17:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                    color:'#0a0e2e',textTransform:'uppercase',letterSpacing:'.04em',marginTop:2,
                  }}>Entrada</div>
                </div>

                    padding:full?'2px 9px':'1px 6px',borderRadius:20,marginLeft:full?8:4,

                )}
              </div>
            ):(<>
              <div style={{display:'flex',alignItems:'center',gap:full?10:6,marginBottom:full?4:2}}>
                <div style={{
                  width:full?34:20,height:full?34:20,borderRadius:9,
                  background:z.color,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'#fff',fontFamily:'Barlow Condensed,sans-serif',
                  fontWeight:900,fontSize:full?20:13,lineHeight:1,
                  boxShadow:`0 3px 8px ${z.color}55`,flexShrink:0,
                }}>{z.letter}</div>
                <div style={{lineHeight:1.05,minWidth:0,flex:1}}>
                  <div style={{
                    fontSize:full?9:6.5,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                    color:z.colorDark,textTransform:'uppercase',letterSpacing:'.18em',
                  }}>{z.mrnt}</div>
                  <div style={{
                    fontSize:full?17:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                    color:'#0a0e2e',textTransform:'uppercase',letterSpacing:'.02em',
                    marginTop:full?3:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                  }}>{full?z.label:z.label.split(' ')[0]}</div>
                </div>
              </div>
              {count>0&&(
                <div style={{
                  marginTop:'auto',
                  display:'flex',alignItems:'center',gap:full?6:3,

                  color:z.colorDark,letterSpacing:'.08em',textTransform:'uppercase',
                }}>
                  <div style={{width:full?6:4,height:full?6:4,borderRadius:'50%',
                    background:z.color,boxShadow:`0 0 6px ${z.color}aa`}}/>
                  {count} {count===1?'joven':'jóvenes'}
                </div>
              )}
            </>)}
            {isActive&&!isEntrada&&(
              <div style={{
                position:'absolute',top:full?8:5,right:full?8:5,
                background:z.color,color:'#fff',

            color:'#0a0e2e',letterSpacing:'.06em',textTransform:'uppercase'}}>MARANATA CLASS</div>

/* ════════════════════════ CONFRA: SPEAKER PANEL ════════════════════════ */
function ConfraSpeakerPanel({session,users,myId,isAdmin,onNext,onEnd,onReact,myReactions,allReactions}){
  // confraOpen en el padre controla la visibilidad — este componente siempre renderiza si se llama
  const confra=session?.confra;

  const rawQueue=confra?.queue||{};
  const queue=Array.isArray(rawQueue)?rawQueue:Object.values(rawQueue);
  const idx=typeof confra?.currentIdx==='number'?confra.currentIdx:0;
  const speakerUid=queue[idx];
  const speaker=speakerUid?users[speakerUid]:null;
  const isMe=speakerUid===myId;
  const remaining=Math.max(0,queue.length-idx-1);

  if(!speaker){
    return(
      <div style={{position:'fixed',inset:0,zIndex:150,
        background:'rgba(7,9,31,.96)',backdropFilter:'blur(12px)',
        display:'flex',flexDirection:'column',alignItems:'center',
        justifyContent:'center',padding:24,gap:12,textAlign:'center'}}>
        <div style={{fontSize:52,animation:'bounce 1s infinite'}}>🤝</div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:20,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.05em'}}>
          Iniciando confraternización...
        </div>
        <div style={{fontSize:13,color:'var(--muted)'}}>Un momento por favor</div>
        {isAdmin&&(
          <button onClick={onEnd} style={{marginTop:8,
            background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
            borderRadius:12,padding:'10px 22px',color:'#ef4444',fontWeight:800,fontSize:13,
            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase'}}>
            ✕ Cancelar
          </button>
        )}
      </div>
    );
  }

  const isLast=remaining===0;

  return(
    <div style={{
      position:'fixed',inset:0,zIndex:150,
      background:'rgba(7,9,31,.92)',backdropFilter:'blur(10px)',
      display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',padding:'20px 16px',gap:14,
      overflowY:'auto',
    }}>

      {/* Chip de estado */}
      <div style={{
        background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',
        borderRadius:20,padding:'5px 16px',
        fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
        fontSize:11,color:'#f59e0b',letterSpacing:'.1em',textTransform:'uppercase',
        display:'flex',alignItems:'center',gap:6,

        <span style={{width:6,height:6,borderRadius:'50%',background:'#f59e0b',
          display:'inline-block',animation:'pulse 1.5s infinite'}}/>

      {/* Tarjeta del speaker */}
      <div style={{
        background:'linear-gradient(145deg,rgba(245,158,11,.08),rgba(7,9,31,.6))',
        border:`2px solid ${speaker.color||'#f59e0b'}55`,
        borderRadius:22,padding:'22px 20px',
        textAlign:'center',width:'100%',maxWidth:340,
        animation:'speakerPop .55s ease',
        boxShadow:`0 0 40px ${speaker.color||'#f59e0b'}18`,
      }}>
        {/* Personaje */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
          <AvatarBubble profile={speaker} size={90} glow={true}/>
        </div>

        {/* Nombre */}
        <div style={{
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:30,letterSpacing:'-.01em',
          color:speaker.color||'#ffd000',
          textShadow:`0 0 20px ${speaker.color||'#ffd000'}66`,
        }}>
          {isMe?'¡Es tu turno!':speaker.name}

            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em'}}>

          border:'1px solid rgba(255,255,255,.08)',
          borderRadius:14,padding:'12px 14px',
          fontSize:14,color:'var(--white)',lineHeight:1.55,
          fontStyle:'italic',
        }}>
          🙏 {isMe
            ? '¿Quieres contarnos, pedir o agradecer algo?'
            : `¿Quieres contarnos, pedir o agradecer algo, ${speaker.name.split(' ')[0]}?`}
        </div>
      </div>

      {/* Reacciones acumuladas — visibles para todos */}
      {(()=>{
        // Calcular totales por tipo
        const speakerReactions=allReactions||{};
        const totals={};
        REACTIONS.forEach(r=>{totals[r.id]=0;});
        Object.values(speakerReactions).forEach(userRxns=>{
          if(userRxns&&typeof userRxns==='object'){
            Object.keys(userRxns).forEach(rid=>{if(totals[rid]!==undefined)totals[rid]++;});
          }
        });
        const hasAny=Object.values(totals).some(v=>v>0);
        return(
          <div style={{width:'100%',maxWidth:360}}>
            {/* Totales acumulados */}
            {hasAny&&(
              <div style={{display:'flex',gap:6,flexWrap:'wrap',
                justifyContent:'center',marginBottom:10}}>
                {REACTIONS.filter(r=>totals[r.id]>0).map(r=>(
                  <div key={r.id} style={{
                    background:'rgba(255,255,255,.08)',
                    border:`1px solid ${speaker.color||'#ffd000'}33`,
                    borderRadius:20,padding:'4px 10px',
                    display:'flex',alignItems:'center',gap:4,
                    animation:'slideIn .2s ease',
                  }}>
                    <span style={{fontSize:16}}>{r.e}</span>
                    <span style={{fontSize:13,fontWeight:800,

                      fontFamily:'Barlow Condensed,sans-serif'}}>{totals[r.id]}</span>

            {/* Botones para los que no son el speaker */}
            {!isMe&&(
              <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>

                  return(
                    <div key={r.id} style={{position:'relative'}}>
                      <button onClick={()=>onReact(r.id)} style={{
                        background:selected
                          ?`${speaker.color||'#ffd000'}28`
                          :'rgba(255,255,255,.05)',
                        border:selected
                          ?`2px solid ${speaker.color||'#ffd000'}`
                          :'2px solid rgba(255,255,255,.12)',
                        borderRadius:50,width:52,height:52,fontSize:24,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        boxShadow:selected?`0 0 16px ${speaker.color||'#ffd000'}55`:undefined,
                        transition:'all .18s',
                        flexDirection:'column',gap:0,
                        animation:selected?'reactionPop .35s ease':'none',
                      }}>
                        {r.e}
                        {selected&&(
                          <div style={{
                            position:'absolute',top:-5,right:-5,
                            width:16,height:16,borderRadius:'50%',

            )}
            {!isMe&&!isAdmin&&(
              <div style={{fontSize:10,color:'var(--muted)',textAlign:'center',
                marginTop:6}}>
                Puedes seleccionar varias 👆
              </div>
            )}
          </div>
        );
      })()}

      {/* Progreso — puntitos */}
      <div style={{display:'flex',gap:7,alignItems:'center'}}>
        {queue.map((_,i)=>(
          <div key={i} style={{
            width:i===idx?22:8,height:8,borderRadius:4,
            background:i<idx?'#10b981':i===idx?speaker.color||'#ffd000':'rgba(255,255,255,.12)',
            transition:'all .35s cubic-bezier(0.23,1,0.32,1)',
          }}/>
        ))}
      </div>

      {/* Botón del speaker: terminar turno */}
      {isMe&&(
        <button onClick={isLast?onEnd:onNext} style={{
          background:`linear-gradient(135deg,${speaker.color||'#ffd000'},${speaker.color||'#ffd000'}bb)`,
          border:'none',borderRadius:14,padding:'14px 32px',
          color:'#07091f',fontWeight:900,fontSize:16,
          fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase',
          boxShadow:`0 0 28px ${speaker.color||'#ffd000'}44`,
          marginTop:4,
        }}>
          {isLast?'Listo, todos compartieron ✨':'Terminé → Siguiente'}
        </button>
      )}

      {/* Botones del admin */}
      {isAdmin&&(
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {!isLast&&(
            <button onClick={onNext} style={{
              background:'rgba(245,158,11,.12)',border:'1px solid rgba(245,158,11,.35)',
              borderRadius:12,padding:'10px 20px',
              color:'#f59e0b',fontWeight:800,fontSize:12,
              fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',
            }}>⏭ Saltar</button>
          )}
          <button onClick={onEnd} style={{
            background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.3)',
            borderRadius:12,padding:'10px 20px',
            color:'#10b981',fontWeight:800,fontSize:12,
            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',
          }}>✓ Finalizar confra</button>
        </div>
      )}

      {/* Instrucción si no es speaker ni admin */}
      {!isMe&&!isAdmin&&(
        <div style={{
          background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',
          borderRadius:12,padding:'8px 16px',fontSize:11,color:'var(--muted)',
          textAlign:'center',maxWidth:280,lineHeight:1.5,
        }}>
          Cuando {speaker.name.split(' ')[0]} termine, tocará el botón para pasar al siguiente
        </div>
      )}
    </div>
  );
}

const TAG_TYPES=[

  {tag:'Oración',   label:'🙏 Oración',  color:'#8b5cf6', icon:'🙏', placeholder:'Escribe tu petición de oración...'},
];

function TagMessageModal({tagType,onSend,onClose}){
  const t=TAG_TYPES.find(x=>x.tag===tagType);
  const[text,setText]=useState('');

    setSending(true);
    await onSend(text.trim(),{tag:t.tag});
    onClose();
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:220,
      background:'rgba(0,0,0,.7)',backdropFilter:'blur(6px)',
      display:'flex',alignItems:'flex-end',justifyContent:'center'}}

        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:`1px solid ${t.color}44`,
        borderRadius:'20px 20px 0 0',padding:'20px 18px 32px',
        animation:'modalIn .25s ease'}}>
        {/* Handle */}
        <div style={{width:36,height:4,borderRadius:2,
          background:`${t.color}44`,margin:'0 auto 16px'}}/>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{width:40,height:40,borderRadius:12,
            background:`${t.color}18`,border:`1px solid ${t.color}44`,
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>
            {t.icon}
          </div>
          <div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:18,color:t.color,textTransform:'uppercase',letterSpacing:'.04em'}}>
              {t.tag}
            </div>
            <div style={{fontSize:11,color:'var(--muted)'}}>
              Visible para todos en el chat
            </div>
          </div>
        </div>
        {/* Textarea */}
        <textarea
          autoFocus
          value={text}
          onChange={e=>setText(e.target.value)}
          placeholder={t.placeholder}
          rows={4}
          style={{width:'100%',padding:'12px 14px',borderRadius:12,
            background:'rgba(255,255,255,.05)',
            border:`1px solid ${t.color}44`,
            color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif',
            resize:'none',lineHeight:1.5,outline:'none'}}/>
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button onClick={onClose} style={{
            flex:1,padding:'11px',borderRadius:12,border:'none',
            background:'rgba(255,255,255,.06)',color:'var(--muted)',
            fontSize:13,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
            letterSpacing:'.04em',textTransform:'uppercase'}}>
            Cancelar
          </button>
          <button onClick={handleSend}
            disabled={!text.trim()||sending} style={{
            flex:2,padding:'11px',borderRadius:12,border:'none',
            background:text.trim()&&!sending?`linear-gradient(135deg,${t.color},${t.color}bb)`:'var(--muted2)',
            color:text.trim()&&!sending?'#07091f':'var(--muted)',
            fontSize:14,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
            letterSpacing:'.05em',textTransform:'uppercase',
            boxShadow:text.trim()?`0 0 20px ${t.color}44`:undefined}}>
            {sending?'Enviando...':'Enviar →'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ REPASO: CHAT COMPLETO ════════════════════════ */
const QUICK_EMOJIS=['😊','🙏','❤️','👍','🔥','✨','😂','🤔','📖','🙌','💪','👏','🎉','✝️','🕊️','💡'];

function RepasoChat({msgs,session,myId,users,onSend,onClose,SID,chatReactions}){
  const repaso=session?.repaso;
  const{remaining}=useTimer(repaso?.startTime,PHASE_DURATIONS.repaso);
  const[text,setText]=useState('');
  const[showEmojis,setShowEmojis]=useState(false);
  const[imgLoading,setImgLoading]=useState(false);
  const[tagModal,setTagModal]=useState(null); // tag string or null
  const[zoomImg,setZoomImg]=useState(null);
  const endRef=useRef(null);
  const inputRef=useRef(null);
  const fileRef=useRef(null);

  const toggleChatReaction=async(msgId,reactionId)=>{
    if(!SID||!myId) return;
    const ref=db.ref(`sessions/${SID}/chatReactions/${msgId}/${myId}/${reactionId}`);
    const snap=await ref.get();
    if(snap.val()) ref.remove();
    else ref.set(true);
  };

  useEffect(()=>{
    setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),60);
  },[msgs.length]);

  const send=(t,extra={})=>{
    if(!t&&!extra.imageData) return;
    onSend(t,extra);
    setText('');
    setShowEmojis(false);
    inputRef.current?.focus();
  };

  const handleImg=async(e)=>{
    const f=e.target.files[0]; if(!f) return;
    setImgLoading(true);
    e.target.value='';
    const b64=await compressImage(f,480);
    send('',{type:'image',imageData:b64});
    setImgLoading(false);
  };

  const isOver=remaining<=0;

  return(
    <div style={{position:'fixed',inset:0,zIndex:155,display:'flex',flexDirection:'column',
      background:'var(--navy)'}}>

      {/* Header */}
      <div style={{
        background:'linear-gradient(135deg,#0d1035,#0a1950)',
        borderBottom:'1px solid rgba(59,130,246,.2)',
        padding:'10px 14px',flexShrink:0,
        display:'flex',alignItems:'center',gap:10,
      }}>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:17,color:'#3b82f6',textTransform:'uppercase',letterSpacing:'.05em',
            display:'flex',alignItems:'center',gap:7}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:'#3b82f6',
              display:'inline-block',animation:isOver?undefined:'pulse 1.5s infinite'}}/>
            📖 Repaso Bíblico
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>
            {Object.values(users).filter(u=>u.zone==='repaso').length} en sala ·{' '}
            <span style={{color:isOver?'#ef4444':'#3b82f6',fontWeight:600}}>
              {isOver?'Tiempo extra':'Tiempo: '+formatTime(remaining)}
            </span>
          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <div style={{display:'flex',gap:3}}>
            {Object.values(users).filter(u=>u.zone==='repaso').slice(0,5).map((u,i)=>(
              <div key={i} style={{width:24,height:24,borderRadius:'50%',
                background:`${u.color||'#3b82f6'}22`,border:`1.5px solid ${u.color||'#3b82f6'}`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,
                overflow:'hidden',marginLeft:i>0?-6:0}}>
                {u.photo?<img src={u.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  :<span>{u.avatar||'👤'}</span>}
              </div>
            ))}
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',
            border:'1px solid rgba(255,255,255,.1)',borderRadius:'50%',
            width:30,height:30,color:'var(--muted)',fontSize:14,
            display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
      </div>

      {/* Mensajes */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 14px',display:'flex',
        flexDirection:'column',gap:10}}>
        {msgs.length===0&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',
            justifyContent:'center',height:'100%',gap:10,opacity:.5}}>
            <div style={{fontSize:40}}>📖</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              fontSize:14,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',
              textAlign:'center'}}>
              Sé el primero en comentar
            </div>
          </div>
        )}
        {msgs.map(m=>{
          const isMe=m.uid===myId;
          const c=m.color||'#3b82f6';
          const tagInfo=m.tag?TAG_TYPES.find(t=>t.tag===m.tag):null;
          const tc=tagInfo?tagInfo.color:c;

          // Mensajes con tag: render especial tipo card
          if(tagInfo){
            const msgReactions=chatReactions?.[m.id]||{};
            const reactionTotals={};
            REACTIONS.forEach(r=>{reactionTotals[r.id]=0;});
            Object.values(msgReactions).forEach(userRxns=>{
              REACTIONS.forEach(r=>{ if(userRxns[r.id]) reactionTotals[r.id]++; });
            });
            const myMsgReactions=msgReactions[myId]||{};
            return(
              <div key={m.id} style={{animation:'slideIn .2s ease',
                background:`linear-gradient(135deg,${tc}14,${tc}06)`,
                border:`1.5px solid ${tc}44`,borderRadius:14,
                padding:'10px 12px',marginBottom:2}}>
                {/* Tag badge + name */}
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
                  <span style={{background:`${tc}28`,border:`1px solid ${tc}55`,
                    borderRadius:10,padding:'2px 8px',
                    fontSize:10,fontWeight:800,color:tc,
                    fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.06em',
                    textTransform:'uppercase'}}>
                    {tagInfo.icon} {tagInfo.tag}
                  </span>
                  <div style={{width:20,height:20,borderRadius:'50%',flexShrink:0,
                    background:`${c}22`,border:`1.5px solid ${c}`,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:10,overflow:'hidden'}}>
                    {m.photo?<img src={m.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                      :<span>{m.avatar||'👤'}</span>}
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:c,
                    fontFamily:'Barlow Condensed,sans-serif'}}>{isMe?'Tú':m.name}</span>
                  <span style={{fontSize:9,color:'var(--muted)',marginLeft:'auto'}}>{m.time}</span>
                </div>
                {/* Texto */}
                <div style={{fontSize:14,color:'var(--white)',lineHeight:1.55,
                  fontStyle:m.tag==='Reflexión'||m.tag==='Oración'?'italic':'normal',
                  paddingLeft:4}}>
                  {m.text}
                </div>
                {/* Reactions */}
                <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:8}}>
                  {REACTIONS.map(r=>{
                    const count=reactionTotals[r.id]||0;
                    const active=!!myMsgReactions[r.id];
                    return(
                      <button key={r.id} onClick={()=>toggleChatReaction(m.id,r.id)} style={{
                        display:'flex',alignItems:'center',gap:3,
                        padding:'3px 7px',borderRadius:20,border:'none',
                        background:active?`${tc}33`:'rgba(255,255,255,.06)',
                        outline:active?`1px solid ${tc}77`:'1px solid rgba(255,255,255,.1)',
                        cursor:'pointer',fontSize:13,transition:'all .15s',
                      }}>
                        <span>{r.e}</span>
                        {count>0&&<span style={{fontSize:10,color:active?tc:'var(--muted)',fontWeight:700}}>{count}</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          }

          // Mensajes normales
          return(
            <div key={m.id} style={{display:'flex',gap:8,
              flexDirection:isMe?'row-reverse':'row',animation:'slideIn .2s ease'}}>
              {/* Avatar */}
              <div style={{width:32,height:32,borderRadius:'50%',flexShrink:0,alignSelf:'flex-end',
                background:`${c}22`,border:`1.5px solid ${c}`,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:15,overflow:'hidden'}}>
                {m.photo?<img src={m.photo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  :<span>{m.avatar||'👤'}</span>}
              </div>
              <div style={{maxWidth:'72%'}}>
                <div style={{display:'flex',alignItems:'baseline',gap:5,marginBottom:3,
                  flexDirection:isMe?'row-reverse':'row'}}>
                  <span style={{fontSize:11,fontWeight:700,color:c,
                    fontFamily:'Barlow Condensed,sans-serif'}}>{isMe?'Tú':m.name}</span>
                  <span style={{fontSize:9,color:'var(--muted)'}}>{m.time}</span>
                </div>
                <div style={{
                  background:isMe?`${c}18`:'rgba(255,255,255,.05)',
                  border:`1px solid ${isMe?c+'44':'rgba(255,255,255,.08)'}`,
                  padding:m.type==='image'?6:'8px 12px',
                  borderRadius:isMe?'12px 4px 12px 12px':'4px 12px 12px 12px',
                  fontSize:13,color:'var(--white)',lineHeight:1.5,wordBreak:'break-word',
                }}>
                  {m.type==='image'&&m.imageData
                    ?<img src={m.imageData} alt="" onClick={()=>setZoomImg(m.imageData)} style={{
                        maxWidth:'100%',maxHeight:220,borderRadius:8,display:'block',cursor:'zoom-in'}}/>
                    :<span>{m.text}</span>
                  }
                </div>
              </div>
            </div>
          );
        })}
        <div ref={endRef}/>
      </div>

      {/* Lightbox */}
      {zoomImg&&(
        <div onClick={()=>setZoomImg(null)} style={{
          position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,.92)',
          display:'flex',alignItems:'center',justifyContent:'center',
          cursor:'zoom-out',backdropFilter:'blur(4px)'}}>
          <img src={zoomImg} alt="" style={{maxWidth:'95vw',maxHeight:'90vh',
            borderRadius:12,boxShadow:'0 0 40px rgba(0,0,0,.8)'}}/>
          <button onClick={()=>setZoomImg(null)} style={{
            position:'absolute',top:16,right:16,
            background:'rgba(255,255,255,.1)',border:'none',borderRadius:'50%',
            width:36,height:36,color:'white',fontSize:18,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
      )}

      {/* Emoji picker */}
      {showEmojis&&(
        <div style={{padding:'8px 14px',borderTop:'1px solid rgba(59,130,246,.1)',
          background:'rgba(7,9,31,.98)',flexShrink:0,
          display:'flex',flexWrap:'wrap',gap:6}}>
          {QUICK_EMOJIS.map(e=>(
            <button key={e} onClick={()=>send(text+e)}
              style={{background:'none',border:'none',fontSize:22,
                padding:'2px 3px',borderRadius:6,
                transition:'transform .1s'}}>
              {e}
            </button>
          ))}
        </div>
      )}

      {/* Input bar */}
      <div style={{padding:'10px 12px 14px',borderTop:'1px solid rgba(59,130,246,.12)',
        background:'rgba(7,9,31,.98)',flexShrink:0}}>

        {/* Tag buttons — abren modal de composición */}
        <div style={{display:'flex',gap:5,marginBottom:8,overflowX:'auto',paddingBottom:2}}>
          {TAG_TYPES.map(t=>(
            <button key={t.tag}
              onClick={()=>setTagModal(t.tag)}
              style={{
                background:`${t.color}14`,border:`1px solid ${t.color}44`,
                borderRadius:20,padding:'4px 10px',
                color:t.color,fontSize:10,fontWeight:700,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                whiteSpace:'nowrap',flexShrink:0,
              }}>{t.label}</button>
          ))}
        </div>

        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {/* Imagen */}
          <button onClick={()=>fileRef.current?.click()}
            disabled={imgLoading}
            style={{width:38,height:38,flexShrink:0,borderRadius:'50%',
              background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.25)',
              color:'#3b82f6',fontSize:17,
              display:'flex',alignItems:'center',justifyContent:'center'}}>
            {imgLoading?<Spinner size={16} color="#3b82f6"/>:'🖼️'}
          </button>
          <input ref={fileRef} type="file" accept="image/*"
            onChange={handleImg} style={{display:'none'}}/>

          {/* Emoji */}
          <button onClick={()=>setShowEmojis(s=>!s)} style={{
            width:38,height:38,flexShrink:0,borderRadius:'50%',
            background:showEmojis?'rgba(59,130,246,.2)':'rgba(59,130,246,.1)',
            border:`1px solid rgba(59,130,246,${showEmojis?.4:.25})`,
            color:'#3b82f6',fontSize:18,
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            😊
          </button>

          {/* Text input */}
          <input
            ref={inputRef}
            value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{
              if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(text);}
            }}
            placeholder="Escribe tu pregunta o comentario..."
            style={{flex:1,padding:'10px 14px',borderRadius:22,
              background:'rgba(255,255,255,.05)',border:'1px solid rgba(59,130,246,.2)',
              color:'var(--white)',fontSize:13,outline:'none',
              fontFamily:'Barlow,sans-serif'}}/>

          {/* Send */}
          <button onClick={()=>send(text)}
            disabled={!text.trim()}
            style={{width:38,height:38,flexShrink:0,borderRadius:'50%',
              background:text.trim()?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'rgba(255,255,255,.05)',
              border:'none',color:'white',fontSize:17,fontWeight:900,
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:text.trim()?'0 0 14px rgba(59,130,246,.4)':undefined}}>
            ↑
          </button>
        </div>
      </div>

      {/* Modal de tag */}
      {tagModal&&(
        <TagMessageModal
          tagType={tagModal}
          onSend={async(txt,extra)=>{ await onSend(txt,extra); }}
          onClose={()=>setTagModal(null)}
        />
      )}
    </div>
  );
}

}

/* ════════════════════════ NUBE DE PALABRAS ════════════════════════ */
const wordHash=w=>{let h=0;for(const c of w)h=(h*31+c.charCodeAt(0))|0;return Math.abs(h);};

function WordCloudActivity({wordcloud,myId,users,isAdmin,SID,onClose,question}){
  const[tab,setTab]=useState('escribir'); // 'escribir' | 'nube'
  const[input,setInput]=useState('');
  const[sending,setSending]=useState(false);
  const[justSent,setJustSent]=useState(false);
  const inputRef=useRef(null);

  if(!wordcloud?.active) return null;

  const rawWords=wordcloud.words?Object.values(wordcloud.words):[];
  const myWords=rawWords.filter(w=>w.uid===myId);
  const myCount=myWords.length;
  const MAX=5;
  const canSend=myCount<MAX&&!sending;

  // Frecuencias
  const freq={};
  rawWords.forEach(w=>{
    const key=w.word.toLowerCase().trim();
    if(!freq[key]) freq[key]={display:w.word,count:0,color:w.color||'#3b82f6'};
    freq[key].count++;
    freq[key].color=w.color||'#3b82f6';
  });
  const sorted=Object.entries(freq).sort((a,b)=>b[1].count-a[1].count);
  const maxCount=sorted[0]?.[1].count||1;
  const getFontSize=count=>Math.round(16+(maxCount===1?10:(count-1)/(maxCount-1))*52);
  const getRotation=key=>{const h=wordHash(key);return[0,0,0,-15,15,-8,8][h%7];};

  const handleSend=async()=>{
    const w=input.trim();
    if(!w||!canSend) return;
    setSending(true);
    const clean=w.replace(/\s+/g,' ').split(' ').slice(0,3).join(' ');
    await db.ref(`sessions/${SID}/wordcloud/words`).push({
      word:clean,uid:myId,color:users[myId]?.color||'#3b82f6',ts:Date.now(),
    });
    setInput('');setSending(false);setJustSent(true);
    setTimeout(()=>setJustSent(false),1500);
    setTimeout(()=>inputRef.current?.focus(),60);
  };

  const handleClear=()=>db.ref(`sessions/${SID}/wordcloud/words`).remove();
  const handleStop=async()=>{
    await db.ref(`sessions/${SID}/wordcloud`).update({active:false});
    onClose&&onClose();
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:180,display:'flex',flexDirection:'column',
      background:'var(--navy)'}}>

      {/* Header */}
      <div style={{background:'rgba(7,9,31,.98)',borderBottom:'1px solid rgba(59,130,246,.2)',
        padding:'10px 14px',flexShrink:0,display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:16,color:'#3b82f6',textTransform:'uppercase',letterSpacing:'.06em',
            display:'flex',alignItems:'center',gap:7}}>
            <span>☁️</span> Nube de Palabras
            {rawWords.length>0&&(
              <span style={{background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.3)',
                borderRadius:20,padding:'2px 8px',fontSize:11,color:'#3b82f6',fontWeight:700}}>
                {rawWords.length}
              </span>
            )}
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {isAdmin&&rawWords.length>0&&(
            <button onClick={handleClear} style={{background:'rgba(255,255,255,.06)',
              border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'5px 9px',
              color:'var(--muted)',fontSize:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              textTransform:'uppercase'}}>🗑</button>
          )}
          {isAdmin&&(
            <button onClick={handleStop} style={{background:'rgba(239,68,68,.1)',
              border:'1px solid rgba(239,68,68,.25)',borderRadius:8,padding:'5px 9px',
              color:'#f87171',fontSize:10,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              textTransform:'uppercase'}}>⏹ Terminar</button>
          )}
          {!isAdmin&&(
            <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',
              border:'1px solid rgba(255,255,255,.1)',borderRadius:'50%',
              width:30,height:30,color:'var(--muted)',fontSize:14,
              display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:0,
        borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        {[{id:'escribir',l:'✏️ Escribir'},{id:'nube',l:'☁️ Ver Nube'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:'11px 4px',border:'none',background:'none',
            color:tab===t.id?'#3b82f6':'var(--muted)',
            fontWeight:700,fontSize:12,fontFamily:'Barlow Condensed,sans-serif',
            letterSpacing:'.04em',textTransform:'uppercase',
            borderBottom:tab===t.id?'2px solid #3b82f6':'2px solid transparent',
            transition:'all .15s'}}>
            {t.l}
            {t.id==='nube'&&sorted.length>0&&tab!=='nube'&&(
              <span style={{marginLeft:6,background:'rgba(59,130,246,.2)',
                borderRadius:20,padding:'1px 6px',fontSize:10,color:'#3b82f6'}}>{sorted.length}</span>
            )}
          </button>
        ))}
      </div>

      {/* TAB: ESCRIBIR */}
      {tab==='escribir'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:'20px 16px',gap:16,overflowY:'auto'}}>
          {/* Pregunta */}
          {question&&(
            <div style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',
              borderRadius:14,padding:'14px 16px',textAlign:'center'}}>
              <div style={{fontSize:11,color:'rgba(59,130,246,.7)',fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>
                📖 Pregunta del repaso
              </div>
              <div style={{fontSize:15,color:'var(--white)',lineHeight:1.6,fontWeight:500}}>
                {question}
              </div>
            </div>
          )}

          {/* Estado del usuario */}
          <div style={{textAlign:'center'}}>
            {myCount===0?(
              <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.6}}>
                Escribe hasta <strong style={{color:'#3b82f6'}}>{MAX} palabras</strong> relacionadas con la pregunta
              </div>
            ):(
              <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center'}}>
                {myWords.map((w,i)=>(
                  <span key={i} style={{background:`${w.color||'#3b82f6'}18`,
                    border:`1px solid ${w.color||'#3b82f6'}44`,
                    borderRadius:20,padding:'4px 12px',
                    fontSize:13,color:w.color||'#3b82f6',fontWeight:600}}>
                    ✓ {w.word}
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* Input */}
          {canSend?(
            <>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <input ref={inputRef} value={input}
                  onChange={e=>setInput(e.target.value.slice(0,30))}
                  onKeyDown={e=>e.key==='Enter'&&handleSend()}
                  placeholder="Escribe una palabra o frase corta..."
                  autoFocus
                  style={{flex:1,padding:'12px 16px',borderRadius:24,
                    background:'rgba(255,255,255,.06)',border:'1px solid rgba(59,130,246,.25)',
                    color:'var(--white)',fontSize:14,outline:'none',fontFamily:'Barlow,sans-serif'}}/>
                <button onClick={handleSend} disabled={!input.trim()||sending} style={{
                  width:46,height:46,flexShrink:0,borderRadius:'50%',border:'none',
                  background:input.trim()&&!sending
                    ?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'rgba(255,255,255,.06)',
                  color:input.trim()&&!sending?'white':'var(--muted)',
                  fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',
                  boxShadow:input.trim()&&!sending?'0 0 16px rgba(59,130,246,.4)':undefined}}>
                  {sending?<Spinner size={18} color="white"/>:'↑'}
                </button>
              </div>
              <div style={{textAlign:'right',fontSize:10,color:'var(--muted)'}}>
                {MAX-myCount} envío{MAX-myCount!==1?'s':''} restante{MAX-myCount!==1?'s':''}
              </div>
            </>
          ):(
            <div style={{textAlign:'center',padding:'16px 0'}}>
              <div style={{fontSize:22,marginBottom:8}}>✅</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:16,color:'#10b981',textTransform:'uppercase',letterSpacing:'.05em'}}>
                ¡Gracias por participar!
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>
                Toca "Ver Nube" para ver el resultado en tiempo real
              </div>
              <button onClick={()=>setTab('nube')} style={{marginTop:12,
                background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',
                border:'none',borderRadius:20,padding:'10px 24px',
                color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.05em',textTransform:'uppercase',
                boxShadow:'0 4px 16px rgba(59,130,246,.4)'}}>
                ☁️ Ver Nube →
              </button>
            </div>
          )}

          {justSent&&(
            <div style={{textAlign:'center',animation:'scoreUp .4s ease'}}>
              <span style={{fontSize:13,color:'#10b981',fontWeight:700}}>
                ✓ Palabra enviada
              </span>
            </div>
          )}
        </div>
      )}

      {/* TAB: NUBE */}
      {tab==='nube'&&(
        <div style={{flex:1,display:'flex',flexWrap:'wrap',alignItems:'center',
          justifyContent:'center',alignContent:'center',
          padding:'16px 20px',gap:'6px 10px',overflowY:'auto',
          background:'radial-gradient(ellipse at 50% 40%,#0a0e2a,#07091f)'}}>
          {/* Stars bg */}
          <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
            {[...Array(14)].map((_,i)=>(
              <div key={i} style={{position:'absolute',
                left:`${(wordHash('s'+i)%92)+3}%`,top:`${(wordHash('d'+i)%85)+5}%`,
                width:wordHash('w'+i)%2+1,height:wordHash('w'+i)%2+1,
                borderRadius:'50%',background:'rgba(255,255,255,.12)'}}/>
            ))}
          </div>

          {sorted.length===0?(
            <div style={{textAlign:'center',opacity:.4,position:'relative',zIndex:1}}>
              <div style={{fontSize:64}}>☁️</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:15,color:'white',textTransform:'uppercase',letterSpacing:'.1em',marginTop:8}}>
                Esperando palabras...
              </div>
            </div>
          ):sorted.map(([key,data],i)=>{
            const sz=getFontSize(data.count);
            return(
              <span key={key} style={{
                display:'inline-block',position:'relative',zIndex:1,
                fontSize:sz,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:data.count>=3?900:data.count>=2?800:600,
                color:data.color,
                transform:`rotate(${getRotation(key)}deg)`,
                textShadow:sz>36?`0 0 ${sz*.55}px ${data.color}55`:undefined,
                letterSpacing:'-.01em',lineHeight:1.1,padding:'2px 4px',
                animation:`fadeUp ${.15+i*.04}s ease both`,
                transition:'font-size .5s cubic-bezier(0.23,1,0.32,1)',
                userSelect:'none',cursor:'default',
              }}>
                {data.display}
                {data.count>1&&sz>=30&&(
                  <span style={{fontSize:sz*.32,verticalAlign:'super',
                    opacity:.6,fontWeight:700,marginLeft:2}}>
                    {data.count}×
                  </span>
                )}
              </span>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════ ENCUESTA SEMANAL (USUARIO) ════════════════════════ */
function SurveyModal({myId,myName,SID,onSent}){
  const[days,setDays]=useState(0);
  const[bible,setBible]=useState(null);
  const[mission,setMission]=useState(null);
  const[sent,setSent]=useState(false);

  const handleSubmit=async()=>{
    if(bible===null||mission===null) return;
    await db.ref(`sessions/${SID}/survey/responses/${myId}`).set({
      name:myName,daysStudied:days,hasBibleStudents:bible,
      missionaryAction:mission,ts:Date.now()
    });
    setSent(true);
    setTimeout(onSent,2000);

    <div style={{position:'fixed',inset:0,zIndex:220,background:'rgba(0,0,0,.85)',

      backdropFilter:'blur(6px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:480,

        padding:'20px 18px 36px',overflowY:'auto',maxHeight:'88vh',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.25)',margin:'0 auto 16px'}}/>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em',

          <div style={{fontSize:13,color:'var(--white)',fontFamily:'Barlow,sans-serif',fontWeight:600,marginBottom:10}}>
            ¿Cuántos días estudiaste la lección esta semana?
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[0,1,2,3,4,5,6,7].map(d=>(
              <button key={d} onClick={()=>setDays(d)} style={{
                width:40,height:40,borderRadius:10,border:'none',
                background:days===d?'linear-gradient(135deg,#ffd000,#e6a800)':'rgba(255,255,255,.08)',

                {d}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,color:'var(--white)',fontFamily:'Barlow,sans-serif',fontWeight:600,marginBottom:10}}>
            ¿Tienes estudiantes de la Biblia?
          </div>
          <div style={{display:'flex',gap:8}}>
            {[{v:true,l:'✅ Sí'},{v:false,l:'❌ No'}].map(opt=>(
              <button key={String(opt.v)} onClick={()=>setBible(opt.v)} style={{
                flex:1,padding:'10px',borderRadius:12,border:'none',
                background:bible===opt.v?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'rgba(255,255,255,.06)',
                color:bible===opt.v?'white':'var(--muted)',
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13,
                letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>

          </div>
          <div style={{display:'flex',gap:8}}>
            {[{v:true,l:'✅ Sí'},{v:false,l:'❌ No'}].map(opt=>(
              <button key={String(opt.v)} onClick={()=>setMission(opt.v)} style={{
                flex:1,padding:'10px',borderRadius:12,border:'none',
                background:mission===opt.v?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'rgba(255,255,255,.06)',
                color:mission===opt.v?'white':'var(--muted)',

/* ════════════════════════ ADMIN ENCUESTA MODAL ════════════════════════ */
function AdminSurveyModal({responses,SID,onClose,onToggle,surveyActive}){
  const list=Object.values(responses||{});

  const downloadResults=()=>{
    const rows=[
      `Encuesta — Maranata Class (${new Date().toLocaleDateString('es-CL')})`,
      'Nombre\tDías estudiados\tEst. Biblia\tAcc. Misionera',
      ...list.map(r=>`${r.name}\t${r.daysStudied}\t${r.hasBibleStudents?'Sí':'No'}\t${r.missionaryAction?'Sí':'No'}`)
    ];
    const blob=new Blob([rows.join('\n')],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`encuesta_${SID}.txt`; a.click();
    URL.revokeObjectURL(url);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:220,background:'rgba(0,0,0,.8)',
      backdropFilter:'blur(4px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',borderRadius:'20px 20px 0 0',
        padding:'20px 18px 32px',maxHeight:'85vh',overflowY:'auto',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:18,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📋 Encuesta — {list.length} resp.
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button onClick={onToggle} style={{
            flex:1,padding:'9px',borderRadius:10,
            background:surveyActive?'rgba(239,68,68,.15)':'linear-gradient(135deg,#10b981,#059669)',
            border:surveyActive?'1px solid rgba(239,68,68,.4)':'none',
            color:surveyActive?'#f87171':'white',
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:12,
            letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>
            {surveyActive?'⏹ Cerrar encuesta':'▶ Abrir encuesta'}
          </button>
          {list.length>0&&(
            <button onClick={downloadResults} style={{
              flex:1,padding:'9px',borderRadius:10,
              background:'rgba(255,208,0,.1)',border:'1px solid rgba(255,208,0,.3)',
              color:'#ffd000',fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
              fontSize:12,letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}}>
              📥 Exportar .txt
            </button>
          )}
        </div>
        {list.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[
              {label:'Prom. días',value:(list.reduce((s,r)=>s+r.daysStudied,0)/list.length).toFixed(1),color:'#ffd000'},
              {label:'Est. Biblia',value:list.filter(r=>r.hasBibleStudents).length,color:'#3b82f6'},
              {label:'Misión',value:list.filter(r=>r.missionaryAction).length,color:'#10b981'},
            ].map(st=>(
              <div key={st.label} style={{background:'rgba(255,255,255,.04)',borderRadius:10,
                padding:'10px 6px',textAlign:'center',borderLeft:`3px solid ${st.color}`}}>
                <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,color:st.color}}>{st.value}</div>
                <div style={{fontSize:9,color:'var(--muted)',marginTop:3,textTransform:'uppercase',letterSpacing:'.04em'}}>{st.label}</div>
              </div>
            ))}
          </div>
        )}
        {list.length===0?(
          <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Aún no hay respuestas</div>

          <div key={i} style={{background:'rgba(255,255,255,.03)',borderRadius:10,
            padding:'10px 12px',marginBottom:8,border:'1px solid rgba(255,255,255,.06)'}}>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
              fontSize:13,color:'var(--white)',marginBottom:5}}>{r.name}</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',fontSize:11,color:'var(--muted)'}}>
              <span>📅 {r.daysStudied} días</span>
              <span>{r.hasBibleStudents?'✅':'❌'} Est. Biblia</span>
              <span>{r.missionaryAction?'✅':'❌'} Misión</span>
            </div>
          </div>
        ))}
        {list.length>0&&(
          <button onClick={()=>db.ref(`sessions/${SID}/survey/responses`).remove()} style={{
            width:'100%',marginTop:8,padding:'9px',borderRadius:10,
            background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',

            )}

            {phase==='juegos'&&(
              <button onClick={()=>{onEndJuegos();setOpen(false);}} style={{
                background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
                borderRadius:10,padding:'10px',color:'#ef4444',fontWeight:800,fontSize:12,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',
              }}>⏹ Finalizar Juegos</button>
            )}

            {phase==='mision'&&(
              <button onClick={()=>{onEndMision&&onEndMision();setOpen(false);}} style={{
                background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',
                borderRadius:10,padding:'10px',color:'#ef4444',fontWeight:800,fontSize:12,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',textTransform:'uppercase',
              }}>⏹ Finalizar Misión</button>
            )}
          </div>
        </div>
      )}
    </>
  );
}


/* ════════════════════════ MODAL EDITAR PERFIL ════════════════════════ */
function EditProfileModal({profile,onSave,onClose}){
  const[name,  setName]  =useState(profile.name  ||'');
  const[avatar,setAvatar]=useState(profile.avatar||null);
  const[color, setColor] =useState(profile.color ||'#ffd000');
  const[photo, setPhoto] =useState(profile.photo ||null);
  const[saving,setSaving]=useState(false);
  const[err,   setErr]   =useState('');
  const fileRef=useRef();

  const handlePhoto=async(e)=>{
    const f=e.target.files[0];
    if(!f) return;
    setSaving(true);
    const base64=await compressImage(f,200);
    setPhoto(base64);
    setSaving(false);
  };

  const handleSave=async()=>{
    if(!name.trim()||saving) return;
    setSaving(true);
    try{ await onSave({name:name.trim(),avatar,color,photo}); }
    catch(e){ setErr('Error al guardar. Intenta de nuevo.'); setSaving(false); }
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,overflowY:'auto',maxHeight:'90vh',
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'20px 20px 0 0',padding:'20px 20px 32px',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,
          background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            Editar perfil
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Foto de perfil */}
        <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:14}}>
          <div style={{position:'relative',cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
            <AvatarBubble profile={{...profile,photo,avatar,color}} size={72}/>
            <div style={{
              position:'absolute',bottom:-2,right:-2,
              width:22,height:22,borderRadius:'50%',
              background:'#ffd000',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:12,color:'#07091f',fontWeight:800,
            }}>📷</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--white)',marginBottom:6}}>Foto de perfil</div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>fileRef.current?.click()} style={{
                background:'rgba(255,208,0,.08)',border:'1px solid rgba(255,208,0,.2)',
                borderRadius:8,padding:'6px 10px',color:'#ffd000',fontSize:11,
                fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
              }}>📁 Subir foto</button>
              {photo&&(
                <button onClick={()=>setPhoto(null)} style={{
                  background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
                  borderRadius:8,padding:'6px 10px',color:'#f87171',fontSize:11,
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                }}>Quitar</button>
              )}
            </div>
            <input ref={fileRef} type="file" accept="image/*"
              onChange={handlePhoto} style={{display:'none'}}/>
            <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>
              También puedes usar un avatar de abajo
            </div>
          </div>
        </div>

        {/* Nombre */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif'}}>Nombre en la sala</label>
          <input value={name} onChange={e=>setName(e.target.value)}

            style={{width:'100%',padding:'11px 14px',borderRadius:10,
              background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,208,0,.15)',
              color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif'}}/>
        </div>

        {/* Avatar */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:'var(--muted)',
            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif'}}>Avatar (si no usas foto)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setAvatar(a)} style={{
                background:avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                border:avatar===a?`2px solid ${color}`:'2px solid rgba(255,255,255,.06)',

                display:'flex',alignItems:'center',justifyContent:'center',

        <div style={{marginBottom:20}}>

            textTransform:'uppercase',letterSpacing:'.08em',display:'block',marginBottom:8,
            fontFamily:'Barlow Condensed,sans-serif'}}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setColor(c)} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:color===c?'3px solid white':'3px solid transparent',
                boxShadow:color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
              }}/>
            ))}

        {err&&<div style={{marginBottom:10,color:'#fca5a5',fontSize:12,
          background:'rgba(239,68,68,.08)',borderRadius:8,padding:'8px 12px'}}>⚠️ {err}</div>}

        <button onClick={handleSave} disabled={!name.trim()||saving} style={{
          width:'100%',padding:13,borderRadius:12,border:'none',
          background:!name.trim()||saving?'var(--muted2)':'linear-gradient(135deg,#ffd000,#e6a800)',
          color:!name.trim()||saving?'var(--muted)':'#07091f',
          fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
          letterSpacing:'.06em',textTransform:'uppercase',
          display:'flex',alignItems:'center',justifyContent:'center',gap:8,
        }}>
          {saving?<><Spinner size={18} color="#07091f"/>Guardando...</>:'Guardar cambios ✓'}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════ MODAL ASISTENCIA ════════════════════════ */
function AttendanceModal({myAtt,gameHistory,onClose}){
  const[activeTab,setActiveTab]=useState('asistencia');
  const sessions=Object.entries(myAtt||{}).sort((a,b)=>b[0].localeCompare(a[0]));
  // Agrupar por mes
  const byMonth={};
  sessions.forEach(([sid])=>{
    const d=new Date(sid+'T12:00:00');
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!byMonth[key]) byMonth[key]=[];
    byMonth[key].push(sid);
  });

  const monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio',
    'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:480,maxHeight:'85vh',overflowY:'auto',
        background:'linear-gradient(160deg,#0d1035,#0a0c28)',
        border:'1px solid rgba(255,208,0,.2)',
        borderRadius:'20px 20px 0 0',padding:'20px 18px 32px',
        animation:'modalIn .3s ease'}}>
        <div style={{width:40,height:4,borderRadius:2,
          background:'rgba(255,208,0,.2)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <h3 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
            fontSize:20,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.05em'}}>
            📊 Mi asistencia
          </h3>
          <button onClick={onClose} style={{background:'none',border:'none',
            color:'var(--muted)',fontSize:20,padding:4}}>✕</button>
        </div>

        {/* Resumen */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
          {[
            {label:'Total clases',  value:sessions.length,    color:'#ffd000'},
            {label:'Este año',      value:sessions.filter(([s])=>s.startsWith(new Date().getFullYear().toString())).length, color:'#10b981'},
            {label:'Último mes',    value:Object.values(byMonth)[0]?.length||0, color:'#22d3ee'},
          ].map(st=>(
            <div key={st.label} style={{
              background:'rgba(255,255,255,.03)',borderRadius:10,padding:'10px 8px',
              borderLeft:`3px solid ${st.color}`,textAlign:'center',
            }}>
              <div style={{fontSize:24,fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
              <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',background:'rgba(255,255,255,.04)',borderRadius:10,
          padding:3,marginBottom:16,border:'1px solid rgba(255,208,0,.08)'}}>
          {[{id:'asistencia',l:'📅 Asistencia'},{id:'juegos',l:'🏆 Juegos'}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{
              flex:1,padding:'7px 4px',borderRadius:8,border:'none',
              background:activeTab===t.id?'linear-gradient(135deg,#ffd000,#e6a800)':'transparent',
              color:activeTab===t.id?'#07091f':'var(--muted)',
              fontSize:12,fontWeight:700,fontFamily:'Barlow Condensed,sans-serif',
              letterSpacing:'.03em',textTransform:'uppercase',transition:'all .2s',
            }}>{t.l}</button>
          ))}
        </div>

        {activeTab==='asistencia'&&(<>
          {sessions.length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
              Aún no tienes asistencias registradas
            </div>
          )}
          {Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).map(([key,days])=>{
            const[year,month]=key.split('-');
            return(
              <div key={key} style={{marginBottom:14}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                  fontSize:13,color:'var(--muted)',textTransform:'uppercase',
                  letterSpacing:'.07em',marginBottom:8}}>
                  {monthNames[parseInt(month)-1]} {year}
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {days.map(sid=>(
                    <div key={sid} style={{background:'rgba(16,185,129,.08)',padding:'7px 10px',
                      borderRadius:10,textAlign:'center',border:'1px solid rgba(16,185,129,.2)'}}>
                      <div style={{fontSize:16,marginBottom:2}}>✅</div>
                      <div style={{fontSize:9,color:'#10b981',fontFamily:'Barlow Condensed,sans-serif'}}>
                        {new Date(sid+'T12:00:00').toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </>)}

        {activeTab==='juegos'&&(()=>{
          const games=Object.entries(gameHistory||{})
            .map(([id,g])=>({id,...g}))
            .sort((a,b)=>b.date?.localeCompare(a.date||'')||0);
          const wins=games.filter(g=>g.rank===1).length;
          const top3=games.filter(g=>g.rank<=3).length;
          return(<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
              {[
                {label:'Partidas',value:games.length,color:'#8b5cf6'},
                {label:'🥇 Ganadas',value:wins,color:'#ffd000'},
                {label:'🏅 Top 3',value:top3,color:'#f59e0b'},
              ].map(st=>(
                <div key={st.label} style={{background:'rgba(255,255,255,.03)',borderRadius:10,
                  padding:'10px 8px',borderLeft:`3px solid ${st.color}`,textAlign:'center'}}>
                  <div style={{fontSize:22,fontFamily:'Barlow Condensed,sans-serif',
                    fontWeight:900,color:st.color,lineHeight:1}}>{st.value}</div>
                  <div style={{fontSize:9,color:'var(--muted)',marginTop:3,
                    textTransform:'uppercase',letterSpacing:'.05em'}}>{st.label}</div>
                </div>
              ))}
            </div>
            {games.length===0&&(
              <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>
                Aún no has jugado ningún juego
              </div>
            )}
            {games.map(g=>(
              <div key={g.id} style={{display:'flex',alignItems:'center',gap:12,
                background:g.rank===1?'rgba(255,208,0,.07)':'rgba(255,255,255,.03)',
                border:g.rank===1?'1px solid rgba(255,208,0,.2)':'1px solid rgba(255,255,255,.05)',
                borderRadius:12,padding:'10px 14px',marginBottom:7}}>
                <div style={{fontSize:22,width:28,textAlign:'center'}}>
                  {g.rank===1?'🥇':g.rank===2?'🥈':g.rank===3?'🥉':`#${g.rank}`}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:'var(--muted)',
                    fontFamily:'Barlow Condensed,sans-serif',textTransform:'uppercase',
                    letterSpacing:'.05em'}}>
                    {g.date?new Date(g.date+'T12:00:00').toLocaleDateString('es-CL',
                      {day:'numeric',month:'short',year:'numeric'}):''}
                  </div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>
                    {g.rank}° de {g.totalPlayers} jugadores
                  </div>
                </div>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
                  fontSize:20,color:'#ffd000'}}>{g.score} pts</div>
              </div>
            ))}
          </>);
        })()}
      </div>
    </div>
  );
}

      const profiles=pSnap.val()||{};
