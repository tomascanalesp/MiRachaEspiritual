        }))
        .sort((a,b)=>b.attCount-a.attCount);
      setData(list);
      setLoading(false);

            </div>
          ))}
          {filtered.length===0&&<div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Sin resultados</div>}
        </>)}

        {!loading&&tab==='rankings'&&(<>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
            fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:10}}>

              borderRadius:12,padding:'10px 12px',marginBottom:6}}>
              <div style={{fontSize:i<3?20:14,width:28,textAlign:'center'}}>
                {i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}

              <div style={{flex:1}}>

          {gameRankings.filter(u=>u.gameCount>0).length===0&&(
            <div style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'20px 0'}}>Nadie ha jugado aún</div>
          )}
        </>)}
      </div>
    </div>
  );
}

/* ════════════════════════ SCREEN VIEW (PROYECCIÓN) ════════════════════════ */
function ScreenView({users,session,msgs,reactions,onExit}){
  const phase=session?.phase||'waiting';
  const confra=session?.confra;
  const repaso=session?.repaso;
  const roomRef=useRef();
  const{remaining:confraRemaining}=useTimer(confra?.startTime,PHASE_DURATIONS.confra);
  const{remaining:repasoRemaining}=useTimer(repaso?.startTime,PHASE_DURATIONS.repaso);

  const speakerUid=confra?.active?confra?.queue?.[confra?.currentIdx||0]:null;
  const speaker=speakerUid?users[speakerUid]:null;

  return(
    <div style={{position:'fixed',inset:0,background:'var(--navy)',overflow:'hidden'}}>
      {/* Canvas con zonas */}
      <div ref={roomRef} style={{width:'100%',height:'100%'}}>
        <RoomCanvas users={users} myId={null} session={session}
          selectedChar={false} onSelectChar={()=>{}} onMoveTo={()=>{}}
          roomRef={roomRef} full={true} reactions={reactions} moveTarget={null}/>
      </div>

      {/* Panel fase activa - lado derecho */}
      {phase!=='waiting'&&(
        <div style={{
          position:'absolute',top:80,right:16,
          width:160,
          background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.2)',
          borderRadius:14,padding:14,zIndex:40,
        }}>
          {phase==='confra'&&(
            <>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:11,color:'#f59e0b',textTransform:'uppercase',
                letterSpacing:'.07em',marginBottom:10}}>🤝 Confraternización</div>
              <TimerDisplay remaining={confraRemaining} color="#f59e0b"/>
              {speaker&&(
                <div style={{marginTop:10,textAlign:'center'}}>
                  <AvatarBubble profile={speaker} size={40}/>
                  <div style={{fontSize:11,color:'white',marginTop:4,
                    fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>
                    {speaker.name}
                  </div>
                  <div style={{fontSize:9,color:'#f59e0b80'}}>compartiendo</div>
                </div>
              )}
            </>
          )}
          {phase==='repaso'&&(
            <>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:11,color:'#3b82f6',textTransform:'uppercase',
                letterSpacing:'.07em',marginBottom:10}}>📖 Repaso Bíblico</div>
              <TimerDisplay remaining={repasoRemaining} color="#3b82f6"/>
              {repasoRemaining<=0&&(
                <div style={{marginTop:8,fontSize:10,color:'#ef4444',
                  fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
                  textAlign:'center',animation:'pulse 1s infinite'}}>
                  TIEMPO EXTRA
                </div>
              )}
            </>
          )}
          {phase==='juegos'&&(
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:4}}>🎮</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,
                fontSize:13,color:'#8b5cf6',textTransform:'uppercase'}}>¡JUEGOS!</div>
            </div>
          )}
        </div>
      )}

      {/* Chat del repaso en pantalla */}
      {phase==='repaso'&&<RepasoChatScreen msgs={msgs} session={session} users={users}/>}

      <button onClick={onExit} style={{
        position:'fixed',bottom:20,right:20,zIndex:100,
        background:'rgba(7,9,31,.95)',border:'1px solid rgba(255,208,0,.3)',
        color:'#ffd000',padding:'8px 16px',borderRadius:20,fontSize:12,
        fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.04em',
      }}>✕ SALIR</button>
    </div>
  );
}

/* ════════════════════════ APP PRINCIPAL ════════════════════════ */
function App(){
  /* ── Vista y auth ── */
  const[view,        setView]        =useState('loading');
  const[authMode,    setAuthMode]    =useState('login');
  const[landingTheme,setLandingTheme]=useState('light'); // 'light' | 'dark'
  const[authOpen,    setAuthOpen]    =useState(false);
  const[email,       setEmail]       =useState('');
  const[password,    setPassword]    =useState('');
  const[authError,   setAuthError]   =useState('');
  const[authLoad,    setAuthLoad]    =useState(false);
  const[resetMode,   setResetMode]   =useState(false);
  const[resetSent,   setResetSent]   =useState(false);

  /* ── Perfil ── */
  const[profile,     setProfile]     =useState({name:'',avatar:null,color:'#ffd000',photo:null});
  const[isAdmin,     setIsAdmin]     =useState(false);
  const[setupSaving, setSetupSaving] =useState(false);
  const[setupError,  setSetupError]  =useState('');

  /* ── Modales ── */
  const[editOpen,    setEditOpen]    =useState(false);
  const[attOpen,     setAttOpen]     =useState(false);
  const[adminStats,  setAdminStats]  =useState(false);
  const[endBanner,   setEndBanner]   =useState(null);
  const[kahootOpen,  setKahootOpen]  =useState(false);

  /* ── Sala ── */
  const[users,       setUsers]       =useState({});
  const[msgs,        setMsgs]        =useState([]);
  const[myAtt,       setMyAtt]       =useState({});
  const[session,     setSession]     =useState(null);
  const[reactions,   setReactions]   =useState({});
  const[gameHistory, setGameHistory] =useState({});

  const[repasoChatOpen,setRepasoChatOpen]=useState(false);
  const[wordCloudOpen, setWordCloudOpen] =useState(false);
  // confraOpen: bandera local solo para admin — nunca sobreescrita por el echo de Firebase
  const[confraOpen,    setConfraOpen]    =useState(false);

  const[chatReactions,  setChatReactions]  =useState({});
  const[attNotify,      setAttNotify]      =useState(false);
  const[surveyOpen,     setSurveyOpen]     =useState(false);
  const[adminSurvey,    setAdminSurvey]    =useState(false);
  const[surveyResponses,setSurveyResponses]=useState({});

  const UID      =useRef(null);
  const SID      =useRef(getSID());
  const roomRef  =useRef(null);
  const sessionRef=useRef(null);
  const lastPosRef=useRef({zone:'entrada',x:49,y:9});
  const profileRef=useRef({name:'',avatar:null,color:'#ffd000',photo:null});

  // Mantener profileRef siempre actualizado para usarlo en reconexión
  useEffect(()=>{ profileRef.current=profile; },[profile]);

  /* ── body class ── */
  useEffect(()=>{
    document.body.classList.remove('in-room','landing','landing-dark');
    if(view==='room'||view==='screen') document.body.classList.add('in-room');
    else if(view==='auth') document.body.classList.add(landingTheme==='dark'?'landing-dark':'landing');
  },[view,landingTheme]);

  /* ── Auth listener ── */
  useEffect(()=>{
    const t=setTimeout(()=>{ if(view==='loading') setView('auth'); },8000);
    const unsub=auth.onAuthStateChanged(async user=>{
      clearTimeout(t);
      if(user){
        UID.current=user.uid;
        try{
          const snap=await db.ref(`profiles/${user.uid}`).get();
          const p=snap.val();
          if(p&&p.name){
            setProfile(p);
            setIsAdmin(!!p.isAdmin);
            await joinRoom(user.uid,p);
            setView('room');
          } else setView('setup');
        } catch(e){ console.error(e); setView('setup'); }
      } else { UID.current=null; setView('auth'); }
    });
    return()=>{ clearTimeout(t); unsub(); };
  },[]);

  /* ── Firebase listeners sala ── */
  useEffect(()=>{
    if(view!=='room'&&view!=='screen') return;
    const sid=SID.current, uid=UID.current;
    if(!uid) return;
    // Si el juego terminó (finished/idle) y kahootOpen era true, resetear
    // (se maneja en closeGame)
    const refs={
      users:    db.ref(`rooms/${sid}/users`),
      chat:     db.ref(`rooms/${sid}/chat`),
      att:      db.ref(`attendance/${uid}`),
      sess:     db.ref(`sessions/${sid}`),
      reac:     db.ref(`sessions/${sid}/reactions`),
      hist:     db.ref(`gameHistory/${uid}`),
      banner:   db.ref(`sessions/${sid}/lastBanner`),
      chatRxns: db.ref(`sessions/${sid}/chatReactions`),
      survResp: db.ref(`sessions/${sid}/survey/responses`),
    };
    refs.users.on('value',s=>setUsers(s.val()||{}));
    refs.chat.on('value',s=>{
      const v=s.val();
      if(v) setMsgs(Object.entries(v).map(([id,m])=>({id,...m})).sort((a,b)=>(a.ts||0)-(b.ts||0)));
      else setMsgs([]);
    });
    refs.att.on('value',s=>setMyAtt(s.val()||{}));
    refs.sess.on('value',s=>{
      const val=s.val();
      sessionRef.current=val;
      setSession(val);
    });
    refs.reac.on('value',s=>setReactions(s.val()||{}));
    refs.hist.on('value',s=>setGameHistory(s.val()||{}));
    refs.chatRxns.on('value',s=>setChatReactions(s.val()||{}));
    refs.survResp.on('value',s=>setSurveyResponses(s.val()||{}));
    // Listener dedicado para el banner — se dispara directamente en todos los clientes
    let bannerInitialized=false;
    refs.banner.on('value',s=>{
      const val=s.val();
      // Ignorar el valor inicial al montar (para no mostrar banners de sesiones pasadas)
      if(!bannerInitialized){ bannerInitialized=true; return; }
      if(val) setEndBanner(val);
    });
    // Reconexión automática: cuando Firebase vuelve a conectar, reinsertar al usuario
    let connReady=false;
    const connRef=db.ref('.info/connected');
    connRef.on('value',snap=>{
      if(!connReady){connReady=true;return;} // ignorar el primer disparo (conexión inicial)
      if(snap.val()!==true) return;
      const p=profileRef.current;
      if(!p.name) return;
      const pos=lastPosRef.current;
      const uRef=db.ref(`rooms/${sid}/users/${uid}`);
      uRef.set({
        name:p.name,avatar:p.avatar,color:p.color,photo:p.photo||null,
        zone:pos.zone,x:pos.x,y:pos.y,joinedAt:Date.now(),
      });
      uRef.onDisconnect().remove();
    });

    return()=>{
      Object.values(refs).forEach(r=>r.off());
      connRef.off();
    };
  },[view]);

  /* ── Sincronizar estado de actividades desde Firebase ── */
  useEffect(()=>{
    if(!session) return;
    const p=session.phase||'waiting';

    // Confra — abrir para todos cuando Firebase confirma
    if(p==='confra'&&session.confra) setConfraOpen(true);

    // Repaso — auto-abrir chat SOLO para usuarios en zona repaso
    if(p==='repaso'&&session.repaso?.active){
      if(users[UID.current]?.zone==='repaso'||isAdmin) setRepasoChatOpen(true);
    }

    // Nube de palabras
    if(session.wordcloud?.active===true) setWordCloudOpen(true);
    if(session.wordcloud?.active===false) setWordCloudOpen(false);

    // Cerrar repaso/wordcloud al volver a waiting
    if(p==='waiting'){
      setRepasoChatOpen(false);
      setWordCloudOpen(false);
    }

    // Encuesta
    if(session?.survey?.active&&!surveyResponses[UID.current]) setSurveyOpen(true);
    if(!session?.survey?.active) setSurveyOpen(false);
  },[session]);

  // Re-verificar encuesta cuando llegan respuestas (cubre usuarios que conectaron tarde)
  useEffect(()=>{
    if(!sessionRef.current?.survey?.active) return;
    if(!surveyResponses[UID.current]) setSurveyOpen(true);
  },[surveyResponses]);

  /* ── Helpers ── */
  const joinRoom=async(uid,p)=>{
    const uRef=db.ref(`rooms/${SID.current}/users/${uid}`);
    await uRef.set({
      name:p.name,avatar:p.avatar,color:p.color,photo:p.photo||null,
      zone:'entrada',x:49,y:9,joinedAt:Date.now(),
    });
    uRef.onDisconnect().remove();
    if(new Date().getDay()===6){
      await db.ref(`attendance/${uid}/${SID.current}`).set({
        name:p.name,avatar:p.avatar,color:p.color,timestamp:Date.now(),
      });
      setAttNotify(true);
      setTimeout(()=>setAttNotify(false),4000);
    }
  };

  const toggleSurvey=async()=>{
    const current=session?.survey?.active;
    await db.ref(`sessions/${SID.current}/survey`).update({active:!current});
  };

  const downloadAttendance=async()=>{
    const[pSnap,aSnap]=await Promise.all([
      db.ref('profiles').get(),
      db.ref('attendance').get(),
    ]);
    const profiles=pSnap.val()||{};
    const attendance=aSnap.val()||{};
    const allDates=new Set();
    Object.values(attendance).forEach(u=>Object.keys(u).forEach(d=>allDates.add(d)));
    const dates=[...allDates].sort();
    const rows=[
      'Asistencia — Maranata Class Las Condes',
      'Nombre\t'+dates.join('\t'),
      ...Object.entries(profiles)
        .filter(([,p])=>!p.isAdmin)
        .map(([uid,p])=>{
          const ua=attendance[uid]||{};
          return p.name+'\t'+dates.map(d=>ua[d]?'✓':'').join('\t');
        })
    ];
    const blob=new Blob([rows.join('\n')],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`asistencia_${SID.current}.txt`; a.click();
    URL.revokeObjectURL(url);
  };

  const saveProfile=async(newProfile)=>{
    const uid=UID.current;
    if(!uid) return;
    setSetupSaving(true); setSetupError('');
    try{
      await db.ref(`profiles/${uid}`).set({...newProfile,isAdmin:isAdmin||false});
      try{
        await db.ref(`rooms/${SID.current}/users/${uid}`).update({
          name:newProfile.name,avatar:newProfile.avatar,
          color:newProfile.color,photo:newProfile.photo||null,
        });
      }catch(e){}
      setProfile(newProfile);
      setEditOpen(false);
      if(view==='setup'){
        await joinRoom(uid,newProfile);
        // Solo enviar si es la primera vez (perfil recién creado)
        const emailKey=auth.currentUser?.email||'';
        sendWelcomeEmail(emailKey, newProfile.name);
        setView('room');
      }
    }catch(e){
      console.error(e);
      setSetupError('No se pudo guardar. Verifica tu conexión.');
    }
    setSetupSaving(false);
  };

  /* ── Auth handlers ── */
  const handleEmailAuth=async()=>{
    if(!email.trim()||!password) return;
    setAuthLoad(true); setAuthError('');
    try{
      if(authMode==='login'){
        await auth.signInWithEmailAndPassword(email.trim(),password);
      } else {
        await auth.createUserWithEmailAndPassword(email.trim(),password);
        // El correo de bienvenida se envía en saveProfile (cuando ya tenemos el nombre)
      }
    }catch(e){ setAuthError(getErr(e.code)); setAuthLoad(false); }
  };

  const handleReset=async()=>{
    if(!email.trim()) return;
    setAuthLoad(true); setAuthError('');
    try{
      await auth.sendPasswordResetEmail(email.trim());
      setResetSent(true);
    }catch(e){
      setAuthError(getErr(e.code)||'No se pudo enviar el correo. Verifica el email.');
    }
    setAuthLoad(false);
  };

  const handleGoogle=async()=>{
    setAuthLoad(true); setAuthError('');
    try{
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }catch(e){
      if(e.code&&!['auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(e.code))
        setAuthError(getErr(e.code));
      setAuthLoad(false);
    }
  };

  const handleSignOut=async()=>{
    try{ await db.ref(`rooms/${SID.current}/users/${UID.current}`).remove(); }catch(e){}
    await auth.signOut();
    setUsers({}); setMsgs([]); setMyAtt({}); setSession(null);
  };

  /* ── Drag to move ── */
  const handleDragMove=useCallback((x,y)=>{
    const uid=UID.current;
    if(!uid) return;
    // Bloquear movimiento durante fases activas
    if(sessionRef.current?.phase&&sessionRef.current.phase!=='waiting') return;
    const zone=detectZone(x,y);
    lastPosRef.current={zone,x,y};
    db.ref(`rooms/${SID.current}/users/${uid}`).update({x,y,zone});
  },[]);

  /* ── Chat ── */
  const handleSend=(text,extra={})=>{
    if(!text?.trim()&&!extra.imageData) return;
    const me=users[UID.current];
    if(!me) return;
    db.ref(`rooms/${SID.current}/chat`).push({
      name:me.name,avatar:me.avatar,color:me.color,photo:me.photo||null,
      text:text?.trim()||'',
      type:extra.type||'text',
      imageData:extra.imageData||null,
      tag:extra.tag||null,
      time:nowTime(),ts:Date.now(),uid:UID.current,
    });
  };

  /* ── Reaccionar ── */
  const handleReact=async(reactionId)=>{
    const confra=session?.confra;
    if(!confra) return;
    const rawQueue=confra.queue||{};
    const qArr=Array.isArray(rawQueue)?rawQueue:Object.values(rawQueue);
    const cIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
    const sUid=qArr[cIdx];
    if(!sUid) return;
    const ref=db.ref(`sessions/${SID.current}/reactions/${sUid}/${UID.current}/${reactionId}`);
    const snap=await ref.get();
    if(snap.val()) ref.remove();
    else ref.set(true);
  };

  // Reacciones del usuario actual para el speaker actual
  const myReactions=useMemo(()=>{
    const confra=session?.confra;
    if(!confra) return {};
    const rawQueue=confra.queue||{};
    const qArr=Array.isArray(rawQueue)?rawQueue:Object.values(rawQueue);
    const cIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
    const sUid=qArr[cIdx];
    if(!sUid) return {};
    return reactions?.[sUid]?.[UID.current]||{};
  },[reactions,session]);

  /* ── Admin: gestión de fases ── */
  const startConfra=async(confraUsers)=>{
    if(confraUsers.length===0) return;
    const uids=confraUsers.map(([uid])=>uid).sort(()=>Math.random()-.5);
    const queueObj={};
    uids.forEach((uid,i)=>{ queueObj[i]=uid; });
    // Mostrar panel inmediatamente en el admin (antes del echo de Firebase)
    setConfraOpen(true);
    try{
      await db.ref(`sessions/${SID.current}`).set({
        phase:'confra',
        confra:{active:true,queue:queueObj,currentIdx:0,startTime:Date.now()}
      });
    }catch(e){
      console.error('Error iniciando confra:',e);
      setConfraOpen(false);
    }
  };

  const nextSpeaker=async()=>{
    const confra=session?.confra;
    if(!confra) return;
    const rawQueue=confra.queue||{};
    const queue=Array.isArray(rawQueue)?rawQueue:Object.values(rawQueue);
    const currentIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
    const next=currentIdx+1;
    if(next>=queue.length){
      await endConfra();
    } else {
      await db.ref(`sessions/${SID.current}/confra/currentIdx`).set(next);
      await db.ref(`sessions/${SID.current}/reactions`).remove();
    }
  };

  const endConfra=async()=>{
    setConfraOpen(false);
    setEndBanner('confra'); // local inmediato para el admin
    await db.ref(`sessions/${SID.current}`).set({phase:'waiting'});
    await db.ref(`sessions/${SID.current}/lastBanner`).set('confra');
  };

  const startRepaso=async(repasoUsers=[])=>{
    setRepasoChatOpen(true);
    try{
      await db.ref(`sessions/${SID.current}`).set({
        phase:'repaso',
        repaso:{active:true,startTime:Date.now()},
      });
    }catch(e){ console.error('Error iniciando repaso:',e); }
  };

  const endRepaso=async()=>{
    setEndBanner('repaso');
    await db.ref(`sessions/${SID.current}`).set({phase:'waiting'});
    await db.ref(`sessions/${SID.current}/lastBanner`).set('repaso');
    // Limpiar chat y nube de palabras
    await db.ref(`rooms/${SID.current}/chat`).remove();
    await db.ref(`sessions/${SID.current}/wordcloud`).remove();
  };

  const toggleWordCloud=async(question='')=>{
    const isActive=session?.wordcloud?.active;
    if(isActive){
      // Cerrar en Firebase — el useEffect se encarga de cerrar el modal en todos los clientes
      await db.ref(`sessions/${SID.current}/wordcloud/active`).set(false);
    } else {
      await db.ref(`sessions/${SID.current}/wordcloud`).set({
        active:true,words:{},question:question||''
      });
    }
  };

  const startJuegos=async()=>{
    try{
      await db.ref(`sessions/${SID.current}`).set({
        phase:'juegos',
        juegos:{active:true,startTime:Date.now()},
      });
    }catch(e){console.error('Error iniciando juegos:',e);}
  };

  const endJuegos=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','juegos/active':false});
  };

  const startMision=async(misionUsers=[])=>{
    try{
      await db.ref(`sessions/${SID.current}`).set({
        phase:'mision',
        mision:{active:true,startTime:Date.now()},
      });
    }catch(e){console.error('Error iniciando misión:',e);}
  };

  const endMision=async()=>{
    await db.ref(`sessions/${SID.current}`).update({phase:'waiting','mision/active':false});
  };

  const resetSession=async()=>{
    setConfraOpen(false);
    setWordCloudOpen(false);
    setRepasoChatOpen(false);
    try{
      await db.ref(`sessions/${SID.current}`).set({phase:'waiting'});
      await db.ref(`rooms/${SID.current}/chat`).remove();
    }catch(e){ console.error('Error reiniciando sesión:',e); }
  };

  const phase=session?.phase||'waiting';
  const usersArr=Object.entries(users);
  const attSessions=Object.keys(myAtt).sort().reverse();
  const streak=(()=>{
    if(!attSessions.length) return 0;
    let s=1;
    for(let i=1;i<attSessions.length;i++){
      if((new Date(attSessions[i-1])-new Date(attSessions[i]))/86400000<=10) s++;
      else break;
    }
    return s;
  })();

  /* ════ LOADING ════ */
  if(view==='loading') return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',
      background:'var(--navy)',position:'relative',overflow:'hidden'}}>
      <BgTriangles/>
      <div style={{position:'relative',zIndex:1,textAlign:'center',
        display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
        <MaranataLogo size={260}/>
        <div style={{fontSize:11,color:'var(--muted)',letterSpacing:'.12em',
          textTransform:'uppercase',marginTop:-8}}>Las Condes</div>
        <Spinner size={28}/>
      </div>
    </div>
  );

  /* ════ AUTH ════ */
  if(view==='auth'){
    const dark=landingTheme==='dark';
    const T={
      bg:        dark?'#0a0e2e':'#f8f5ef',
      bgAlt:     dark?'#0d1239':'#efeae0',
      ink:       dark?'#f7f3eb':'#0a0e2e',
      inkSoft:   dark?'rgba(247,243,235,.7)':'rgba(10,14,46,.7)',
      muted:     dark?'rgba(247,243,235,.45)':'rgba(10,14,46,.45)',
      border:    dark?'rgba(247,243,235,.12)':'rgba(10,14,46,.12)',
      cardBg:    dark?'rgba(255,255,255,.03)':'rgba(255,255,255,.6)',
      accent:    '#ffd000',
      accentInk: '#0a0e2e',
    };
    return(
      <LandingPage
        T={T} dark={dark}
        onToggleTheme={()=>setLandingTheme(d=>d==='dark'?'light':'dark')}
        onOpenAuth={(mode)=>{setAuthMode(mode);setAuthError('');setResetMode(false);setResetSent(false);setAuthOpen(true);}}
        authOpen={authOpen} onCloseAuth={()=>setAuthOpen(false)}
        authMode={authMode} setAuthMode={setAuthMode}
        email={email} setEmail={setEmail}
        password={password} setPassword={setPassword}
        authError={authError} setAuthError={setAuthError}
        authLoad={authLoad}
        resetMode={resetMode} setResetMode={setResetMode}
        resetSent={resetSent} setResetSent={setResetSent}
        onEmailAuth={handleEmailAuth}
        onReset={handleReset}
        onGoogle={handleGoogle}
      />
    );
  }

  /* ════ SETUP ════ */
  if(view==='setup') return(
    <div style={pageWrap}>
      <BgTriangles/>
      <div style={cardStyle}>
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{fontSize:40,marginBottom:8}}>👋</div>
          <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:22,
            color:'#ffd000',textTransform:'uppercase',letterSpacing:'.04em'}}>¡Bienvenido!</h2>
          <p style={{color:'var(--muted)',fontSize:12,marginTop:4}}>
            Personaliza tu perfil. Podrás cambiarlo después.
          </p>
        </div>

        {/* Foto */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
          <div style={{position:'relative',cursor:'pointer'}}
            onClick={()=>document.getElementById('setupPhoto')?.click()}>
            <AvatarBubble profile={profile} size={70}/>
            <div style={{position:'absolute',bottom:-2,right:-2,width:22,height:22,
              borderRadius:'50%',background:'#ffd000',display:'flex',
              alignItems:'center',justifyContent:'center',fontSize:12,color:'#07091f'}}>
              📷
            </div>
          </div>
          <input id="setupPhoto" type="file" accept="image/*"
            style={{display:'none'}}
            onChange={async e=>{
              const f=e.target.files[0]; if(!f) return;
              const b64=await compressImage(f,200);
              setProfile(p=>({...p,photo:b64}));
            }}/>
        </div>

        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Nombre en la sala</label>
          <input value={profile.name}
            onChange={e=>setProfile(p=>({...p,name:e.target.value}))}
            placeholder="¿Cómo quieres que te vean?"
            style={inputStyle}/>
        </div>
        <div style={{marginBottom:12}}>
          <label style={labelStyle}>Avatar (si no usas foto)</label>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setProfile(p=>({...p,avatar:a}))} style={{
                background:profile.avatar===a?'rgba(255,208,0,.15)':'rgba(255,255,255,.03)',
                border:profile.avatar===a?`2px solid ${profile.color}`:'2px solid rgba(255,255,255,.06)',
                borderRadius:10,padding:'7px 2px',fontSize:19,
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all .15s',
              }}>{a}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <label style={labelStyle}>Color de aura</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setProfile(p=>({...p,color:c}))} style={{
                width:28,height:28,borderRadius:'50%',background:c,cursor:'pointer',
                border:profile.color===c?'3px solid white':'3px solid transparent',
                boxShadow:profile.color===c?`0 0 14px ${c}`:'none',transition:'all .15s',
              }}/>
            ))}
          </div>
        </div>
        <button onClick={()=>saveProfile(profile)}
          disabled={!profile.name.trim()||setupSaving}
          style={btnYellow(!profile.name.trim()||setupSaving)}>
          {setupSaving
            ?<><Spinner size={18} color="#07091f"/>Guardando...</>
            :'Entrar a la sala ✨'}
        </button>
        {setupError&&(
          <div style={{marginTop:10,color:'#fca5a5',fontSize:12,
            background:'rgba(239,68,68,.08)',borderRadius:8,padding:'9px 12px'}}>
            ⚠️ {setupError}
          </div>
        )}
        <p style={{textAlign:'center',marginTop:8,fontSize:11,color:'var(--muted2)'}}>
          Tu perfil se guarda para siempre
        </p>
      </div>
    </div>
  );

  /* ════ SCREEN ════ */
  if(view==='screen') return(
    <ScreenView
      users={users} session={session} msgs={msgs} reactions={reactions}
      onExit={()=>setView('room')}
    />
  );

  /* ════ ROOM ════ */
  const iconBtn={
    background:'rgba(247,243,235,.04)',
    border:'1px solid rgba(247,243,235,.1)',
    borderRadius:50,width:36,height:36,
    display:'flex',alignItems:'center',justifyContent:'center',
    color:'#f7f3eb',cursor:'pointer',transition:'all .15s',
  };
  return(
    <div style={{position:'fixed',inset:0,display:'flex',flexDirection:'column',
      background:'#0a0e2e',fontFamily:'var(--sans)'}}>

      {/* ── HEADER editorial ── */}
      <header style={{
        background:'rgba(8,11,34,.92)',
        backdropFilter:'blur(14px)',
        borderBottom:'1px solid rgba(247,243,235,.08)',
        padding:'14px 24px',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        flexShrink:0,minHeight:64,
      }}>
        {/* IZQ — Logo + estado */}
        <div style={{display:'flex',alignItems:'center',gap:18}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <svg width="32" height="24" viewBox="0 0 80 60">
              <polygon points="8,54 72,54 58,10" fill="#ffd000"/>
              <g stroke="#0a0e2e" strokeWidth="3.4" fill="none" strokeLinecap="round" strokeLinejoin="round">
                <path d="M28 42L28 18Q28 15 31 15L40 17L40 42"/>
                <path d="M52 42L52 18Q52 15 49 15L40 17L40 42"/>
                <path d="M28 42Q34 40 40 42Q46 40 52 42"/>
              </g>
            </svg>
            <div style={{lineHeight:1}}>
              <div style={{fontFamily:'var(--display)',fontWeight:900,fontSize:15,
                color:'#f7f3eb',letterSpacing:'.04em'}}>MARANATA</div>
              <div style={{fontFamily:'var(--display)',fontWeight:600,fontSize:9,
                color:'rgba(247,243,235,.45)',letterSpacing:'.22em',marginTop:2}}>
                CLASS · LAS CONDES
              </div>
            </div>
          </div>

          {/* Divisor + estado de sala */}
          <div style={{height:32,width:1,background:'rgba(247,243,235,.1)'}}/>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div>
              <div style={{fontSize:10,color:'rgba(247,243,235,.4)',
                textTransform:'uppercase',letterSpacing:'.16em',fontWeight:600,marginBottom:3}}>
                En sala
              </div>
              <div style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:500,
                color:'#f7f3eb',lineHeight:1,letterSpacing:'-.01em'}}>
                {usersArr.length}
              </div>
            </div>
            {phase!=='waiting'&&ZONES[phase]&&(
              <>
                <div style={{height:32,width:1,background:'rgba(247,243,235,.1)'}}/>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{
                    width:28,height:28,borderRadius:7,
                    background:ZONES[phase].color,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    color:'white',fontFamily:'var(--display)',fontWeight:900,fontSize:16,
                    boxShadow:`0 4px 14px ${ZONES[phase].color}66`,
                  }}>{ZONES[phase].letter}</div>
                  <div style={{lineHeight:1}}>
                    <div style={{fontSize:9,color:'rgba(247,243,235,.4)',
                      textTransform:'uppercase',letterSpacing:'.16em',fontWeight:600,marginBottom:3}}>
                      En curso
                    </div>
                    <div style={{fontFamily:'var(--serif)',fontStyle:'italic',
                      fontSize:18,fontWeight:500,color:'#f7f3eb',
                      letterSpacing:'-.01em'}}>
                      {ZONES[phase].label}
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>

        {/* DER — Acciones */}
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>setEditOpen(true)} title="Editar perfil" style={{
            display:'flex',alignItems:'center',gap:8,
            background:'rgba(247,243,235,.04)',
            border:'1px solid rgba(247,243,235,.1)',
            borderRadius:50,padding:'5px 14px 5px 5px',
            color:'#f7f3eb',transition:'all .15s',cursor:'pointer',
          }}>
            <AvatarBubble profile={profile} size={28}/>
            <span style={{fontSize:13,fontWeight:600,maxWidth:90,overflow:'hidden',
              textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {profile.name||'Yo'}
            </span>
          </button>

          <button onClick={()=>setAttOpen(true)} title="Mi asistencia" style={iconBtn}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>
            </svg>
          </button>

          <button onClick={()=>setView('screen')} title="Proyectar a la pantalla grande" style={iconBtn}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </button>

          <div style={{width:1,height:24,background:'rgba(247,243,235,.1)',margin:'0 4px'}}/>

          <button onClick={handleSignOut} title="Cerrar sesión" style={{
            ...iconBtn,
            color:'rgba(247,243,235,.5)',
          }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      {/* ── Sub-header: hint contextual ── */}
      {phase==='waiting'&&(
        <div style={{
          background:'linear-gradient(90deg,rgba(255,208,0,.06),rgba(255,208,0,.02))',
          borderBottom:'1px solid rgba(255,208,0,.12)',
          padding:'10px 24px',
          display:'flex',alignItems:'center',gap:14,flexShrink:0,
        }}>
          <span style={{fontFamily:'var(--display)',fontSize:10,fontWeight:700,
            letterSpacing:'.22em',textTransform:'uppercase',
            color:'#ffd000',
            background:'rgba(255,208,0,.1)',padding:'4px 10px',borderRadius:50,
            border:'1px solid rgba(255,208,0,.25)',
          }}>
            ● En espera
          </span>
          <span style={{fontFamily:'var(--serif)',fontStyle:'italic',
            fontSize:15,color:'rgba(247,243,235,.7)',letterSpacing:'-.01em'}}>
            Arrastra tu avatar a la zona donde quieras participar.
          </span>
        </div>
      )}

      {/* ── SALA (canvas con zonas) ── */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <RoomCanvas
          users={users} myId={UID.current} session={session}
          onDragMove={handleDragMove}
          roomRef={roomRef} full={false} reactions={reactions}
        />

        {/* Repaso: botón flotante — solo para usuarios en zona repaso */}
        {phase==='repaso'&&!repasoChatOpen&&(users[UID.current]?.zone==='repaso'||isAdmin)&&(
          <button onClick={()=>setRepasoChatOpen(true)} style={{
            position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',
            background:'#fb923c',
            border:'none',borderRadius:50,padding:'12px 26px',
            color:'#0a0e2e',fontWeight:700,fontSize:14,
            fontFamily:'var(--sans)',letterSpacing:'-.01em',
            display:'flex',alignItems:'center',gap:10,zIndex:20,cursor:'pointer',
            boxShadow:'0 8px 28px rgba(251,146,60,.4)',
          }}>
            Abrir Chat del Repaso
            <span style={{fontSize:16}}>→</span>
            {msgs.length>0&&(
              <span style={{background:'rgba(10,14,46,.18)',borderRadius:50,
                padding:'2px 9px',fontSize:11,fontWeight:700}}>{msgs.length}</span>
            )}
          </button>
        )}
      </div>

      {/* Confraternización — solo para usuarios en zona confra (o admin o si están en la cola) */}
      {(confraOpen||session?.phase==='confra')&&(()=>{
        const myZone=users[UID.current]?.zone;
        const confra=session?.confra;
        const rawQ=confra?.queue||{};
        const qArr=Array.isArray(rawQ)?rawQ:Object.values(rawQ);
        const inQueue=qArr.includes(UID.current);
        if(!isAdmin&&myZone!=='confra'&&!inQueue) return null;
        return(
          <ConfraSpeakerPanel
            session={session}
            users={users}
            myId={UID.current} isAdmin={isAdmin}
            onNext={nextSpeaker} onEnd={endConfra}
            onReact={handleReact}
            myReactions={myReactions}
            allReactions={(()=>{
              if(!confra) return {};
              const cIdx=typeof confra.currentIdx==='number'?confra.currentIdx:0;
              const sUid=qArr[cIdx];
              return sUid?reactions?.[sUid]||{}:{};
            })()}
          />
        );
      })()}

      {/* Banner fin de actividad */}
      {endBanner&&(
        <ActivityEndBanner phase={endBanner} onDismiss={()=>setEndBanner(null)}/>
      )}

      {/* Panel admin */}
      {isAdmin&&(
        <AdminPanel
          session={session} users={users}
          onStartConfra={startConfra}
          onNextSpeaker={nextSpeaker}
          onEndConfra={endConfra}
          onStartRepaso={startRepaso}
          onEndRepaso={endRepaso}
          onStartJuegos={startJuegos}
          onEndJuegos={endJuegos}
          onStartMision={startMision}
          onEndMision={endMision}
          onOpenStats={()=>setAdminStats(true)}
          onToggleWordCloud={toggleWordCloud}
          onResetSession={resetSession}
          onOpenSurvey={()=>setAdminSurvey(true)}
          onDownloadAttendance={downloadAttendance}
          surveyActive={!!session?.survey?.active}
        />
      )}


      {/* Kahoot Game */}
      {phase==='juegos'&&(
        <KahootController
          session={session} users={users}
          myId={UID.current} isAdmin={isAdmin}
          SID={SID.current}
          onClose={()=>setKahootOpen(false)}
        />
      )}

      {/* Word Cloud — auto-abre para todos, solo usuarios en repaso */}
      {wordCloudOpen&&phase==='repaso'&&session?.wordcloud?.active&&(
        <WordCloudActivity
          wordcloud={session.wordcloud}
          question={session.wordcloud?.question||''}
          myId={UID.current} users={users}
          isAdmin={isAdmin} SID={SID.current}
          onClose={()=>setWordCloudOpen(false)}
        />
      )}

      {/* Modales */}
      {editOpen&&<EditProfileModal profile={profile} onSave={saveProfile} onClose={()=>setEditOpen(false)}/>}
      {attOpen&&<AttendanceModal myAtt={myAtt} gameHistory={gameHistory} onClose={()=>setAttOpen(false)}/>}
      {adminStats&&<AdminStatsModal onClose={()=>setAdminStats(false)}/>}
      {attNotify&&<AttNotifyToast/>}
      {surveyOpen&&<SurveyModal myId={UID.current} myName={profile.name} SID={SID.current} onSent={()=>setSurveyOpen(false)}/>}
      {adminSurvey&&<AdminSurveyModal responses={surveyResponses} SID={SID.current} onClose={()=>setAdminSurvey(false)} onToggle={toggleSurvey} surveyActive={!!session?.survey?.active}/>}

      {/* Repaso Chat — solo para usuarios en zona repaso o admin */}
      {repasoChatOpen&&phase==='repaso'&&(users[UID.current]?.zone==='repaso'||isAdmin)&&(
        <RepasoChat
          msgs={msgs} session={session}
          myId={UID.current} users={users}
          onSend={handleSend}
          SID={SID.current}
          chatReactions={chatReactions}
          onClose={()=>setRepasoChatOpen(false)}
        />
      )}
    </div>
  );
}

function Confetti(){
  const pieces=React.useMemo(()=>Array.from({length:28},(_,i)=>({
    id:i,x:Math.random()*100,delay:Math.random()*2,dur:2.5+Math.random()*2,
    color:['#ffd000','#ec4899','#22d3ee','#10b981','#8b5cf6'][i%5],
    size:6+Math.random()*8,
  })),[]);
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:300,overflow:'hidden'}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:'absolute',left:`${p.x}%`,top:-20,
          width:p.size,height:p.size,background:p.color,borderRadius:p.size/4,
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function KahootQuestion({question,qIndex,total,myAnswer,onAnswer,timeLeft,gameState}){
  const answered=myAnswer!==null&&myAnswer!==undefined;
  const showResult=gameState==='results';
  const urgent=timeLeft<=8;
  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'10px 16px',display:'flex',alignItems:'center',
        justifyContent:'space-between',flexShrink:0,
        borderBottom:'1px solid rgba(139,92,246,.2)'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:12,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em'}}>
          Pregunta {qIndex+1} / {total}
        </div>
        <div style={{width:44,height:44,borderRadius:'50%',
          background:urgent?'rgba(239,68,68,.15)':'rgba(139,92,246,.15)',
          border:`2px solid ${urgent?'#ef4444':'#8b5cf6'}`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:18,
          color:urgent?'#ef4444':'#8b5cf6',
          animation:urgent&&!showResult?'timerTick .5s infinite':undefined,
        }}>
          {showResult?'✓':timeLeft}
        </div>
      </div>
      {!showResult&&(
        <div style={{height:5,background:'rgba(255,255,255,.06)',flexShrink:0}}>
          <div style={{height:'100%',
            background:urgent?'#ef4444':'#8b5cf6',
            width:`${(timeLeft/GAME_TIMER)*100}%`,
            transition:'width 1s linear',borderRadius:2}}/>
        </div>
      )}
      <div style={{flex:'0 0 auto',padding:'14px 14px 10px',
        display:'flex',alignItems:'center',justifyContent:'center',minHeight:85}}>
        <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
          border:'1px solid rgba(139,92,246,.2)',borderRadius:16,
          padding:'14px 16px',textAlign:'center',width:'100%',maxWidth:500,
          fontFamily:'Barlow,sans-serif',fontWeight:600,fontSize:16,
          color:'var(--white)',lineHeight:1.4,
          boxShadow:'0 4px 20px rgba(0,0,0,.4)'}}>
          {question.text}
        </div>
      </div>
      <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',
        gap:10,padding:'0 12px 16px',alignContent:'start'}}>
        {question.options.map((opt,i)=>{
          const isMyAnswer=myAnswer===i;
          const isCorrect=question.correct===i;
          let bg=ANS_COLORS[i];
          let border='transparent';
          let badge=null;
          if(showResult){
            if(isCorrect){border='white';badge='✅';}
            else{bg='rgba(255,255,255,.06)';border='rgba(255,255,255,.1)';}
          } else if(answered&&!isMyAnswer){
            bg='rgba(255,255,255,.06)';border='rgba(255,255,255,.08)';
          }
          return(
            <button key={i} onClick={()=>!answered&&!showResult&&onAnswer(i)}
              disabled={answered||showResult}
              style={{background:bg,border:`2px solid ${border}`,
                borderRadius:14,padding:'12px 8px',
                display:'flex',flexDirection:'column',alignItems:'center',
                justifyContent:'center',gap:5,minHeight:88,
                color:'white',textAlign:'center',
                fontFamily:'Barlow,sans-serif',fontWeight:600,fontSize:13,
                boxShadow:isMyAnswer&&!showResult?`0 0 18px ${ANS_COLORS[i]}88`:
                          isMyAnswer&&showResult&&isCorrect?'0 0 0 3px white':undefined,
                animation:isMyAnswer&&!showResult?'answerPop .3s ease':undefined,
                outline:isMyAnswer&&showResult&&!isCorrect?'3px solid #ef4444':undefined,
                transition:'background .4s,border .4s',
                cursor:answered||showResult?'default':'pointer'}}>
              <span style={{fontSize:18,opacity:.7}}>{ANS_SHAPES[i]}</span>
              <span style={{lineHeight:1.3}}>{opt}</span>
              {badge&&<span style={{fontSize:16}}>{badge}</span>}
              {showResult&&isMyAnswer&&!isCorrect&&<span style={{fontSize:16}}>❌</span>}
            </button>
          );
        })}
      </div>
      {answered&&!showResult&&(
        <div style={{position:'absolute',bottom:20,left:'50%',
          transform:'translateX(-50%)',
          background:'rgba(7,9,31,.95)',border:'1px solid rgba(139,92,246,.3)',
          borderRadius:20,padding:'8px 20px',
          fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,
          fontSize:13,color:'#8b5cf6',letterSpacing:'.04em',textTransform:'uppercase'}}>

      )}

  );

function KahootLeaderboard({scores,users,isAdmin,isFinished,onClose,myId,SID}){
  const sorted=Object.entries(scores||{})
    .map(([uid,score])=>({uid,score,user:users[uid]||{name:'?',avatar:'👤',color:'#8b5cf6'}}))
    .sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const winner=sorted[0];
  const isWinner=winner?.uid===myId;

  const[podiumReactions,setPodiumReactions]=useState({});
  const[myReactions,setMyReactions]=useState({});

  useEffect(()=>{
    if(!isFinished||!SID) return;
    const ref=db.ref(`sessions/${SID}/juegos/podiumReactions`);
    const handler=snap=>setPodiumReactions(snap.val()||{});
    ref.on('value',handler);
    return()=>ref.off('value',handler);
  },[isFinished,SID]);

  useEffect(()=>{
    setMyReactions(podiumReactions[myId]||{});
  },[podiumReactions,myId]);

  const reactionTotals={};
  REACTIONS.forEach(r=>{reactionTotals[r.id]=0;});
  Object.values(podiumReactions).forEach(userRxns=>{
    if(userRxns&&typeof userRxns==='object'){
      Object.entries(userRxns).forEach(([rid,val])=>{
        if(val&&reactionTotals[rid]!==undefined) reactionTotals[rid]++;
      });
    }
  });

  const toggleReaction=async(rid)=>{
    if(!myId||!SID||isWinner) return;
    const path=`sessions/${SID}/juegos/podiumReactions/${myId}/${rid}`;
    await db.ref(path).set(myReactions[rid]?null:true);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--navy)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {isFinished&&<Confetti/>}
      <div style={{background:'linear-gradient(135deg,#0d1035,#141744)',
        padding:'14px 20px',flexShrink:0,textAlign:'center',
        borderBottom:'1px solid rgba(255,208,0,.15)'}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#ffd000',textTransform:'uppercase',letterSpacing:'.08em'}}>
          {isFinished?'🏆 Resultados Finales':'Marcador'}
        </div>
      </div>

      {isFinished&&isWinner&&winner&&(
        <div style={{background:'linear-gradient(135deg,rgba(255,208,0,.18),rgba(255,208,0,.05))',
          borderBottom:'1px solid rgba(255,208,0,.3)',padding:'14px 20px',

          {Object.values(reactionTotals).some(v=>v>0)&&(

              {REACTIONS.map(r=>reactionTotals[r.id]>0&&(

                  padding:'4px 10px',fontSize:18,display:'flex',alignItems:'center',gap:4}}>

                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {isFinished&&!isWinner&&winner&&(
        <div style={{padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
          <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',

            textTransform:'uppercase',letterSpacing:'.05em',fontWeight:700}}>

          </div>
          <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
            {REACTIONS.map(r=>{
              const selected=!!myReactions[r.id];

              return(
                <button key={r.id} onClick={()=>toggleReaction(r.id)} style={{
                  background:selected?'rgba(255,208,0,.2)':'rgba(255,255,255,.06)',
                  border:selected?'1.5px solid rgba(255,208,0,.5)':'1px solid rgba(255,255,255,.1)',
                  borderRadius:16,padding:'6px 12px',cursor:'pointer',
                  fontSize:18,display:'flex',alignItems:'center',gap:4,
                  transition:'all .2s',
                  boxShadow:selected?'0 0 10px rgba(255,208,0,.3)':undefined}}>
                  {r.e}
                  {count>0&&(
                    <span style={{fontSize:12,color:selected?'#ffd000':'var(--muted)',fontWeight:700}}>
                      {count}
                    </span>
                  )}
                </button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{flex:1,overflowY:'auto',padding:'16px 16px 80px'}}>
        {sorted.map((item,i)=>(
          <div key={item.uid} style={{
            display:'flex',alignItems:'center',gap:12,
            background:i===0&&isFinished?
              'linear-gradient(135deg,rgba(255,208,0,.12),rgba(255,208,0,.04))':'rgba(255,255,255,.03)',
            border:i===0&&isFinished?'1px solid rgba(255,208,0,.25)':'1px solid rgba(255,255,255,.05)',
            borderRadius:12,padding:'10px 14px',marginBottom:8,
            animation:`scoreUp ${.1+i*.07}s ease`}}>
            <div style={{width:28,textAlign:'center',
              fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:i<3?22:16,color:i<3?'#ffd000':'var(--muted)'}}>
              {i<3?medals[i]:i+1}
            </div>
            <AvatarBubble profile={item.user} size={34}/>
            <div style={{flex:1,fontFamily:'Barlow,sans-serif',fontWeight:600,
              fontSize:14,color:'white'}}>{item.user.name}</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
              fontSize:20,color:'#ffd000'}}>{item.score}</div>
          </div>
        ))}
      </div>
      {isAdmin&&isFinished&&(
        <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)'}}>
          <button onClick={onClose} style={{
            background:'linear-gradient(135deg,#8b5cf6,#6d28d9)',
            border:'none',borderRadius:14,padding:'13px 32px',
            color:'white',fontWeight:800,fontSize:14,
            fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
            textTransform:'uppercase',boxShadow:'0 0 22px rgba(139,92,246,.4)',cursor:'pointer'}}>
            Cerrar juego ✓
          </button>
        </div>
      )}
    </div>
  );
}

function KahootSetup({onStart,juegosCount,onCancel}){
  const[questions,setQuestions]=useState([{text:'',options:['','','',''],correct:0}]);
  const[qIdx,setQIdx]=useState(0);
  const q=questions[qIdx];
  const updateQ=(f,v)=>setQuestions(qs=>qs.map((x,i)=>i===qIdx?{...x,[f]:v}:x));
  const updateOpt=(oi,v)=>setQuestions(qs=>qs.map((x,i)=>i===qIdx?
    {...x,options:x.options.map((o,j)=>j===oi?v:o)}:x));
  const addQ=()=>{ setQuestions(qs=>[...qs,{text:'',options:['','','',''],correct:0}]); setQIdx(questions.length); };
  const canStart=questions.every(q=>q.text.trim()&&q.options.every(o=>o.trim()));
  return(
    <div style={{position:'fixed',inset:0,zIndex:250,
      background:'rgba(7,9,31,.97)',backdropFilter:'blur(6px)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid rgba(255,255,255,.06)',
        flexShrink:0,display:'flex',alignItems:'center',gap:12}}>
        <button onClick={onCancel} style={{background:'none',border:'none',
          color:'var(--muted)',fontSize:22,cursor:'pointer',padding:'0 4px',lineHeight:1}}>‹</button>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:18,color:'white',textTransform:'uppercase',letterSpacing:'.06em'}}>
          Crear Juego
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8,flexWrap:'wrap'}}>
          {questions.map((_,i)=>(
            <button key={i} onClick={()=>setQIdx(i)}
              style={{width:28,height:28,borderRadius:8,border:'none',
                background:i===qIdx?'#8b5cf6':'rgba(255,255,255,.1)',
                color:'white',fontFamily:'Barlow Condensed,sans-serif',
                fontWeight:700,fontSize:12,cursor:'pointer'}}>
              {i+1}
            </button>
          ))}
          <button onClick={addQ} style={{width:28,height:28,borderRadius:8,border:'none',
            background:'rgba(255,255,255,.06)',color:'var(--muted)',
            fontSize:16,cursor:'pointer'}}>+</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:16}}>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:6,
            fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'.05em',
            textTransform:'uppercase'}}>Pregunta {qIdx+1}</div>
          <textarea value={q.text} onChange={e=>updateQ('text',e.target.value)}
            placeholder="Escribe la pregunta aquí..."
            style={{width:'100%',background:'rgba(255,255,255,.05)',
              border:'1px solid rgba(255,255,255,.1)',borderRadius:12,
              color:'var(--white)',fontSize:14,fontFamily:'Barlow,sans-serif',
              padding:'12px 14px',resize:'none',height:72,lineHeight:1.4}}/>
        </div>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <button onClick={()=>updateQ('correct',i)}
              style={{width:34,height:34,borderRadius:8,border:'none',flexShrink:0,
                background:q.correct===i?ANS_COLORS[i]:`${ANS_COLORS[i]}28`,
                color:'white',fontSize:14,fontWeight:700,cursor:'pointer',
                boxShadow:q.correct===i?`0 0 12px ${ANS_COLORS[i]}77`:undefined,
                transition:'background .2s'}}>
              {q.correct===i?'✓':ANS_SHAPES[i]}
            </button>
            <input value={q.options[i]} onChange={e=>updateOpt(i,e.target.value)}
              placeholder={`Opción ${i+1}`}
              style={{flex:1,padding:'10px 12px',borderRadius:10,
                background:`${ANS_COLORS[i]}18`,
                border:`1px solid ${ANS_COLORS[i]}44`,
                color:'var(--white)',fontSize:13,
                fontFamily:'Barlow,sans-serif',outline:'none'}}/>
          </div>
        ))}
      </div>
      <div style={{padding:'12px 14px',borderTop:'1px solid rgba(255,255,255,.06)',
        flexShrink:0,display:'flex',flexDirection:'column',gap:8}}>
        <button onClick={()=>canStart&&juegosCount>0&&onStart(questions)}
          disabled={!canStart||juegosCount===0} style={{
          width:'100%',padding:13,borderRadius:12,border:'none',
          background:canStart&&juegosCount>0?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'var(--muted2)',
          color:canStart&&juegosCount>0?'white':'var(--muted)',
          fontSize:15,fontWeight:800,fontFamily:'Barlow Condensed,sans-serif',
          letterSpacing:'.06em',textTransform:'uppercase',
          boxShadow:canStart&&juegosCount>0?'0 0 24px rgba(139,92,246,.4)':undefined}}>
          {juegosCount===0?'Nadie en sala de juegos':

function KahootController({session,users,myId,isAdmin,SID,onClose}){
  const game=session?.juegos;
  const gState=game?.gameState;
  const[timeLeft,setTimeLeft]=useState(GAME_TIMER);
  const[countdownDone,setCountdownDone]=useState(false);
  const[showSetup,setShowSetup]=useState(false);
  const timerRef=useRef(null);
  const questions=game?.questions||[];
  const qIdx=game?.currentQ||0;
  const currentQ=questions[qIdx];
  const scores=game?.scores||{};
  const myScore=scores[myId]||0;
  const myAnswer=game?.answers?.[myId];
  const juegosUsers=Object.entries(users).filter(([,u])=>u.zone==='juegos');

  useEffect(()=>{
    if(gState==='question'&&game?.qStartTime){
      clearInterval(timerRef.current);
      timerRef.current=setInterval(()=>{
        const elapsed=Math.floor((Date.now()-game.qStartTime)/1000);
        const left=Math.max(0,GAME_TIMER-elapsed);
        setTimeLeft(left);
        if(left===0){
          clearInterval(timerRef.current);
          if(isAdmin) db.ref(`sessions/${SID}/juegos/gameState`).set('results');
        }
      },400);
    }
    return()=>clearInterval(timerRef.current);
  },[gState,game?.qStartTime,isAdmin]);

  useEffect(()=>{ setCountdownDone(false); },[qIdx]);

  // Auto-avanzar a resultados cuando todos los jugadores respondieron
  useEffect(()=>{
    if(!isAdmin||gState!=='question') return;
    if(juegosUsers.length===0) return;
    const answers=game?.answers||{};
    const answeredCount=Object.keys(answers).length;
    if(answeredCount>=juegosUsers.length){
      clearInterval(timerRef.current);
      db.ref(`sessions/${SID}/juegos/gameState`).set('results');
    }
  },[game?.answers,gState,isAdmin,juegosUsers.length]);

  const handleAnswer=async(ansIdx)=>{
    if(myAnswer!==null&&myAnswer!==undefined) return;
    const elapsed=game?.qStartTime?Math.floor((Date.now()-game.qStartTime)/1000):GAME_TIMER;
    const speed=Math.max(0,GAME_TIMER-Math.min(elapsed,GAME_TIMER));
    const pts=currentQ?.correct===ansIdx?Math.round(100+speed*30):0;
    await db.ref(`sessions/${SID}/juegos/answers/${myId}`).set(ansIdx);
    if(pts>0) await db.ref(`sessions/${SID}/juegos/scores/${myId}`).transaction(c=>(c||0)+pts);
  };

  const nextQuestion=async()=>{
    const next=qIdx+1;
    await db.ref(`sessions/${SID}/juegos`).update({
      currentQ:next,gameState:'question',qStartTime:Date.now(),answers:{}
    });
  };

  const finishGame=async()=>{
    const fs=game?.scores||{};
    const sorted=Object.entries(fs).sort((a,b)=>b[1]-a[1]);
    const gid=`${SID}_${Date.now()}`;
    await Promise.all(sorted.map(([uid,score],i)=>
      db.ref(`gameHistory/${uid}/${gid}`).set({
        date:SID,score,rank:i+1,totalPlayers:sorted.length,
        name:users[uid]?.name||'?'
      })
    ));
    await db.ref(`sessions/${SID}/juegos/gameState`).set('finished');
  };

  const skipQuestion=async()=>{
    const next=qIdx+1;
    if(next<questions.length){
      await db.ref(`sessions/${SID}/juegos`).update({
        currentQ:next,gameState:'starting',qStartTime:null,answers:{}
      });
    } else {
      await finishGame();
    }
  };

  const endTimeNow=async()=>{
    clearInterval(timerRef.current);
    await db.ref(`sessions/${SID}/juegos/gameState`).set('results');
  };

  const closeGame=async()=>{
    await db.ref(`sessions/${SID}/juegos/podiumReactions`).remove();
    await db.ref(`sessions/${SID}`).update({phase:'waiting','juegos/active':false});
  };

  const myZone=users[myId]?.zone;
  if(myZone!=='juegos'&&!isAdmin) return null;

  /* ── Admin: menú de selección / setup ── */
  if(isAdmin&&(!gState||gState==='idle')){
    if(showSetup){
      return(
        <KahootSetup juegosCount={juegosUsers.length}
          onCancel={()=>setShowSetup(false)}
          onStart={async(qs)=>{
            await db.ref(`sessions/${SID}/juegos`).update({
              active:true,gameState:'starting',questions:qs,
              currentQ:0,qStartTime:null,answers:{},scores:{}
            });
          }}/>
      );
    }
    return(
      <GameSelectMenu
        juegosCount={juegosUsers.length}
        onSelectLibrary={async(qs)=>{
          await db.ref(`sessions/${SID}/juegos`).update({
            active:true,gameState:'starting',questions:qs,
            currentQ:0,qStartTime:null,answers:{},scores:{}
          });
        }}
        onCreateNew={()=>setShowSetup(true)}
        onCancel={()=>{ if(onClose) onClose(); }}
      />
    );
  }

  /* ── Countdown ── */
  if(gState==='starting'){
    if(isAdmin&&!countdownDone){
      return(
        <div style={{position:'fixed',inset:0,zIndex:250,
          background:'rgba(7,9,31,.95)',backdropFilter:'blur(6px)',
          display:'flex',flexDirection:'column',alignItems:'center',
          justifyContent:'center',gap:10}}>
          <CountdownTimer from={3} onDone={async()=>{
            setCountdownDone(true);
            await db.ref(`sessions/${SID}/juegos`).update({
              gameState:'question',qStartTime:Date.now()
            });
          }}/>
        </div>
      );
    }
    return(
      <div style={{position:'fixed',inset:0,zIndex:210,
        background:'rgba(7,9,31,.96)',display:'flex',
        alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
        <div style={{fontSize:72,animation:'bounce .7s infinite'}}>🎮</div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:22,color:'#8b5cf6',textTransform:'uppercase',letterSpacing:'.06em'}}>
          ¡Prepárate!
        </div>
        <Spinner size={28} color="#8b5cf6"/>
      </div>
    );
  }

  /* ── Pregunta activa ── */
  if(gState==='question'&&currentQ){
    return(
      <>
        <KahootQuestion question={currentQ} qIndex={qIdx} total={questions.length}
          myAnswer={myAnswer} onAnswer={handleAnswer}
          timeLeft={timeLeft} gameState={gState}/>
        {isAdmin&&(
          <div style={{position:'fixed',bottom:24,left:0,right:0,zIndex:300,
            display:'flex',justifyContent:'center',gap:10,padding:'0 16px',flexWrap:'wrap'}}>
            <button onClick={endTimeNow}
              style={{background:'rgba(239,68,68,.92)',border:'none',borderRadius:14,
                padding:'11px 20px',color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                textTransform:'uppercase',boxShadow:'0 4px 18px rgba(239,68,68,.45)',
                cursor:'pointer'}}>
              ⏰ Terminar tiempo
            </button>
            <button onClick={skipQuestion}
              style={{background:'rgba(139,92,246,.92)',border:'none',borderRadius:14,
                padding:'11px 20px',color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                textTransform:'uppercase',boxShadow:'0 4px 18px rgba(139,92,246,.45)',
                cursor:'pointer'}}>
              ⏭ Saltar
            </button>
            <button onClick={finishGame}
              style={{background:'rgba(16,185,129,.92)',border:'none',borderRadius:14,
                padding:'11px 20px',color:'white',fontWeight:800,fontSize:13,
                fontFamily:'Barlow Condensed,sans-serif',letterSpacing:'.04em',
                textTransform:'uppercase',boxShadow:'0 4px 18px rgba(16,185,129,.45)',
                cursor:'pointer'}}>
              🏁 Terminar juego
            </button>
          </div>
        )}
      </>
    );
  }

  /* ── Resultados de pregunta ── */
  if(gState==='results'&&currentQ){
    const isRight=myAnswer===currentQ.correct;
    const elapsed=game?.qStartTime?Math.floor((Date.now()-game.qStartTime)/1000):GAME_TIMER;
    const speed=Math.max(0,GAME_TIMER-Math.min(elapsed,GAME_TIMER));
    const pointsEarned=isRight?Math.round(100+speed*30):0;
    return(
      <KahootResultCard question={currentQ} myAnswer={myAnswer}
        pointsEarned={pointsEarned} myScore={myScore}
        qIdx={qIdx} total={questions.length}
        isAdmin={isAdmin} onNext={nextQuestion} onFinish={finishGame} onEarlyEnd={finishGame}/>
    );
  }

  /* ── Leaderboard / Final ── */
  if(gState==='leaderboard'||gState==='finished'){
    return(
      <KahootLeaderboard scores={scores} users={users}
        isAdmin={isAdmin} isFinished={gState==='finished'}
        onClose={closeGame} myId={myId} SID={SID}/>
    );
  }

  /* ── Jugador esperando ── */
  if(!isAdmin){
    return(
      <div style={{position:'fixed',inset:0,zIndex:190,
        background:'rgba(7,9,31,.96)',display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:16,padding:24,textAlign:'center'}}>
        <div style={{fontSize:54,animation:'bounce 1.2s infinite'}}>🎮</div>
        <h2 style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
          fontSize:24,color:'#8b5cf6',textTransform:'uppercase',letterSpacing:'.05em'}}>
          Sala de Juegos
        </h2>
        <p style={{color:'var(--muted)',fontSize:14,maxWidth:240,lineHeight:1.6}}>
          Estás listo.<br/>El profe iniciará el juego pronto.
        </p>
      </div>
    );
  }

  return null;
}



function CountdownTimer({from,onDone}){
  const[n,setN]=useState(from);
  useEffect(()=>{
    if(n<=0){onDone();return;}
    const t=setTimeout(()=>setN(n-1),1000);
    return()=>clearTimeout(t);
  },[n]);
  if(n<=0) return null;
  return(
    <>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,
        fontSize:110,color:'#ffd000',lineHeight:1,
        animation:'countdownPop .7s ease'}} key={n}>{n}</div>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:18,
        color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase'}}>
        Prepárate
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
